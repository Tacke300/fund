<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOP VOLATILITY</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    background:#000;
    color:#e5e5e5;
    font-family: monospace;
    font-size:12px;
}

.card{
    background:#111;
    border:1px solid #222;
    border-radius:10px;
    padding:10px;
}

.up{color:#00ff88;}
.down{color:#ff4d4d;}

table{
    width:100%;
    font-size:11px;
}

th,td{
    padding:6px;
    text-align:center;
}

th{
    color:#888;
}

/* mobile */
@media(max-width:768px){
    body{font-size:11px;}
    th,td{font-size:10px;}
}
</style>
</head>

<body class="p-2 max-w-5xl mx-auto">

<!-- HEADER -->
<div class="card text-center mb-2">
    <div class="text-green-400 text-lg font-bold">
        📊 TOP 5 VOLATILITY
    </div>
    <div class="text-[10px] text-zinc-500">
        1m / 5m / 15m movement scanner
    </div>
</div>

<!-- TABLE -->
<div class="card overflow-x-auto">
<table>
    <thead>
        <tr>
            <th>COIN</th>
            <th>1M</th>
            <th>5M</th>
            <th>15M</th>
            <th>VOL SCORE</th>
        </tr>
    </thead>

    <tbody id="marketBody"></tbody>
</table>
</div>

<script>

async function load(){
    try{
        const res = await fetch('/api/status');
        const d = await res.json();

        const market = d.market || [];

        document.getElementById('marketBody').innerHTML =
        market.map(m => `
            <tr class="border-b border-zinc-800">
                <td class="font-bold">${m.symbol}</td>

                <td class="${m.c1>=0?'up':'down'}">
                    ${m.c1?.toFixed(2)}%
                </td>

                <td class="${m.c5>=0?'up':'down'}">
                    ${m.c5?.toFixed(2)}%
                </td>

                <td class="${m.c15>=0?'up':'down'}">
                    ${m.c15?.toFixed(2)}%
                </td>

                <td class="text-yellow-400">
                    ${m.volatilityScore?.toFixed(2)}
                </td>
            </tr>
        `).join('');

    } catch(e){}
}

setInterval(load, 2000);
load();

</script>

</body>
</html>
