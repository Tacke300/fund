<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>MONCEY D. LUFFY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #eee; font-family: monospace; font-size: 12px; }
        .card { background: #111; border: 1px solid #222; padding: 10px; border-radius: 4px; }
        .up { color: #00ff88; } .down { color: #ff4444; }
        input { background: #000; border: 1px solid #333; color: #fff; padding: 5px; width: 100%; border-radius: 3px; }
    </style>
</head>
<body class="p-2 space-y-3 max-w-2xl mx-auto">
    <h1 class="text-xl font-black text-red-500 text-center">🏴‍☠️ MONCEY D. LUFFY</h1>
    
    <div class="card space-y-2">
        <div class="grid grid-cols-2 gap-2">
            <div>Vốn: <input id="capital" type="text"></div>
            <div>Vol: <input id="volVolatility" type="number"></div>
            <div>MaxPos: <input id="maxPos" type="number"></div>
            <div>DCA %: <input id="dcaInterval" type="number"></div>
            <div>TP %: <input id="tp" type="number"></div>
            <div>SL %: <input id="sl" type="number"></div>
        </div>
        <button onclick="saveAndStart()" class="w-full py-1 bg-green-700 rounded text-[10px] font-bold uppercase">Lưu & Khởi chạy</button>
    </div>

    <div class="card grid grid-cols-2 gap-4">
        <div>Ví: <b id="totalWallet">0.00</b></div>
        <div>Khả dụng: <b id="availBalance">0.00</b></div>
        <div>Unl PnL: <b id="unrealizedPnL">0.00</b></div>
        <div>PnL Chốt: <b id="closedPnL">0.00</b></div>
    </div>

    <div class="card">
        <table class="w-full text-left text-[11px]">
            <tr class="text-zinc-600"><th>SYMBOL</th><th>1M</th><th>5M</th><th>15M</th></tr>
            <tbody id="candidate-list"></tbody>
        </table>
    </div>

    <div id="logs" class="card h-[120px] overflow-y-auto text-[10px] text-zinc-400"></div>

    <script>
        async function sync() {
            try {
                const res = await fetch('/api/status');
                const d = await res.json();
                document.getElementById('totalWallet').innerText = d.wallet.totalWalletBalance;
                document.getElementById('availBalance').innerText = d.wallet.availableBalance;
                document.getElementById('unrealizedPnL').innerText = d.wallet.totalUnrealizedProfit;
                document.getElementById('closedPnL').innerText = d.status.totalClosedPnL;

                document.getElementById('candidate-list').innerHTML = d.status.candidatesList.map(c => `
                    <tr><td class="text-zinc-300">${c.symbol.replace('USDT','')}</td>
                    <td class="${parseFloat(c.c1)>=0?'up':'down'}">${c.c1}%</td>
                    <td class="${parseFloat(c.c5)>=0?'up':'down'}">${c.c5}%</td>
                    <td class="${parseFloat(c.c15)>=0?'up':'down'}">${c.c15}%</td></tr>`).join('');

                document.getElementById('logs').innerHTML = d.status.botLogs.map(l => `<div>[${l.time}] ${l.msg}</div>`).join('');
            } catch(e) {}
        }

        async function saveAndStart() {
            const config = {
                capital: document.getElementById('capital').value,
                volVolatility: parseFloat(document.getElementById('volVolatility').value),
                maxPos: parseInt(document.getElementById('maxPos').value),
                dcaPercent: parseFloat(document.getElementById('dcaInterval').value),
                tp: parseFloat(document.getElementById('tp').value),
                sl: parseFloat(document.getElementById('sl').value),
                isRunning: true
            };
            await fetch('/api/settings', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(config) });
            alert("Đã lưu và khởi chạy!");
        }

        setInterval(sync, 1000);
        sync();
    </script>
</body>
</html>
