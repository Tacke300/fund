<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONCEY D. LUFFY BOT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background:#000; color:#eee; font-family:monospace; font-size:12px; }
        .card { background:#111; border:1px solid #222; padding:10px; border-radius:6px; }
        .up { color:#00ff88; } .down { color:#ff4444; }
        input { background:#000; border:1px solid #333; color:#fff; padding:4px; width:100%; border-radius:4px; text-align: center; }
        .logo { text-align:center; background:#0b0b0b; padding:15px; border-radius:6px; position: relative; overflow: hidden; border: 1px solid #00ff88; box-shadow: 0 0 10px rgba(0, 255, 136, 0.2); }
        .logo::before { content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 2px; background: #00ff88; box-shadow: 0 0 10px #00ff88; animation: scan 3s linear infinite; }
        @keyframes scan { 0% { left: -100%; } 100% { left: 100%; } }
        .posCard { background:#0f0f0f; border:1px solid #333; border-radius:8px; padding:10px; margin-bottom: 5px; }
    </style>
</head>
<body class="p-2 space-y-2 max-w-7xl mx-auto">

<div class="logo">
    <h1 class="text-green-400 text-xl font-black drop-shadow-[0_0_10px_rgba(0,255,136,0.8)]">🏴‍☠️ MONCEY D. LUFFY</h1>
    <p id="bot-ip" class="text-[10px] text-zinc-500">BOT IP: Loading...</p>
</div>

<!-- Tab Ví -->
<div class="card grid grid-cols-3 gap-2 text-center">
    <div><div class="text-[9px] text-zinc-500">Ví</div><div id="totalWallet" class="text-green-400 font-bold">0.00</div></div>
    <div><div class="text-[9px] text-zinc-500">Khả dụng</div><div id="availBalance" class="text-yellow-400 font-bold">0.00</div></div>
    <div><div class="text-[9px] text-zinc-500">Unrealized</div><div id="unrealizedPnL" class="font-bold">0.00</div></div>
</div>

<!-- Thống kê chốt -->
<div class="card grid grid-cols-3 gap-2 text-center">
    <div><div class="text-[9px] text-zinc-500">Đã chốt</div><div id="stat_closedCount" class="text-white font-bold">0</div></div>
    <div><div class="text-[9px] text-zinc-500">PnL Chốt</div><div id="stat_pnl" class="text-green-400 font-bold">0.00</div></div>
    <div><div class="text-[9px] text-zinc-500">DCA Chốt</div><div id="stat_dca" class="text-yellow-400 font-bold">0</div></div>
</div>

<!-- Cấu hình -->
<div id="configBox" class="card grid grid-cols-3 gap-2">
    <div><p class="text-[9px] text-zinc-500">Vốn</p><input id="c_capital" type="text" value="5.5"></div>
    <div><p class="text-[9px] text-zinc-500">Vol</p><input id="c_vol" type="number" value="6.5"></div>
    <div><p class="text-[9px] text-zinc-500">Max Pos</p><input id="c_maxPos" type="number" value="3"></div>
    <div><p class="text-[9px] text-zinc-500">DCA %</p><input id="c_dca" type="number" value="10"></div>
    <div><p class="text-[9px] text-zinc-500">TP %</p><input id="c_tp" type="number" value="0.5"></div>
    <div><p class="text-[9px] text-zinc-500">SL %</p><input id="c_sl" type="number" value="10"></div>
    <button onclick="saveConfig()" class="col-span-1 py-1 bg-blue-700 rounded text-[10px] font-bold">LƯU</button>
    <button onclick="startBot()" class="col-span-2 py-1 bg-green-700 rounded text-[10px] font-bold">START BOT</button>
</div>

<!-- Nút điều khiển -->
<div id="stopBox" class="hidden grid grid-cols-2 gap-2">
    <button onclick="stopBot()" class="py-2 bg-red-700 rounded font-bold">STOP BOT</button>
    <button onclick="closeAll()" class="py-2 bg-orange-700 rounded font-bold">CLOSE ALL</button>
</div>

<div id="positionsWrap" class="space-y-1"></div>

<!-- Thị trường -->
<div class="card overflow-x-auto">
    <div class="text-[10px] text-zinc-500 mb-1">📈 BIẾN ĐỘNG THỊ TRƯỜNG</div>
    <table class="w-full text-left text-[10px]">
        <thead><tr class="text-zinc-600"><th>COIN</th><th>1M</th><th>5M</th><th>15M</th></tr></thead>
        <tbody id="marketBody"></tbody>
    </table>
</div>

<div class="card"><div class="text-[10px] text-zinc-500 mb-1">📡 LOGS</div><div id="logs" class="h-[100px] overflow-y-auto text-[10px] text-zinc-400"></div></div>

<script>
async function sync() {
    try {
        const res = await fetch('/api/status');
        const d = await res.json();
        document.getElementById('bot-ip').innerText = 'BOT IP: ' + (d.botIp || '0.0.0.0');
        document.getElementById('totalWallet').innerText = d.wallet?.totalWalletBalance || '0.00';
        document.getElementById('availBalance').innerText = d.wallet?.availableBalance || '0.00';
        document.getElementById('unrealizedPnL').innerText = d.wallet?.totalUnrealizedProfit || '0.00';
        document.getElementById('stat_closedCount').innerText = d.status.botClosedCount;
        document.getElementById('stat_pnl').innerText = parseFloat(d.status.totalClosedPnL).toFixed(2);
        document.getElementById('stat_dca').innerText = d.status.totalDcaClosed;
        
        document.getElementById('positionsWrap').innerHTML = (d.activePositions || []).map(p => `
            <div class="posCard flex justify-between">
                <span>${p.symbol} (${p.side})</span>
                <span class="${p.pnl >= 0 ? 'up' : 'down'}">${parseFloat(p.pnl).toFixed(2)}%</span>
            </div>`).join('');

        document.getElementById('marketBody').innerHTML = (d.market || []).map(m => `
            <tr class="border-b border-zinc-900">
                <td class="font-bold">${m.symbol}</td>
                <td class="${m.c1>=0?'up':'down'}">${m.c1}%</td>
                <td class="${m.c5>=0?'up':'down'}">${m.c5}%</td>
                <td class="${m.c15>=0?'up':'down'}">${m.c15}%</td>
            </tr>`).join('');
            
        document.getElementById('logs').innerHTML = d.status.botLogs.map(l => `<div>[${l.time}] ${l.msg}</div>`).join('');
    } catch(e) {}
}

async function saveConfig() {
    const config = { capital: document.getElementById('c_capital').value, vol: document.getElementById('c_vol').value, maxPos: document.getElementById('c_maxPos').value, dca: document.getElementById('c_dca').value, tp: document.getElementById('c_tp').value, sl: document.getElementById('c_sl').value };
    await fetch('/api/config', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(config) });
    alert('Đã lưu!');
}

async function startBot() { await fetch('/api/start', { method: 'POST' }); location.reload(); }
async function stopBot() { await fetch('/api/stop', { method: 'POST' }); location.reload(); }
async function closeAll() { await fetch('/api/closeall', { method: 'POST' }); }
setInterval(sync, 2000); sync();
</script>
</body>
</html>
