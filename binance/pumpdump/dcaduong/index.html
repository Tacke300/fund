<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>LUFFY TRADING BOT</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    background:#000;
    color:#fff;
    font-family: monospace;
    font-size:12px;
}

.card{
    background:#111;
    border:1px solid #222;
    padding:10px;
    margin-bottom:8px;
    border-radius:6px;
}

.up{color:#00ff88}
.down{color:#ff4444}
.gray{color:#888}

.posCard{
    background:#0f0f0f;
    border:1px solid #333;
    padding:8px;
    margin-bottom:6px;
    border-radius:6px;
}

input{
    background:#000;
    border:1px solid #333;
    color:#fff;
    width:100%;
    text-align:center;
}

button{
    width:100%;
    padding:6px;
    font-size:11px;
}
</style>
</head>

<body class="p-2">

<!-- HEADER -->
<div class="card">
    <div class="text-green-400 font-bold text-lg">🏴‍☠️ LUFFY BOT DASHBOARD</div>
    <div id="bot-ip" class="gray">IP: loading...</div>
    <div id="bot-status" class="gray">status...</div>
</div>

<!-- WALLET -->
<div class="card grid grid-cols-3 gap-2 text-center">
    <div>
        <div class="gray">Total</div>
        <div id="wallet-total" class="text-green-400">0</div>
    </div>

    <div>
        <div class="gray">Available</div>
        <div id="wallet-avail" class="text-yellow-400">0</div>
    </div>

    <div>
        <div class="gray">PNL</div>
        <div id="wallet-pnl" class="text-blue-400">0</div>
    </div>
</div>

<!-- CONFIG -->
<div class="card" id="configBox">
    <div class="grid grid-cols-2 gap-2">

        <input id="capital" placeholder="Capital">
        <input id="vol" placeholder="Volatility">
        <input id="maxPos" placeholder="Max Pos">
        <input id="dca" placeholder="DCA %">

        <input id="tp" placeholder="TP %">
        <input id="sl" placeholder="SL %">

    </div>

    <div class="grid grid-cols-3 gap-2 mt-2">
        <button onclick="saveConfig()" class="bg-blue-700">SAVE</button>
        <button onclick="startBot()" class="bg-green-700">START</button>
        <button onclick="stopBot()" class="bg-red-700">STOP</button>
    </div>
</div>

<!-- POSITIONS -->
<div class="card">
    <div class="text-yellow-300 mb-2">📊 POSITIONS</div>
    <div id="positions"></div>
</div>

<!-- MARKET -->
<div class="card">
    <div class="text-yellow-300 mb-2">📈 MARKET (1m / 5m / 15m)</div>
    <table class="w-full text-[11px]">
        <thead>
            <tr class="text-gray-500">
                <th>COIN</th>
                <th>1m</th>
                <th>5m</th>
                <th>15m</th>
            </tr>
        </thead>
        <tbody id="market"></tbody>
    </table>
</div>

<!-- LOGS -->
<div class="card">
    <div class="text-yellow-300 mb-2">📡 LOGS</div>
    <div id="logs" class="h-[150px] overflow-y-auto"></div>
</div>

<script>

async function sync(){

const res = await fetch('/api/status');
const d = await res.json();

// BOT STATUS
document.getElementById('bot-ip').innerText = "IP: " + (d.botIp || "0.0.0.0");
document.getElementById('bot-status').innerText = d.botStatus;

// WALLET (placeholder backend nếu chưa có)
document.getElementById('wallet-total').innerText = d.wallet?.totalWalletBalance || "0";
document.getElementById('wallet-avail').innerText = d.wallet?.availableBalance || "0";
document.getElementById('wallet-pnl').innerText = d.wallet?.totalUnrealizedProfit || "0";

// POSITIONS FULL
document.getElementById('positions').innerHTML =
(d.activePositions || []).map(p => `
<div class="posCard">

<div class="flex justify-between">
<b>${p.symbol} (${p.side})</b>
<span class="${p.pnl>=0?'up':'down'}">${p.pnl.toFixed(2)}%</span>
</div>

<div>Entry: ${p.entryInitial}</div>
<div>Avg: ${p.avg}</div>
<div>Current: ${p.currentPrice}</div>

<div>TP: ${p.tp} | SL: ${p.sl}</div>

<div>DCA: ${p.dca}</div>

<div class="gray">Next DCA: ${p.nextDca}</div>

</div>
`).join('');

// MARKET
document.getElementById('market').innerHTML =
(d.market || []).map(m => `
<tr>
<td>${m.symbol}</td>
<td class="${m.c1>=0?'up':'down'}">${m.c1.toFixed(2)}</td>
<td class="${m.c5>=0?'up':'down'}">${m.c5.toFixed(2)}</td>
<td class="${m.c15>=0?'up':'down'}">${m.c15.toFixed(2)}</td>
</tr>
`).join('');

// LOGS
document.getElementById('logs').innerHTML =
(d.status.botLogs || []).map(l => `
<div class="${l.symbol?'up':'gray'}">
[${l.time}] ${l.symbol?`[${l.symbol}]`:''} ${l.msg}
</div>
`).join('');

}

async function saveConfig(){
await fetch('/api/config',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
capital:+capital.value,
volVolatility:+vol.value,
maxPos:+maxPos.value,
dcaPercent:+dca.value,
tp:+tp.value,
sl:+sl.value
})
});
alert("Saved");
}

async function startBot(){await fetch('/api/start',{method:'POST'})}
async function stopBot(){await fetch('/api/stop',{method:'POST'})}

setInterval(sync,2000);
sync();

</script>

</body>
</html>
