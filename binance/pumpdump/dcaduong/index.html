<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MONCEY D. LUFFY BOT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background:#000; color:#eee; font-family:monospace; font-size:12px; }
        .card { background:#111; border:1px solid #222; padding:10px; border-radius:6px; }
        .up { color:#00ff88; } .down { color:#ff4444; }
        input { background:#000; border:1px solid #333; color:#fff; padding:6px; width:100%; border-radius:4px; }
        .logo { text-align:center; background:#0b0b0b; padding:15px; border-radius:6px; position: relative; overflow: hidden; border: 1px solid #00ff88; box-shadow: 0 0 10px rgba(0, 255, 136, 0.2); }
        .logo::before { content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 2px; background: #00ff88; box-shadow: 0 0 10px #00ff88; animation: scan 3s linear infinite; }
        @keyframes scan { 0% { left: -100%; } 100% { left: 100%; } }
        .posCard { background:#0f0f0f; border:1px solid #333; border-radius:8px; padding:12px; margin-bottom: 10px; }
        ::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-thumb { background:#333; }
    </style>
</head>
<body class="p-2 space-y-3 max-w-7xl mx-auto">

<div class="logo">
    <h1 class="text-green-400 text-xl font-black drop-shadow-[0_0_10px_rgba(0,255,136,0.8)]">🏴‍☠️ MONCEY D. LUFFY</h1>
    <p id="bot-ip" class="text-[10px] text-zinc-500">BOT IP: Loading...</p>
</div>

<div class="card grid grid-cols-3 gap-3 text-center">
    <div><div class="text-[9px] text-zinc-500">Ví</div><div id="totalWallet" class="text-green-400 font-bold text-sm">0.00</div></div>
    <div><div class="text-[9px] text-zinc-500">Khả dụng</div><div id="availBalance" class="text-yellow-400 font-bold text-sm">0.00</div></div>
    <div><div class="text-[9px] text-zinc-500">Unrealized</div><div id="unrealizedPnL" class="font-bold text-sm">0.00</div></div>
</div>

<div class="card grid grid-cols-3 gap-3 text-center">
    <div><div class="text-[9px] text-zinc-500">Đã chốt</div><div id="stat_closedCount" class="text-white font-bold text-sm">0</div></div>
    <div><div class="text-[9px] text-zinc-500">PnL Chốt</div><div id="stat_pnl" class="text-green-400 font-bold text-sm">0.00</div></div>
    <div><div class="text-[9px] text-zinc-500">DCA Chốt</div><div id="stat_dca" class="text-yellow-400 font-bold text-sm">0</div></div>
</div>

<div id="configBox" class="card space-y-2">
    <div class="grid grid-cols-2 gap-2">
        <div><p class="text-[9px] text-zinc-500">Vốn</p><input id="c_capital" type="text" value="5.5"></div>
        <div><p class="text-[9px] text-zinc-500">Vol biến động</p><input id="c_vol" type="number" value="6.5"></div>
        <button onclick="startBot()" class="col-span-2 py-2 bg-green-700 hover:bg-green-600 rounded text-[11px] font-bold mt-2">START BOT</button>
    </div>
</div>

<div id="stopBox" class="hidden space-y-2">
    <button onclick="stopBot()" class="w-full py-2 bg-red-700 rounded text-white text-sm font-black">STOP BOT</button>
    <button onclick="closeAll()" class="w-full py-2 bg-orange-700 rounded text-white text-sm font-black">CLOSE ALL POSITIONS</button>
</div>

<div id="positionsWrap" class="space-y-1"></div>

<div class="card overflow-x-auto">
    <div class="text-[11px] text-zinc-500 mb-2">📈 BIẾN ĐỘNG THỊ TRƯỜNG</div>
    <table class="w-full text-left text-[10px]">
        <thead><tr class="text-zinc-500 border-b border-zinc-800"><th>COIN</th><th>PRICE</th><th>1M</th><th>5M</th><th>15M</th></tr></thead>
        <tbody id="marketBody"></tbody>
    </table>
</div>

<div class="card"><div class="text-[11px] text-zinc-500 mb-2">📡 LOGS</div><div id="logs" class="h-[150px] overflow-y-auto text-[10px] text-zinc-400 space-y-1"></div></div>

<script>
async function sync() {
    try {
        const res = await fetch('/api/status');
        const d = await res.json();
        document.getElementById('bot-ip').innerText = 'BOT IP: ' + (d.botIp || '0.0.0.0');
        document.getElementById('totalWallet').innerText = d.wallet?.totalWalletBalance || '0.00';
        document.getElementById('availBalance').innerText = d.wallet?.availableBalance || '0.00';
        document.getElementById('unrealizedPnL').innerText = d.wallet?.totalUnrealizedProfit || '0.00';
        document.getElementById('stat_closedCount').innerText = d.status.botClosedCount;
        document.getElementById('stat_pnl').innerText = parseFloat(d.status.totalClosedPnL).toFixed(2);
        document.getElementById('stat_dca').innerText = d.status.totalDcaClosed;
        
        document.getElementById('positionsWrap').innerHTML = (d.activePositions || []).map(p => `
            <div class="posCard">
                <div class="flex justify-between font-black"><span>${p.symbol}</span> <span class="${p.pnl >= 0 ? 'up' : 'down'}">${parseFloat(p.pnl).toFixed(2)}%</span></div>
                <div class="grid grid-cols-2 text-[10px] text-zinc-400 mt-1">
                    <div>${p.side} | ${p.lev}x</div> <div>DCA: ${p.dca}</div>
                </div>
            </div>`).join('');

        document.getElementById('marketBody').innerHTML = (d.market || []).map(m => `
            <tr class="border-b border-zinc-900">
                <td class="font-bold">${m.symbol}</td><td>${parseFloat(m.price).toFixed(4)}</td>
                <td class="${m.c1>=0?'up':'down'}">${m.c1}%</td><td class="${m.c5>=0?'up':'down'}">${m.c5}%</td><td class="${m.c15>=0?'up':'down'}">${m.c15}%</td>
            </tr>`).join('');
            
        document.getElementById('logs').innerHTML = d.status.botLogs.map(l => `<div>[${l.time}] ${l.msg}</div>`).join('');
    } catch(e) {}
}

async function startBot() { await fetch('/api/start', { method: 'POST' }); location.reload(); }
async function stopBot() { await fetch('/api/stop', { method: 'POST' }); location.reload(); }
async function closeAll() { await fetch('/api/closeall', { method: 'POST' }); }
setInterval(sync, 1000); sync();
</script>
</body>
</html>
