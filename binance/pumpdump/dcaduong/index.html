<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MONCEY D. LUFFY BOT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #eee; font-family: monospace; font-size: 12px; }
        .card { background: #111; border: 1px solid #222; padding: 10px; border-radius: 4px; }
        .up { color: #00ff88; } .down { color: #ff4444; }
        input { background: #000; border: 1px solid #333; color: #fff; padding: 6px; text-align: left; padding-left: 8px; border-radius: 3px; width: 100%; outline: none; font-size: 11px; }
        input:focus { border-color: #ef4444; }
        .bl-tag { background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; padding: 2px 5px; border-radius: 3px; color: #ef4444; font-size: 10px; display: flex; gap: 5px; align-items: center; }
        .logo-container { text-align: center; background: linear-gradient(180deg, #1c1917 0%, #000 100%); border: 1px solid #292524; padding: 15px 10px; border-radius: 6px; position: relative; overflow: hidden; }
        .logo-container::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, #ef4444, transparent); animation: laser 3s linear infinite; }
        @keyframes laser { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
    </style>
</head>
<body class="p-2 space-y-3 max-w-2xl mx-auto">

    <div class="logo-container my-1 select-none">
        <h1 class="text-2xl font-black tracking-widest text-red-500 font-serif drop-shadow-[0_2px_10px_rgba(239,68,68,0.4)]">🏴‍☠️ MONCEY D. LUFFY</h1>
        <p class="text-[10px] tracking-[0.4em] uppercase text-zinc-500 font-bold mt-1">Automated Futures Trading System</p>
        <p id="bot-ip" class="text-[11px] text-green-500 font-bold mt-2 tracking-wide">IP: Đang kiểm tra...</p>
    </div>

    <div class="card space-y-3">
        <div id="config-area" class="space-y-2">
            <div class="grid grid-cols-2 gap-2">
                <div>
                    <p class="text-[9px] text-zinc-500 uppercase mb-1">Vốn ($ hoặc %)</p>
                    <input id="capital" type="text" placeholder="Nhập số vốn...">
                </div>
                <div>
                    <p class="text-[9px] text-zinc-500 uppercase mb-1">Vol biến động</p>
                    <input id="volVolatility" type="number" step="any" placeholder="Nhập vol...">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <div>
                    <p class="text-[9px] text-zinc-500 uppercase mb-1">Max Position</p>
                    <input id="maxPos" type="number" placeholder="Số vị thế tối đa...">
                </div>
                <div>
                    <p class="text-[9px] text-zinc-500 uppercase mb-1">DCA Interval (%)</p>
                    <input id="dcaInterval" type="number" step="any" placeholder="% giá sẽ DCA...">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <div>
                    <p class="text-[9px] text-zinc-500 uppercase mb-1">Take Profit (TP %)</p>
                    <input id="tp" type="number" step="any" placeholder="Mục tiêu chốt lời...">
                </div>
                <div>
                    <p class="text-[9px] text-zinc-500 uppercase mb-1">Stop Loss (SL %)</p>
                    <input id="sl" type="number" step="any" placeholder="Mức dừng lỗ...">
                </div>
            </div>
        </div>

        <div id="action-area" class="space-y-2">
            <div class="grid grid-cols-2 gap-2">
                <button id="saveBtn" onclick="justSave()" class="py-2 bg-zinc-800 hover:bg-zinc-700 text-zinc-300 font-bold rounded border border-zinc-700 uppercase text-xs transition-all tracking-wider">Chỉ Lưu</button>
                <button id="startBtn" onclick="startBot()" class="py-2 bg-green-600 hover:bg-green-700 text-white font-black rounded border border-green-500 uppercase text-xs transition-all tracking-wider shadow-lg shadow-green-950/50">START BOT</button>
            </div>
            <button id="panicBtn" onclick="panicCloseAllOnExchange()" class="w-full py-2 bg-amber-950/40 text-amber-500 hover:bg-amber-900/60 hover:text-amber-400 font-bold rounded border border-amber-800 uppercase text-[11px] tracking-wide transition-all">⚠️ ĐÓNG TOÀN BỘ VỊ THẾ</button>
        </div>

        <div id="stop-area" class="hidden">
            <button onclick="stopBot()" class="w-full py-4 bg-red-600 hover:bg-red-700 text-white text-base font-black rounded border-2 border-red-400 uppercase tracking-widest transition-all shadow-xl shadow-red-950/80 animate-pulse">🛑 STOP BOT</button>
        </div>
    </div>

    <div class="card grid grid-cols-2 gap-4">
        <div class="space-y-1">
            <p class="text-[9px] text-zinc-500 uppercase">Tài khoản</p>
            <div class="flex justify-between"><span>Ví:</span> <b id="totalWallet">0.00</b></div>
            <div class="flex justify-between text-zinc-400"><span>Khả dụng:</span> <b id="availBalance">0.00</b></div>
            <div class="flex justify-between"><span>Unl PnL:</span> <b id="unrealizedPnL">0.00</b></div>
        </div>
        <div class="space-y-1 border-l border-zinc-800 pl-4">
            <p class="text-[9px] text-zinc-500 uppercase">Bot Stats</p>
            <div class="flex justify-between"><span>Đang mở:</span> <b id="openCount" class="text-yellow-500">0</b></div>
            <div class="flex justify-between"><span>Đã chốt:</span> <b id="closedCount">0</b></div>
            <div class="flex justify-between"><span>PnL chốt:</span> <b id="closedPnL">0.00</b></div>
        </div>
    </div>

    <div id="pos-list" class="space-y-2"></div>
    <div id="logs" class="card h-[130px] overflow-y-auto text-[10px] text-zinc-400 space-y-1 font-mono"></div>

    <script>
        function updateUIState(isRunning) {
            const configArea = document.getElementById('config-area');
            const actionArea = document.getElementById('action-area');
            const stopArea = document.getElementById('stop-area');
            if (isRunning) { configArea.classList.add('hidden'); actionArea.classList.add('hidden'); stopArea.classList.remove('hidden'); }
            else { configArea.classList.remove('hidden'); actionArea.classList.remove('hidden'); stopArea.classList.add('hidden'); }
        }

        function getConfigData() {
            return {
                capital: document.getElementById('capital').value.trim(),
                volVolatility: parseFloat(document.getElementById('volVolatility').value) || 0,
                maxPos: parseInt(document.getElementById('maxPos').value) || 0,
                dcaInterval: parseFloat(document.getElementById('dcaInterval').value) || 0,
                tp: parseFloat(document.getElementById('tp').value) || 0,
                sl: parseFloat(document.getElementById('sl').value) || 0
            };
        }

        async function loadKeysFromServer() {
            try {
                const r = await fetch('/api/status'); const d = await r.json();
                if (d.botSettings) {
                    if (d.botSettings.capital !== undefined) document.getElementById('capital').value = d.botSettings.capital;
                    if (d.botSettings.volVolatility !== undefined) document.getElementById('volVolatility').value = d.botSettings.volVolatility;
                    if (d.botSettings.maxPos !== undefined) document.getElementById('maxPos').value = d.botSettings.maxPos;
                    if (d.botSettings.dcaInterval !== undefined) document.getElementById('dcaInterval').value = d.botSettings.dcaInterval;
                    if (d.botSettings.tp !== undefined) document.getElementById('tp').value = d.botSettings.tp;
                    if (d.botSettings.sl !== undefined) document.getElementById('sl').value = d.botSettings.sl;
                    updateUIState(d.botSettings.isRunning);
                }
            } catch (e) {}
        }

        // ... [Giữ nguyên các hàm fetch khác như sync, justSave, startBot, stopBot, panicCloseAllOnExchange] ...
        // Đảm bảo sync() cập nhật đúng các biến đã sửa
        
        setInterval(sync, 400);
        window.onload = () => { loadKeysFromServer(); setTimeout(getRealBotIP, 1200); }
    </script>
</body>
</html>
