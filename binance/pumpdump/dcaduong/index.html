<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONCEY D. LUFFY BOT</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#000; color:#eee; font-family: monospace; font-size:12px; }
.card { background:#111; border:1px solid #222; padding:10px; border-radius:6px; }
.up { color:#00ff88; }
.down { color:#ff4444; }
input { background:#000; border:1px solid #333; color:#fff; padding:6px; width:100%; }
</style>
</head>

<body class="p-2 space-y-3 max-w-2xl mx-auto">

<!-- HEADER -->
<div class="card text-center">
    <h1 class="text-red-500 font-bold">🏴‍☠️ MONCEY D. LUFFY</h1>
    <p id="bot-ip" class="text-[10px] text-zinc-500">Đang kết nối...</p>
</div>

<!-- CẤU HÌNH -->
<div class="card space-y-2">
    <div class="grid grid-cols-2 gap-2">

        <div>
            <p class="text-[9px] text-zinc-500">Vốn</p>
            <input id="capital">
        </div>

        <div>
            <p class="text-[9px] text-zinc-500">Vol biến động</p>
            <input id="volVolatility">
        </div>

        <div>
            <p class="text-[9px] text-zinc-500">Max Position</p>
            <input id="maxPos">
        </div>

        <div>
            <p class="text-[9px] text-zinc-500">DCA (%)</p>
            <input id="dcaInterval">
        </div>

        <div>
            <p class="text-[9px] text-zinc-500">TP (%)</p>
            <input id="tp">
        </div>

        <div>
            <p class="text-[9px] text-zinc-500">SL (%)</p>
            <input id="sl">
        </div>

    </div>
</div>

<!-- WALLET (ĐÃ FIX TEXT THEO YÊU CẦU) -->
<div class="card grid grid-cols-3 gap-2 text-center">

    <div>
        <div class="text-[10px] text-zinc-500">Ví</div>
        <div id="totalWallet" class="text-green-400 font-bold">0.00</div>
    </div>

    <div>
        <div class="text-[10px] text-zinc-500">Khả dụng</div>
        <div id="availBalance" class="text-yellow-400 font-bold">0.00</div>
    </div>

    <div>
        <div class="text-[10px] text-zinc-500">PnL</div>
        <div id="unrealizedPnL" class="font-bold">0.00</div>
    </div>

</div>

<!-- STATS -->
<div class="card grid grid-cols-2 gap-4">
    <div>
        <div class="text-[10px] text-zinc-500">Đang mở</div>
        <div id="openCount">0</div>
    </div>

    <div>
        <div class="text-[10px] text-zinc-500">Đã chốt</div>
        <div id="closedCount">0</div>
    </div>

    <div>
        <div class="text-[10px] text-zinc-500">PnL chốt</div>
        <div id="closedPnL">0.00</div>
    </div>
</div>

<!-- BẢNG VỊ THẾ -->
<div class="card">
<table class="w-full text-[11px]">
<tr class="text-zinc-500">
<th>COIN</th><th>LEV</th><th>MARGIN</th><th>QTY</th><th>ENTRY</th><th>AVG</th><th>TP</th><th>SL</th><th>DCA</th>
</tr>
<tbody id="pos"></tbody>
</table>
</div>

<!-- LOGS -->
<div id="logs" class="card h-40 overflow-y-auto text-[10px] text-zinc-400"></div>

<script>

async function sync() {

    const r = await fetch('/api/status');
    const d = await r.json();

    document.getElementById('totalWallet').innerText =
        d.wallet.totalWalletBalance;

    document.getElementById('availBalance').innerText =
        d.wallet.availableBalance;

    document.getElementById('unrealizedPnL').innerText =
        d.wallet.totalUnrealizedProfit;

    document.getElementById('openCount').innerText =
        d.activePositions.length;

    document.getElementById('closedCount').innerText =
        d.status.botClosedCount;

    document.getElementById('closedPnL').innerText =
        d.status.totalClosedPnL;

    document.getElementById('pos').innerHTML =
        d.activePositions.map(p => `
<tr>
<td>${p.symbol}</td>
<td>${p.lev}x</td>
<td>${p.margin}</td>
<td>${p.qty.toFixed(4)}</td>
<td>${p.entry.toFixed(4)}</td>
<td>${p.avg.toFixed(4)}</td>
<td class="up">${p.tp.toFixed(4)}</td>
<td class="down">${p.sl.toFixed(4)}</td>
<td>${p.dca}</td>
</tr>`).join('');

    document.getElementById('logs').innerHTML =
        d.status.botLogs.map(l =>
            `<div>[${l.time}] ${l.msg}</div>`
        ).join('');
}

setInterval(sync, 1000);

</script>

</body>
</html>
