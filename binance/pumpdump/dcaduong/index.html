<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONCEY D. LUFFY BOT</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background:#000;
    color:#eee;
    font-family: monospace;
    font-size: 12px;
}

.card {
    background:#111;
    border:1px solid #222;
    padding:10px;
    border-radius:6px;
}

.posCard {
    background:#0f0f0f;
    border:1px solid #333;
    border-radius:8px;
    padding:10px;
    margin-bottom:6px;
}

.up { color:#00ff88; }
.down { color:#ff4444; }

input {
    background:#000;
    border:1px solid #333;
    color:#fff;
    padding:6px;
    width:100%;
    border-radius:4px;
    text-align:center;
    font-size:12px;
}

button {
    font-size:12px;
}

/* MOBILE FIX */
@media (max-width: 768px) {
    body { font-size: 11px; }

    .grid {
        grid-template-columns: 1fr !important;
    }

    table {
        font-size: 10px;
    }

    .posCard {
        font-size: 11px;
    }

    button {
        padding:10px;
    }
}
</style>
</head>

<body class="p-2 max-w-7xl mx-auto space-y-2">

<!-- HEADER -->
<div class="card text-center border-green-500">
    <h1 class="text-green-400 text-lg font-black">🏴‍☠️ MONCEY D. LUFFY BOT</h1>
    <p id="bot-ip" class="text-[10px] text-zinc-500">BOT IP: loading...</p>
</div>

<!-- WALLET -->
<div class="card grid grid-cols-3 gap-2 text-center">
    <div>
        <div class="text-[10px] text-zinc-500">Ví</div>
        <div id="totalWallet" class="text-green-400 font-bold">0</div>
    </div>
    <div>
        <div class="text-[10px] text-zinc-500">Khả dụng</div>
        <div id="availBalance" class="text-yellow-400 font-bold">0</div>
    </div>
    <div>
        <div class="text-[10px] text-zinc-500">PnL</div>
        <div id="unrealizedPnL" class="font-bold">0</div>
    </div>
</div>

<!-- CONFIG -->
<div id="configWrapper" class="space-y-2">
    <div class="card grid grid-cols-3 gap-2">
        <input id="c_capital" placeholder="Vốn">
        <input id="c_vol" placeholder="Vol">
        <input id="c_maxPos" placeholder="Max Pos">
        <input id="c_dca" placeholder="DCA %">
        <input id="c_tp" placeholder="TP %">
        <input id="c_sl" placeholder="SL %">
    </div>

    <div class="grid grid-cols-3 gap-2">
        <button onclick="saveConfig()" class="bg-blue-700 py-2 rounded">SAVE</button>
        <button onclick="startBot()" class="bg-green-700 py-2 rounded">START</button>
        <button onclick="closeAll()" class="bg-orange-700 py-2 rounded">CLOSE</button>
    </div>
</div>

<!-- STOP -->
<div id="stopWrapper" class="hidden">
    <button onclick="stopBot()" class="w-full py-5 bg-red-700 rounded text-lg font-black">
        STOP BOT
    </button>
</div>

<!-- POSITIONS -->
<div class="card">
    <div class="text-[10px] text-zinc-500 mb-1">📊 POSITIONS</div>
    <div id="positionsWrap"></div>
</div>

<!-- MARKET -->
<div class="card overflow-x-auto">
    <div class="text-[10px] text-zinc-500 mb-1">📈 TOP 10 VOLATILITY</div>
    <table class="w-full text-left text-[10px]">
        <thead>
            <tr class="text-zinc-500">
                <th>COIN</th><th>1M</th><th>5M</th><th>15M</th>
            </tr>
        </thead>
        <tbody id="marketBody"></tbody>
    </table>
</div>

<!-- LOGS -->
<div class="card">
    <div class="text-[10px] text-zinc-500 mb-1">📡 LOGS</div>
    <div id="logs" class="h-[120px] overflow-y-auto text-[10px]"></div>
</div>

<script>
async function sync() {
    try {
        const res = await fetch('/api/status');
        const d = await res.json();

        // wallet
        document.getElementById('bot-ip').innerText = 'BOT: LIVE';

        // positions
        document.getElementById('positionsWrap').innerHTML =
        (d.activePositions || []).map(p => `
            <div class="posCard">
                <div class="flex justify-between">
                    <b>${p.symbol} (${p.side})</b>
                    <span class="${p.pnl>=0?'up':'down'}">
                        ${p.pnl?.toFixed(2) ?? 0}%
                    </span>
                </div>

                <div>Entry: ${p.entryInitial}</div>
                <div>Avg: ${p.avg}</div>
                <div>Current: ${p.currentPrice}</div>

                <div>TP: ${p.tp}</div>
                <div>SL: ${p.sl}</div>

                <div>DCA: ${p.dcaLevel}</div>
                <div>Next DCA: ${p.nextDcaPrice}</div>

                <div>LEV: ${p.lev} | MARGIN: ${p.margin}</div>
            </div>
        `).join('');

        // market
        document.getElementById('marketBody').innerHTML =
        (d.market || []).map(m => `
            <tr>
                <td>${m.symbol}</td>
                <td class="${m.c15>=0?'up':'down'}">${m.c15?.toFixed(2)}</td>
                <td>-</td>
                <td>-</td>
            </tr>
        `).join('');

        // logs
        document.getElementById('logs').innerHTML =
        (d.status?.botLogs || []).map(l =>
            `[${l.time}] ${l.symbol ? '['+l.symbol+']' : ''} ${l.msg}`
        ).join('<br>');

    } catch(e) {}
}

async function saveConfig() {
    await fetch('/api/config', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
            capital:+c_capital.value,
            volVolatility:+c_vol.value,
            maxPos:+c_maxPos.value,
            dcaPercent:+c_dca.value,
            tp:+c_tp.value,
            sl:+c_sl.value
        })
    });
}

async function startBot(){ await fetch('/api/start',{method:'POST'}); }
async function stopBot(){ await fetch('/api/stop',{method:'POST'}); }
async function closeAll(){ await fetch('/api/closeall',{method:'POST'}); }

setInterval(sync, 2000);
sync();
</script>

</body>
</html>
