<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MONCEY D. LUFFY BOT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #eee; font-family: monospace; font-size: 12px; }
        .card { background: #111; border: 1px solid #222; padding: 10px; border-radius: 4px; }
        .up { color: #00ff88; } .down { color: #ff4444; }
        input { background: #000; border: 1px solid #333; color: #fff; padding: 6px; text-align: left; padding-left: 8px; border-radius: 3px; width: 100%; outline: none; font-size: 11px; }
        .bl-tag { background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; padding: 2px 5px; border-radius: 3px; color: #ef4444; font-size: 10px; display: flex; gap: 5px; align-items: center; }
        .logo-container { text-align: center; background: linear-gradient(180deg, #1c1917 0%, #000 100%); border: 1px solid #292524; padding: 15px 10px; border-radius: 6px; position: relative; overflow: hidden; }
        .logo-container::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, #ef4444, transparent); animation: laser 3s linear infinite; }
        @keyframes laser { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
    </style>
</head>
<body class="p-2 space-y-3 max-w-2xl mx-auto">

    <div class="logo-container my-1 select-none">
        <h1 class="text-2xl font-black tracking-widest text-red-500 font-serif">🏴‍☠️ MONCEY D. LUFFY</h1>
        <p id="bot-ip" class="text-[11px] text-green-500 font-bold mt-2">IP: Đang kiểm tra...</p>
    </div>

    <div class="card space-y-3">
        <div id="config-area" class="space-y-2">
            <div class="grid grid-cols-2 gap-2">
                <div><p class="text-[9px] text-zinc-500 uppercase">Vốn ($ hoặc %)</p><input id="capital" type="text"></div>
                <div><p class="text-[9px] text-zinc-500 uppercase">Vol biến động</p><input id="volVolatility" type="number" step="any"></div>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <div><p class="text-[9px] text-zinc-500 uppercase">Max Position</p><input id="maxPos" type="number"></div>
                <div><p class="text-[9px] text-zinc-500 uppercase">DCA Interval (%)</p><input id="dcaInterval" type="number" step="any"></div>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <div><p class="text-[9px] text-zinc-500 uppercase">Take Profit (%)</p><input id="tp" type="number" step="any"></div>
                <div><p class="text-[9px] text-zinc-500 uppercase">Stop Loss (%)</p><input id="sl" type="number" step="any"></div>
            </div>
        </div>
        <div id="action-area" class="space-y-2">
            <div class="grid grid-cols-2 gap-2">
                <button onclick="justSave()" class="py-2 bg-zinc-800 hover:bg-zinc-700 rounded text-xs font-bold uppercase">Chỉ Lưu</button>
                <button onclick="startBot()" class="py-2 bg-green-600 hover:bg-green-700 rounded text-xs font-black uppercase">START BOT</button>
            </div>
            <button onclick="panicCloseAllOnExchange()" class="w-full py-2 bg-amber-950/40 text-amber-500 border border-amber-800 rounded uppercase text-[11px]">⚠️ ĐÓNG TOÀN BỘ VỊ THẾ</button>
        </div>
        <div id="stop-area" class="hidden"><button onclick="stopBot()" class="w-full py-4 bg-red-600 rounded font-black uppercase animate-pulse">🛑 STOP BOT</button></div>
    </div>

    <div class="card grid grid-cols-2 gap-4">
        <div>
            <p class="text-[9px] text-zinc-500 uppercase">Tài khoản</p>
            <div>Ví: <b id="totalWallet">0.00</b></div>
            <div>Unl PnL: <b id="unrealizedPnL">0.00</b></div>
        </div>
        <div class="border-l border-zinc-800 pl-4">
            <p class="text-[9px] text-zinc-500 uppercase">Bot Stats</p>
            <div>Đang mở: <b id="openCount" class="text-yellow-500">0</b></div>
            <div>Đã chốt: <b id="closedCount">0</b></div>
        </div>
    </div>

    <div id="blacklist-display" class="card flex flex-wrap gap-2 min-h-[35px] items-center"></div>
    <div id="pos-list" class="space-y-2"></div>

    <div class="card">
        <table class="w-full text-left text-[11px]">
            <tr class="text-zinc-500 border-b border-zinc-800"><th>SYMBOL</th><th align="right">1M</th><th align="right">5M</th><th align="right">15M</th></tr>
            <tbody id="candidate-list"></tbody>
        </table>
    </div>

    <div id="logs" class="card h-[130px] overflow-y-auto text-[10px] text-zinc-400 space-y-1 font-mono"></div>

    <script>
        // Giữ nguyên logic cũ của bạn
        function getConfigData() {
            return {
                capital: document.getElementById('capital').value.trim(),
                volVolatility: parseFloat(document.getElementById('volVolatility').value) || 0,
                maxPos: parseInt(document.getElementById('maxPos').value) || 0,
                dcaInterval: parseFloat(document.getElementById('dcaInterval').value) || 0,
                tp: parseFloat(document.getElementById('tp').value) || 0,
                sl: parseFloat(document.getElementById('sl').value) || 0
            };
        }

        async function sync() {
            try {
                const r = await fetch('/api/status'); const d = await r.json();
                document.getElementById('totalWallet').innerText = d.wallet.totalWalletBalance;
                document.getElementById('unrealizedPnL').innerText = d.wallet.totalUnrealizedProfit;
                document.getElementById('openCount').innerText = d.activePositions.length;
                document.getElementById('closedCount').innerText = d.status.botClosedCount;
                
                // Render List
                document.getElementById('pos-list').innerHTML = d.activePositions.map(p => `
                    <div class="card border-l-2 ${p.side === 'LONG' ? 'border-green-500' : 'border-red-500'}">
                        <div class="flex justify-between text-[10px]"><b>${p.symbol}</b> <span>${p.side} | DCA: ${p.dcaCount}</span></div>
                        <div class="flex justify-between font-bold"><span>Entry: ${p.entryPrice}</span><span class="${p.pnl>=0?'up':'down'}">${p.pnl.toFixed(2)}$</span></div>
                    </div>`).join('');

                document.getElementById('candidate-list').innerHTML = d.status.candidatesList.slice(0,10).map(c => `
                    <tr class="border-b border-zinc-900">
                        <td class="py-1 font-bold text-zinc-300">${c.symbol.replace('USDT','')}</td>
                        <td align="right" class="${parseFloat(c.c1)>=0?'up':'down'}">${c.c1}%</td>
                        <td align="right" class="${parseFloat(c.c5)>=0?'up':'down'}">${c.c5}%</td>
                        <td align="right" class="${parseFloat(c.c15)>=0?'up':'down'}">${c.c15}%</td>
                    </tr>`).join('');

                document.getElementById('logs').innerHTML = d.status.botLogs.map(l => `<div>[${l.time}] ${l.msg}</div>`).join('');
            } catch (e) {}
        }

        setInterval(sync, 1000);
        window.onload = () => { /* Gọi loadKeysFromServer() ở đây */ };
    </script>
</body>
</html>
