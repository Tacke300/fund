<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>MONCEY D. LUFFY BOT</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
    background:#000;
    color:#eee;
    font-family:monospace;
    font-size:12px;
}

.card{
    background:#111;
    border:1px solid #222;
    padding:10px;
    border-radius:6px;
}

.up{
    color:#00ff88;
}

.down{
    color:#ff4444;
}

input{
    background:#000;
    border:1px solid #333;
    color:#fff;
    padding:6px;
    width:100%;
    border-radius:4px;
}

.logo{
    text-align:center;
    background:#0b0b0b;
    border:1px solid #222;
    padding:10px;
    border-radius:6px;
}

.posCard{
    background:#0f0f0f;
    border:1px solid #222;
    border-radius:8px;
    padding:10px;
}

::-webkit-scrollbar{
    width:4px;
}

::-webkit-scrollbar-thumb{
    background:#333;
}

</style>
</head>

<body class="p-2 space-y-3 max-w-7xl mx-auto">

<!-- HEADER -->
<div class="logo">

    <h1 class="text-red-500 text-xl font-black">
        🏴‍☠️ MONCEY D. LUFFY
    </h1>

    <p id="bot-ip" class="text-[10px] text-zinc-500">
        BOT IP: loading...
    </p>

</div>

<!-- CONFIG -->
<div id="configBox" class="card space-y-2">

    <div class="grid grid-cols-2 gap-2">

        <div>
            <p class="text-[9px] text-zinc-500">Vốn</p>
            <input id="capital" type="text">
        </div>

        <div>
            <p class="text-[9px] text-zinc-500">Vol biến động</p>
            <input id="volVolatility" type="number">
        </div>

        <div>
            <p class="text-[9px] text-zinc-500">Max Position</p>
            <input id="maxPos" type="number">
        </div>

        <div>
            <p class="text-[9px] text-zinc-500">DCA (%)</p>
            <input id="dcaInterval" type="number" step="any">
        </div>

        <div>
            <p class="text-[9px] text-zinc-500">TP (%)</p>
            <input id="tp" type="number" step="any">
        </div>

        <div>
            <p class="text-[9px] text-zinc-500">SL (%)</p>
            <input id="sl" type="number" step="any">
        </div>

    </div>

    <div class="grid grid-cols-2 gap-2 pt-2">

        <button
            onclick="startBot()"
            class="py-2 bg-green-700 hover:bg-green-600 rounded text-[11px] font-bold">
            START BOT
        </button>

        <button
            onclick="panicCloseAllOnExchange()"
            class="py-2 bg-red-900/30 text-red-500 border border-red-800 rounded text-[11px] font-bold">
            CLOSE ALL
        </button>

    </div>

</div>

<!-- STOP -->
<div id="stopBox" class="hidden">

    <button
        onclick="stopBot()"
        class="w-full py-3 bg-red-700 rounded text-white text-sm font-black">

        STOP BOT

    </button>

</div>

<!-- WALLET -->
<div class="card grid grid-cols-3 gap-3 text-center">

    <div>
        <div class="text-[10px] text-zinc-500">
            Ví
        </div>

        <div id="totalWallet" class="text-green-400 font-bold text-sm">
            0.00
        </div>
    </div>

    <div>
        <div class="text-[10px] text-zinc-500">
            Khả dụng
        </div>

        <div id="availBalance" class="text-yellow-400 font-bold text-sm">
            0.00
        </div>
    </div>

    <div>
        <div class="text-[10px] text-zinc-500">
            Unrealized
        </div>

        <div id="unrealizedPnL" class="font-bold text-sm">
            0.00
        </div>
    </div>

</div>

<!-- STATS -->
<div class="card grid grid-cols-4 gap-3 text-center">

    <div>
        <div class="text-[10px] text-zinc-500">
            Đang mở
        </div>

        <div id="openCount" class="font-bold">
            0
        </div>
    </div>

    <div>
        <div class="text-[10px] text-zinc-500">
            Đã chốt
        </div>

        <div id="closedCount" class="font-bold">
            0
        </div>
    </div>

    <div>
        <div class="text-[10px] text-zinc-500">
            Đã DCA
        </div>

        <div id="dcaClosed" class="font-bold">
            0
        </div>
    </div>

    <div>
        <div class="text-[10px] text-zinc-500">
            Closed PnL
        </div>

        <div id="closedPnL" class="font-bold">
            0.00
        </div>
    </div>

</div>

<!-- BIẾN ĐỘNG -->
<div class="card overflow-x-auto">

    <div class="text-[11px] text-zinc-500 mb-2">
        📈 BIẾN ĐỘNG THỊ TRƯỜNG
    </div>

    <table class="w-full text-left text-[10px]">

        <thead>

            <tr class="border-b border-zinc-800 text-zinc-500">

                <th class="py-2">COIN</th>
                <th>PRICE</th>
                <th>1M</th>
                <th>5M</th>
                <th>15M</th>

            </tr>

        </thead>

        <tbody id="marketBody"></tbody>

    </table>

</div>

<!-- POSITIONS -->
<div class="space-y-3" id="positionsWrap"></div>

<!-- LOGS -->
<div class="card">

    <div class="text-[11px] text-zinc-500 mb-2">
        📡 LOGS
    </div>

    <div
        id="logs"
        class="h-[240px] overflow-y-auto text-[10px] text-zinc-400 space-y-1">
    </div>

</div>

<script>

async function sync(){

    try{

        const r = await fetch('/api/status');
        const d = await r.json();

        document.getElementById('bot-ip').innerText =
            'BOT IP: ' + (d.botIp || 'UNKNOWN');

        document.getElementById('totalWallet').innerText =
            d.wallet?.totalWalletBalance || '0.00';

        document.getElementById('availBalance').innerText =
            d.wallet?.availableBalance || '0.00';

        document.getElementById('unrealizedPnL').innerText =
            d.wallet?.totalUnrealizedProfit || '0.00';

        document.getElementById('openCount').innerText =
            d.activePositions?.length || 0;

        document.getElementById('closedCount').innerText =
            d.status?.botClosedCount || 0;

        document.getElementById('closedPnL').innerText =
            parseFloat(d.status?.totalClosedPnL || 0).toFixed(2);

        document.getElementById('dcaClosed').innerText =
            d.status?.totalDcaClosed || 0;

        if(d.market){

            document.getElementById('marketBody').innerHTML =
                d.market.map(m => `

<tr class="border-b border-zinc-900">

<td class="py-2 font-bold">
${m.symbol}
</td>

<td class="text-yellow-400">
${parseFloat(m.price).toFixed(6)}
</td>

<td class="${m.c1 >= 0 ? 'up' : 'down'}">
${m.c1.toFixed(2)}%
</td>

<td class="${m.c5 >= 0 ? 'up' : 'down'}">
${m.c5.toFixed(2)}%
</td>

<td class="${m.c15 >= 0 ? 'up' : 'down'}">
${m.c15.toFixed(2)}%
</td>

</tr>

`).join('');
        }

        if(d.activePositions){

            document.getElementById('positionsWrap').innerHTML =
                d.activePositions.map(p => {

                    const pnl =
                        parseFloat(p.pnl || 0);

                    return `

<div class="posCard">

<div class="flex justify-between items-center mb-3">

<div class="font-black text-sm ${p.side === 'LONG' ? 'up' : 'down'}">
${p.symbol} ${p.side}
</div>

<div class="font-black ${pnl >= 0 ? 'up' : 'down'}">
${pnl.toFixed(2)}%
</div>

</div>

<div class="grid grid-cols-2 gap-2 text-[10px]">

<div>LEV: <span class="text-yellow-400">${p.lev}x</span></div>
<div>MARGIN: <span class="text-cyan-400">${parseFloat(p.margin).toFixed(2)}</span></div>

<div>QTY: ${parseFloat(p.qty).toFixed(4)}</div>
<div>DCA: ${p.dca}</div>

<div>ENTRY: ${parseFloat(p.entry).toFixed(6)}</div>
<div>AVG: <span class="text-cyan-400">${parseFloat(p.avg).toFixed(6)}</span></div>

<div>TP: <span class="up">${parseFloat(p.tp).toFixed(6)}</span></div>
<div>SL: <span class="down">${parseFloat(p.sl).toFixed(6)}</span></div>

<div>NEXT DCA: ${parseFloat(p.nextDca).toFixed(6)}</div>

<div>
AVG+1:
<span class="text-yellow-400">
${(p.side === 'LONG'
? p.avg * 1.01
: p.avg * 0.99).toFixed(6)}
</span>
</div>

</div>

</div>

`;

                }).join('');
        }

        if(d.status?.botLogs){

            document.getElementById('logs').innerHTML =
                d.status.botLogs.map(l => `

<div>

<span class="text-zinc-600">
[${l.time}]
</span>

${l.msg}

</div>

`).join('');
        }

    }catch(e){}
}

async function startBot(){

    await fetch('/api/start',{
        method:'POST'
    });

    document.getElementById('configBox')
        .classList.add('hidden');

    document.getElementById('stopBox')
        .classList.remove('hidden');
}

async function stopBot(){

    await fetch('/api/stop',{
        method:'POST'
    });

    document.getElementById('configBox')
        .classList.remove('hidden');

    document.getElementById('stopBox')
        .classList.add('hidden');
}

async function panicCloseAllOnExchange(){

    await fetch('/api/closeall',{
        method:'POST'
    });
}

setInterval(sync,1000);

sync();

</script>

</body>
</html>
