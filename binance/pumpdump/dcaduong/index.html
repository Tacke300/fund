<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONCEY D. LUFFY BOT</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
    background:#000;
    color:#e5e5e5;
    font-family:monospace;
    font-size:12px;
}

.card{
    background:#0f0f0f;
    border:1px solid #1f1f1f;
    border-radius:10px;
    padding:10px;
}

.title{
    text-align:center;
    border:1px solid #00ff88;
    border-radius:10px;
    padding:14px;
    background:#080808;
}

.up{
    color:#00ff88;
}

.down{
    color:#ff4d4d;
}

input{
    width:100%;
    background:#000;
    border:1px solid #333;
    border-radius:6px;
    padding:7px;
    color:#fff;
    text-align:center;
    font-size:12px;
}

button{
    border-radius:8px;
    font-weight:bold;
    padding:10px;
}

.posCard{
    background:#111;
    border:1px solid #222;
    border-radius:8px;
    padding:10px;
}

::-webkit-scrollbar{
    width:4px;
}

::-webkit-scrollbar-thumb{
    background:#333;
}

@media(max-width:768px){

    body{
        font-size:11px;
    }

    .mobileGrid{
        grid-template-columns:1fr 1fr;
    }

}

</style>
</head>

<body class="p-2 max-w-7xl mx-auto space-y-2">

<!-- HEADER -->
<div class="title">
    <div class="text-green-400 text-xl font-black">
        🏴‍☠️ MONCEY D. LUFFY BOT
    </div>

    <div id="bot-ip" class="text-zinc-500 text-[10px] mt-1">
        BOT LOADING...
    </div>
</div>

<!-- WALLET -->
<div class="grid grid-cols-3 gap-2 mobileGrid">

    <div class="card text-center">
        <div class="text-zinc-500 text-[10px]">
            WALLET
        </div>

        <div id="totalWallet"
             class="text-green-400 text-lg font-bold">
            0
        </div>
    </div>

    <div class="card text-center">
        <div class="text-zinc-500 text-[10px]">
            FREE
        </div>

        <div id="availBalance"
             class="text-yellow-400 text-lg font-bold">
            0
        </div>
    </div>

    <div class="card text-center">
        <div class="text-zinc-500 text-[10px]">
            PNL
        </div>

        <div id="unrealizedPnL"
             class="text-lg font-bold">
            0
        </div>
    </div>

</div>

<!-- STATS -->
<div class="grid grid-cols-4 gap-2 mobileGrid">

    <div class="card text-center">
        <div class="text-zinc-500 text-[10px]">
            OPEN
        </div>

        <div id="openPos"
             class="font-bold text-green-400">
            0
        </div>
    </div>

    <div class="card text-center">
        <div class="text-zinc-500 text-[10px]">
            CLOSED
        </div>

        <div id="closedPos"
             class="font-bold text-red-400">
            0
        </div>
    </div>

    <div class="card text-center">
        <div class="text-zinc-500 text-[10px]">
            DCA
        </div>

        <div id="totalDca"
             class="font-bold text-yellow-400">
            0
        </div>
    </div>

    <div class="card text-center">
        <div class="text-zinc-500 text-[10px]">
            TOTAL %
        </div>

        <div id="totalPnl"
             class="font-bold text-cyan-400">
            0
        </div>
    </div>

</div>

<!-- BUTTONS -->
<div class="grid grid-cols-3 gap-2">

    <button onclick="startBot()"
            class="bg-green-700">
        START
    </button>

    <button onclick="stopBot()"
            class="bg-red-700">
        STOP
    </button>

    <button onclick="closeAll()"
            class="bg-orange-700">
        CLOSE ALL
    </button>

</div>

<!-- CONFIG -->
<div class="card">

    <div class="text-zinc-500 mb-2">
        ⚙ CONFIG
    </div>

    <div class="grid grid-cols-2 gap-2">

        <input id="c_capital"
               placeholder="Capital"
               value="5">

        <input id="c_vol"
               placeholder="Volatility"
               value="5">

        <input id="c_maxPos"
               placeholder="Max Position"
               value="5">

        <input id="c_dca"
               placeholder="DCA %"
               value="10">

        <input id="c_tp"
               placeholder="TP %"
               value="0.5">

        <input id="c_sl"
               placeholder="SL %"
               value="10">

    </div>

    <button onclick="saveConfig()"
            class="bg-blue-700 w-full mt-2">
        SAVE CONFIG
    </button>

</div>

<!-- POSITIONS -->
<div class="card">

    <div class="text-zinc-500 mb-2">
        📊 OPEN POSITIONS
    </div>

    <div id="positionsWrap"
         class="space-y-2">
    </div>

</div>

<!-- VOLATILITY -->
<div class="card overflow-x-auto">

    <div class="text-zinc-500 mb-2">
        📈 TOP 10 VOLATILITY
    </div>

    <table class="w-full text-[10px]">

        <thead>

        <tr class="text-zinc-500 border-b border-zinc-800">

            <th class="py-1 text-left">
                COIN
            </th>

            <th class="py-1 text-center">
                1M
            </th>

            <th class="py-1 text-center">
                5M
            </th>

            <th class="py-1 text-center">
                15M
            </th>

            <th class="py-1 text-center">
                PRICE
            </th>

        </tr>

        </thead>

        <tbody id="marketBody"></tbody>

    </table>

</div>

<!-- LOGS -->
<div class="card">

    <div class="text-zinc-500 mb-2">
        📡 LIVE LOGS
    </div>

    <div id="logs"
         class="h-[220px] overflow-y-auto text-[10px] leading-5">
    </div>

</div>

<script>

async function sync(){

    try{

        const res =
            await fetch('/api/status');

        const d =
            await res.json();

        // STATUS

        document.getElementById('bot-ip')
            .innerText =
            `BOT ${d.botStatus}`;

        // WALLET

        document.getElementById('totalWallet')
            .innerText =
            d.wallet?.totalWalletBalance || 0;

        document.getElementById('availBalance')
            .innerText =
            d.wallet?.availableBalance || 0;

        document.getElementById('unrealizedPnL')
            .innerText =
            d.wallet?.totalUnrealizedProfit || 0;

        // STATS

        document.getElementById('openPos')
            .innerText =
            d.stats?.openPositions || 0;

        document.getElementById('closedPos')
            .innerText =
            d.stats?.totalClosed || 0;

        document.getElementById('totalDca')
            .innerText =
            d.stats?.totalDca || 0;

        document.getElementById('totalPnl')
            .innerText =
            d.stats?.totalPnl || 0;

        // POSITIONS

        document.getElementById('positionsWrap')
            .innerHTML =

            (d.activePositions || [])

            .map(p => `

            <div class="posCard">

                <div class="flex justify-between items-center">

                    <div class="font-bold">

                        ${p.symbol}

                        <span class="${
                            p.side === 'LONG'
                            ? 'up'
                            : 'down'
                        }">

                            ${p.side}

                        </span>

                    </div>

                    <div class="${
                        p.pnl >= 0
                        ? 'up'
                        : 'down'
                    } font-bold text-[14px]">

                        ${Number(
                            p.pnl || 0
                        ).toFixed(2)}%

                    </div>

                </div>

                <div class="grid grid-cols-2 gap-1 mt-2 text-[10px]">

                    <div>
                        ENTRY:
                        ${Number(
                            p.entryInitial || 0
                        ).toFixed(6)}
                    </div>

                    <div>
                        REALTIME:
                        ${Number(
                            p.currentPrice || 0
                        ).toFixed(6)}
                    </div>

                    <div>
                        AVG:
                        ${Number(
                            p.avg || 0
                        ).toFixed(6)}
                    </div>

                    <div>
                        LEV:
                        ${p.lev}
                    </div>

                    <div>
                        TP:
                        ${Number(
                            p.tp || 0
                        ).toFixed(6)}
                    </div>

                    <div>
                        SL:
                        ${Number(
                            p.sl || 0
                        ).toFixed(6)}
                    </div>

                    <div>
                        DCA:
                        ${p.dcaLevel}
                    </div>

                    <div>
                        NEXT:
                        ${Number(
                            p.nextDcaPrice || 0
                        ).toFixed(6)}
                    </div>

                    <div>
                        MARGIN:
                        ${p.margin}
                    </div>

                    <div>
                        QTY:
                        ${p.qty}
                    </div>

                </div>

                <div class="mt-2 text-[10px] text-zinc-400">

                    1M:
                    <span class="${
                        p.snapshot?.c1 >= 0
                        ? 'up'
                        : 'down'
                    }">

                        ${p.snapshot?.c1}%

                    </span>

                    |

                    5M:
                    <span class="${
                        p.snapshot?.c5 >= 0
                        ? 'up'
                        : 'down'
                    }">

                        ${p.snapshot?.c5}%

                    </span>

                    |

                    15M:
                    <span class="${
                        p.snapshot?.c15 >= 0
                        ? 'up'
                        : 'down'
                    }">

                        ${p.snapshot?.c15}%

                    </span>

                </div>

            </div>

            `).join('');

        // MARKET

        document.getElementById('marketBody')
            .innerHTML =

            (d.market || [])

            .map(m => `

            <tr class="border-b border-zinc-900">

                <td class="py-1 font-bold">

                    ${m.symbol}

                </td>

                <td class="text-center ${
                    m.c1 >= 0
                    ? 'up'
                    : 'down'
                }">

                    ${Number(
                        m.c1 || 0
                    ).toFixed(2)}%

                </td>

                <td class="text-center ${
                    m.c5 >= 0
                    ? 'up'
                    : 'down'
                }">

                    ${Number(
                        m.c5 || 0
                    ).toFixed(2)}%

                </td>

                <td class="text-center ${
                    m.c15 >= 0
                    ? 'up'
                    : 'down'
                }">

                    ${Number(
                        m.c15 || 0
                    ).toFixed(2)}%

                </td>

                <td class="text-center">

                    ${Number(
                        m.price || 0
                    ).toFixed(6)}

                </td>

            </tr>

            `).join('');

        // LOGS

        document.getElementById('logs')
            .innerHTML =

            (d.logs || [])

            .slice(0, 100)

            .map(l => `

                <div>

                    <span class="text-zinc-500">
                        [${l.time}]
                    </span>

                    <span class="text-cyan-400">
                        ${l.symbol || ''}
                    </span>

                    ${l.msg}

                </div>

            `).join('');

    }catch(e){}
}

async function saveConfig(){

    await fetch('/api/config',{

        method:'POST',

        headers:{
            'Content-Type':'application/json'
        },

        body:JSON.stringify({

            capital:
                Number(c_capital.value),

            volVolatility:
                Number(c_vol.value),

            maxPos:
                Number(c_maxPos.value),

            dcaPercent:
                Number(c_dca.value),

            tp:
                Number(c_tp.value),

            sl:
                Number(c_sl.value)

        })
    });
}

async function startBot(){

    await fetch('/api/start',{
        method:'POST'
    });
}

async function stopBot(){

    await fetch('/api/stop',{
        method:'POST'
    });
}

async function closeAll(){

    await fetch('/api/closeall',{
        method:'POST'
    });
}

setInterval(sync,200);

sync();

</script>

</body>
</html>
