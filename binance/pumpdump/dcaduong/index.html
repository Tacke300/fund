<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MONCEY D. LUFFY BOT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background:#000; color:#eee; font-family:monospace; font-size:12px; }
        .card { background:#111; border:1px solid #222; padding:10px; border-radius:6px; }
        .up { color:#00ff88; }
        .down { color:#ff4444; }
        input { background:#000; border:1px solid #333; color:#fff; padding:6px; width:100%; border-radius:4px; }
        .logo { text-align:center; background:#0b0b0b; border:1px solid #222; padding:10px; border-radius:6px; }
        .posCard { background:#0f0f0f; border:1px solid #333; border-radius:8px; padding:12px; margin-bottom: 10px; }
        ::-webkit-scrollbar { width:4px; }
        ::-webkit-scrollbar-thumb { background:#333; }
        .hidden { display: none; }
    </style>
</head>

<body class="p-2 space-y-3 max-w-7xl mx-auto">

<div class="logo">
    <h1 class="text-red-500 text-xl font-black">🏴‍☠️ MONCEY D. LUFFY</h1>
    <p id="bot-ip" class="text-[10px] text-zinc-500">BOT IP: Loading...</p>
</div>

<div id="configBox" class="card space-y-2">
    <div class="grid grid-cols-2 gap-2">
        <div><p class="text-[9px] text-zinc-500">Vốn</p><input id="c_capital" type="text" value="5.5"></div>
        <div><p class="text-[9px] text-zinc-500">Vol biến động</p><input id="c_vol" type="number" value="6.5"></div>
        <div><p class="text-[9px] text-zinc-500">Max Position</p><input id="c_maxPos" type="number" value="3"></div>
        <div><p class="text-[9px] text-zinc-500">DCA (%)</p><input id="c_dca" type="number" step="any" value="10"></div>
        <div><p class="text-[9px] text-zinc-500">TP (%)</p><input id="c_tp" type="number" step="any" value="0.5"></div>
        <div><p class="text-[9px] text-zinc-500">SL (%)</p><input id="c_sl" type="number" step="any" value="10"></div>
    </div>
    <button onclick="startBot()" class="w-full py-2 bg-green-700 hover:bg-green-600 rounded text-[11px] font-bold mt-2">START BOT</button>
</div>

<div id="stopBox" class="hidden">
    <button onclick="stopBot()" class="w-full py-3 bg-red-700 rounded text-white text-sm font-black">STOP BOT</button>
</div>

<div class="card grid grid-cols-3 gap-3 text-center">
    <div><div class="text-[10px] text-zinc-500">Ví</div><div id="totalWallet" class="text-green-400 font-bold text-sm">0.00</div></div>
    <div><div class="text-[10px] text-zinc-500">Khả dụng</div><div id="availBalance" class="text-yellow-400 font-bold text-sm">0.00</div></div>
    <div><div class="text-[10px] text-zinc-500">Unrealized</div><div id="unrealizedPnL" class="font-bold text-sm">0.00</div></div>
</div>

<div id="positionsWrap" class="space-y-1"></div>

<div class="card overflow-x-auto">
    <div class="text-[11px] text-zinc-500 mb-2">📈 BIẾN ĐỘNG THỊ TRƯỜNG</div>
    <table class="w-full text-left text-[10px]">
        <thead><tr class="border-b border-zinc-800 text-zinc-500"><th class="py-2">COIN</th><th>PRICE</th><th>1M</th><th>5M</th><th>15M</th></tr></thead>
        <tbody id="marketBody"></tbody>
    </table>
</div>

<div class="card"><div class="text-[11px] text-zinc-500 mb-2">📡 LOGS</div><div id="logs" class="h-[200px] overflow-y-auto text-[10px] text-zinc-400 space-y-1"></div></div>

<script>
async function sync() {
    try {
        const res = await fetch('/api/status');
        const d = await res.json();

        document.getElementById('bot-ip').innerText = 'BOT IP: ' + (d.botIp || '0.0.0.0');
        document.getElementById('totalWallet').innerText = d.wallet?.totalWalletBalance || '0.00';
        document.getElementById('availBalance').innerText = d.wallet?.availableBalance || '0.00';
        document.getElementById('unrealizedPnL').innerText = d.wallet?.totalUnrealizedProfit || '0.00';

        // Render Positions (Từng card riêng lẻ)
        document.getElementById('positionsWrap').innerHTML = (d.activePositions || []).map(p => {
            const pnl = parseFloat(p.pnl || 0);
            const sideColor = p.side === 'LONG' ? 'text-green-400' : 'text-red-400';
            return `
                <div class="posCard">
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-black text-sm">${p.symbol}</span>
                        <span class="font-bold ${sideColor} border px-1 rounded border-zinc-700">${p.side}</span>
                        <span class="font-black ${pnl >= 0 ? 'up' : 'down'}">${pnl.toFixed(2)}%</span>
                    </div>
                    <div class="grid grid-cols-2 gap-x-2 text-[10px] text-zinc-300">
                        <div>Lev: <span class="text-white">${p.lev}x</span></div>
                        <div>Margin: <span class="text-white">${parseFloat(p.margin).toFixed(2)}</span></div>
                        <div>Entry: <span class="text-white">${parseFloat(p.entry).toFixed(6)}</span></div>
                        <div>Price: <span class="text-yellow-400">${parseFloat(p.markPrice || 0).toFixed(6)}</span></div>
                        <div>Qty: <span class="text-white">${parseFloat(p.qty).toFixed(4)}</span></div>
                        <div>DCA Count: <span class="text-white">${p.dca}</span></div>
                        <div>TP: <span class="up">${parseFloat(p.tp).toFixed(6)}</span></div>
                        <div>SL: <span class="down">${parseFloat(p.sl).toFixed(6)}</span></div>
                        <div class="col-span-2 mt-1 border-t border-zinc-800 pt-1 text-purple-300">
                            Next DCA: ${parseFloat(p.nextDca || 0).toFixed(6)}
                        </div>
                    </div>
                </div>
            `;
        }).join('');

        // Render Market
        if (d.market) {
            document.getElementById('marketBody').innerHTML = d.market.map(m => `
                <tr class="border-b border-zinc-900">
                    <td class="py-2 font-bold">${m.symbol}</td>
                    <td class="text-yellow-400">${parseFloat(m.price).toFixed(4)}</td>
                    <td class="${m.c1 >= 0 ? 'up' : 'down'}">${m.c1.toFixed(2)}%</td>
                    <td class="${m.c5 >= 0 ? 'up' : 'down'}">${m.c5.toFixed(2)}%</td>
                    <td class="${m.c15 >= 0 ? 'up' : 'down'}">${m.c15.toFixed(2)}%</td>
                </tr>
            `).join('');
        }
    } catch(e) { console.error("Sync Error", e); }
}

async function startBot() {
    await fetch('/api/start', { method: 'POST' });
    document.getElementById('configBox').classList.add('hidden');
    document.getElementById('stopBox').classList.remove('hidden');
}

async function stopBot() {
    await fetch('/api/stop', { method: 'POST' });
    document.getElementById('configBox').classList.remove('hidden');
    document.getElementById('stopBox').classList.add('hidden');
}

setInterval(sync, 1000);
sync();
</script>
</body>
</html>
