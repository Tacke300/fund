<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUFFY BOT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #eee; font-family: monospace; font-size: 12px; }
        .card { background: #111; border: 1px solid #222; padding: 10px; border-radius: 4px; }
        .up { color: #00ff88; } .down { color: #ff4444; }
        input { background: #000; border: 1px solid #333; color: #fff; padding: 5px; text-align: center; border-radius: 3px; width: 100%; outline: none; }
        .bl-tag { background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; padding: 2px 5px; border-radius: 3px; color: #ef4444; font-size: 10px; display: flex; gap: 5px; }
        .bl-time { font-weight: bold; color: #fff; }
    </style>
</head>
<body class="p-2 space-y-3">
    <!-- CẤU HÌNH BOT -->
    <div class="card grid grid-cols-5 gap-2">
        <div><p class="text-[9px] text-zinc-500 uppercase">Vốn</p><input id="invValue"></div>
        <div><p class="text-[9px] text-zinc-500 uppercase">Max Vị Thế</p><input id="maxPositions"></div>
        <div><p class="text-[9px] text-zinc-500 uppercase">Vol%</p><input id="minVol"></div>
        <div><p class="text-[9px] text-green-500 uppercase">TP%</p><input id="posTP"></div>
        <div><p class="text-[9px] text-red-500 uppercase">SL%</p><input id="posSL"></div>
        
        <div class="col-span-5 grid grid-cols-3 gap-2 mt-1">
            <div><p class="text-[9px] text-yellow-500 uppercase">Khoảng cách DCA Dương (%)</p><input id="posdca"></div>
            <div><p class="text-[9px] text-yellow-500 uppercase">Max Lượt Nhồi DCA</p><input id="maxDCA"></div>
            <div><p class="text-[9px] text-zinc-500 uppercase">Địa Ngục Vol</p><input id="diangucvol"></div>
        </div>

        <div class="col-span-5 grid grid-cols-2 gap-2 mt-2">
            <button id="runBtn" onclick="toggle()" class="py-2 font-bold border rounded uppercase"></button>
            <button onclick="save()" class="py-2 bg-zinc-800 text-white font-bold rounded border border-zinc-600 uppercase">Lưu Cấu Hình</button>
        </div>
    </div>

    <!-- THÔNG TIN TÀI KHOẢN -->
    <div class="card grid grid-cols-2 gap-4">
        <div class="space-y-1">
            <p class="text-[9px] text-zinc-500 uppercase">Tài khoản</p>
            <div class="flex justify-between"><span>Ví:</span> <b id="totalWallet">0.00</b></div>
            <div class="flex justify-between text-zinc-400"><span>Khả dụng:</span> <b id="availBalance">0.00</b></div>
            <div class="flex justify-between"><span>Unl PnL:</span> <b id="unrealizedPnL">0.00</b></div>
        </div>
        <div class="space-y-1 border-l border-zinc-800 pl-4">
            <p class="text-[9px] text-zinc-500 uppercase">Bot Stats</p>
            <div class="flex justify-between"><span>Đang mở:</span> <b id="openCount" class="text-yellow-500">0</b></div>
            <div class="flex justify-between"><span>Đã chốt:</span> <b id="closedCount">0</b></div>
            <div class="flex justify-between"><span>PnL chốt:</span> <b id="closedPnL">0.00</b></div>
        </div>
    </div>

    <!-- DANH SÁCH BLACKLIST -->
    <div class="card flex flex-wrap gap-2 min-h-[25px]" id="blacklist-display"></div>

    <!-- VỊ THẾ ĐANG GIAO DỊCH -->
    <div id="pos-list" class="space-y-2"></div>

    <!-- DANH SÁCH TÍN HIỆU TIỀM NĂNG -->
    <div class="card">
        <table class="w-full text-left text-[11px]">
            <tr class="text-zinc-500 border-b border-zinc-800">
                <th>SYMBOL</th><th align="right">1M</th><th align="right">5M</th><th align="right">15M</th>
            </tr>
            <tbody id="candidate-list"></tbody>
        </table>
    </div>

    <!-- NHẬT KÝ HOẠT ĐỘNG (LOGS) -->
    <div id="logs" class="card h-[120px] overflow-y-auto text-[10px] text-zinc-400 space-y-1 font-mono"></div>

    <script>
        function fmtTime(s) { 
            return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`; 
        }

        async function sync() {
            try {
                const r = await fetch('/api/status'); 
                const d = await r.json();
                
                document.getElementById('totalWallet').innerText = d.wallet.totalWalletBalance;
                document.getElementById('availBalance').innerText = d.wallet.availableBalance;
                document.getElementById('unrealizedPnL').innerText = d.wallet.totalUnrealizedProfit;
                document.getElementById('unrealizedPnL').className = parseFloat(d.wallet.totalUnrealizedProfit) >= 0 ? 'up' : 'down';
                
                document.getElementById('openCount').innerText = d.activePositions.length;
                document.getElementById('closedCount').innerText = d.status.botClosedCount;
                document.getElementById('closedPnL').innerText = d.status.botPnLClosed.toFixed(2);

                document.getElementById('blacklist-display').innerHTML = Object.entries(d.status.blackList)
                    .map(([s, val]) => `<span class="bl-tag">${s.replace('USDT','')} <span class="bl-time">${val}</span></span>`).join('');

                document.getElementById('candidate-list').innerHTML = d.status.candidatesList.slice(0,10).map(c => `
                    <tr class="border-b border-zinc-900">
                        <td class="py-1 font-bold">${c.symbol.replace('USDT','')}</td>
                        <td align="right" class="${parseFloat(c.c1)>=0?'up':'down'}">${c.c1}%</td>
                        <td align="right" class="${parseFloat(c.c5)>=0?'up':'down'}">${c.c5}%</td>
                        <td align="right" class="${parseFloat(c.c15)>=0?'up':'down'}">${c.c15}%</td>
                    </tr>`).join('');

                document.getElementById('pos-list').innerHTML = d.activePositions.map(p => `
                    <div class="card border-l-2 ${p.side === 'LONG' ? 'border-green-500' : 'border-red-500'} bg-zinc-950 p-2">
                        <div class="flex justify-between items-center">
                            <div>
                                <div class="font-bold text-white uppercase">${p.symbol} <span class="text-[10px] text-zinc-500">${p.side} x${p.leverage}</span></div>
                                <div class="text-[9px] text-zinc-400">Entry Gốc: ${p.firstEntry} | TP: ${p.tp.toFixed(4)}</div>
                            </div>
                            <div class="text-right">
                                <div class="${p.pnl>=0?'up':'down'} font-black text-sm">${p.pnl.toFixed(2)}$</div>
                                <div class="text-[9px] text-zinc-500">Lãi Xu Hướng: ${p.priceDev.toFixed(2)}% | Nhồi: ${p.dcaCount} Lần</div>
                            </div>
                        </div>
                    </div>`).join('');

                document.getElementById('logs').innerHTML = d.status.botLogs.map(l => `<div>[${l.time}] ${l.msg}</div>`).join('');
                
                document.getElementById('runBtn').innerText = d.botSettings.isRunning ? "STOP BOT" : "START BOT";
                if (d.botSettings.isRunning) {
                    document.getElementById('runBtn').className = "py-2 rounded border-red-500 text-red-500 bg-red-950/20 font-bold uppercase";
                } else {
                    document.getElementById('runBtn').className = "py-2 rounded border-green-500 text-green-500 bg-green-950/20 font-bold uppercase";
                }
            } catch (e) {}
        }

        async function toggle() {
            const r = await fetch('/api/status'); 
            const d = await r.json();
            await fetch('/api/settings', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ isRunning: !d.botSettings.isRunning }) 
            });
            await sync();
        }

        async function save() {
            const body = { 
                invValue: document.getElementById('invValue').value,
                maxPositions: parseInt(document.getElementById('maxPositions').value),
                minVol: parseFloat(document.getElementById('minVol').value),
                posTP: parseFloat(document.getElementById('posTP').value),
                posSL: parseFloat(document.getElementById('posSL').value),
                posdca: parseFloat(document.getElementById('posdca').value),
                maxDCA: parseInt(document.getElementById('maxDCA').value),
                diangucvol: parseFloat(document.getElementById('diangucvol').value)
            };
            const response = await fetch('/api/settings', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify(body) 
            });
            const result = await response.json();
            if(result.success) {
                alert("ĐÃ LƯU ĐỒNG BỘ TOÀN BỘ THÔNG SỐ");
                await sync();
            }
        }

        setInterval(sync, 1000);
        window.onload = () => {
            fetch('/api/status').then(r => r.json()).then(d => {
                document.getElementById('invValue').value = d.botSettings.invValue;
                document.getElementById('maxPositions').value = d.botSettings.maxPositions;
                document.getElementById('minVol').value = d.botSettings.minVol;
                document.getElementById('posTP').value = d.botSettings.posTP;
                document.getElementById('posSL').value = d.botSettings.posSL;
                document.getElementById('posdca').value = d.botSettings.posdca || 3;
                document.getElementById('maxDCA').value = d.botSettings.maxDCA || 5;
                document.getElementById('diangucvol').value = d.botSettings.diangucvol || 15;
                sync();
            });
        }
    </script>
</body>
</html>
