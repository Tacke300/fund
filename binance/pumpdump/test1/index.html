<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Binance Futures Dashboard</title>
    <style>
        :root { --bg: #121212; --panel: #1e1e1e; --text: #e0e0e0; --primary: #00bcd4; --success: #4caf50; --danger: #f44336; --warn: #ff9800; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        .panel { background: var(--panel); padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h2 { margin-top: 0; color: var(--primary); border-bottom: 1px solid #333; padding-bottom: 10px; font-size: 18px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #aaa; }
        .form-group input { width: 100%; padding: 8px; box-sizing: border-box; background: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 4px; }
        button { background: var(--primary); color: #000; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; width: 100%; transition: 0.2s; }
        button:hover { opacity: 0.8; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-success { background: var(--success); color: #fff; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #333; }
        th { color: #aaa; }
        .text-green { color: var(--success); }
        .text-red { color: var(--danger); }
        .log-box { background: #000; color: #0f0; padding: 10px; height: 250px; overflow-y: auto; font-family: monospace; font-size: 12px; border-radius: 4px; }
        .log-error { color: var(--danger); } .log-warn { color: var(--warn); } .log-success { color: var(--success); }
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <!-- Cột trái: Cài đặt -->
    <div class="panel">
        <h2>⚙️ Cài đặt Bot <span id="botStatusBadge" style="float:right; font-size:12px; padding:3px 8px; border-radius:10px; background:#444;">Đang tải...</span></h2>
        
        <div class="grid-2">
            <div class="form-group"><label>Trạng thái Bot</label>
                <select id="isRunning" style="width:100%; padding:8px; background:#2a2a2a; color:#fff; border:1px solid #444;">
                    <option value="true">BẬT (Running)</option>
                    <option value="false">TẮT (Paused)</option>
                </select>
            </div>
            <div class="form-group"><label>Số lệnh tối đa</label><input type="number" id="maxPositions"></div>
            <div class="form-group"><label>Vốn vào lệnh (USD hoặc %)</label><input type="text" id="invValue"></div>
            <div class="form-group"><label>Vol tối thiểu (Triệu $)</label><input type="number" id="minVol"></div>
            <div class="form-group"><label>Chốt lời TP (%)</label><input type="number" id="posTP" step="0.1"></div>
            <div class="form-group"><label>Cắt lỗ SL (%)</label><input type="number" id="posSL" step="0.1"></div>
            <div class="form-group"><label>Khoảng cách nhồi DCA (%)</label><input type="number" id="posdca" step="0.1"></div>
            <div class="form-group"><label>Giới hạn nhồi DCA (Lần)</label><input type="number" id="maxDCA"></div>
        </div>

        <h3 style="font-size: 14px; margin-top: 10px; color:#aaa;">Hệ Số DCA Vốn</h3>
        <div class="grid-2">
            <div class="form-group"><label>Hệ số Thường (Vd: 1)</label><input type="number" id="heSoThuong" step="0.1"></div>
            <div class="form-group"><label>Hệ số Địa Ngục (Vd: 2)</label><input type="number" id="heSoDianguc" step="0.1"></div>
        </div>

        <h3 style="font-size: 14px; margin-top: 10px; color:#aaa;">Chế Độ Địa Ngục (Bắt Đáy/Đỉnh)</h3>
        <div class="grid-2">
            <div class="form-group"><label>Vol kích hoạt ĐN (Triệu $)</label><input type="number" id="diangucvol"></div>
            <div class="form-group"><label>Khoảng nhồi ĐN (%)</label><input type="number" id="diangucdca" step="0.1"></div>
            <div class="form-group"><label>TP ĐN (%)</label><input type="number" id="dianguctp" step="0.1"></div>
            <div class="form-group"><label>SL ĐN (%)</label><input type="number" id="diangucsl" step="0.1"></div>
        </div>

        <button onclick="saveSettings()" style="margin-top: 10px;">LƯU CÀI ĐẶT</button>
        <button onclick="panicCloseAll()" class="btn-danger" style="margin-top: 10px;">PANIC CLOSE (ĐÓNG TẤT CẢ)</button>
    </div>

    <!-- Cột phải: Vị thế & Log -->
    <div>
        <div class="panel" style="margin-bottom: 20px;">
            <h2>💼 Ví & Vị thế hiện tại</h2>
            <div style="display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: bold;">
                <span>Tổng vốn: <span id="walletTotal" class="text-green">0.00$</span></span>
                <span>Khả dụng: <span id="walletAvail">0.00$</span></span>
                <span>PnL: <span id="walletPnl">0.00$</span></span>
            </div>
            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Coin</th>
                            <th>Side</th>
                            <th>Margin</th>
                            <th>Giá Avg</th>
                            <th>Giá Trực Tiếp</th>
                            <th>DCA</th>
                            <th>PnL</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="positionTable"><tr><td colspan="8" style="text-align:center;">Đang tải dữ liệu...</td></tr></tbody>
                </table>
            </div>
        </div>

        <div class="panel">
            <h2>📜 Nhật ký hoạt động (Logs)</h2>
            <div class="log-box" id="logBox"></div>
        </div>
    </div>
</div>

<script>
    let isFirstLoad = true;

    async function fetchData() {
        try {
            const res = await fetch('/api/status');
            const data = await res.json();
            
            // Render Ví
            document.getElementById('walletTotal').innerText = data.wallet.totalWalletBalance + '$';
            document.getElementById('walletAvail').innerText = data.wallet.availableBalance + '$';
            const pnlLabel = document.getElementById('walletPnl');
            pnlLabel.innerText = data.wallet.totalUnrealizedProfit + '$';
            pnlLabel.className = parseFloat(data.wallet.totalUnrealizedProfit) >= 0 ? 'text-green' : 'text-red';

            // Render Trạng thái Bot
            const badge = document.getElementById('botStatusBadge');
            if(data.botSettings.isRunning) {
                badge.innerText = 'ĐANG CHẠY'; badge.style.background = 'var(--success)';
            } else {
                badge.innerText = 'ĐÃ DỪNG'; badge.style.background = 'var(--danger)';
            }

            // Fill Cài đặt (chỉ fill 1 lần khi mới mở web để tránh ghi đè lúc đang gõ)
            if(isFirstLoad) {
                for (let key in data.botSettings) {
                    const el = document.getElementById(key);
                    if (el) {
                        if (key === 'isRunning') el.value = data.botSettings[key].toString();
                        else el.value = data.botSettings[key];
                    }
                }
                isFirstLoad = false;
            }

            // Render Bảng Vị Thế
            const tbody = document.getElementById('positionTable');
            tbody.innerHTML = '';
            if (data.activePositions.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; color:#777;">Không có vị thế nào đang mở</td></tr>';
            } else {
                data.activePositions.forEach(p => {
                    const tr = document.createElement('tr');
                    const pnlClass = p.pnl >= 0 ? 'text-green' : 'text-red';
                    tr.innerHTML = `
                        <td><strong>${p.symbol}</strong> ${p.isDiangucMode ? '🔥' : ''}</td>
                        <td class="${p.side === 'LONG' ? 'text-green' : 'text-red'}">${p.side}</td>
                        <td>${p.currentMargin.toFixed(2)}$</td>
                        <td>${p.avgEntry.toFixed(4)}</td>
                        <td>${p.livePrice.toFixed(4)}</td>
                        <td>${p.dcaCount}/${data.botSettings.maxDCA}</td>
                        <td class="${pnlClass}">${p.pnl.toFixed(2)}$ (${p.profitPercent.toFixed(2)}%)</td>
                        <td><button class="btn-danger" style="padding: 5px 10px; font-size:12px;" onclick="closePosition('${p.symbol}', '${p.side}')">Đóng</button></td>
                    `;
                    tbody.appendChild(tr);
                });
            }

            // Render Logs
            const logBox = document.getElementById('logBox');
            logBox.innerHTML = data.status.botLogs.map(l => {
                let colorClass = '';
                if(l.type === 'error') colorClass = 'log-error';
                else if(l.type === 'success') colorClass = 'log-success';
                else if(l.type === 'warn') colorClass = 'log-warn';
                return `<div class="${colorClass}">[${l.time}] ${l.msg}</div>`;
            }).join('');

        } catch (error) { console.error("Lỗi kết nối:", error); }
    }

    async function saveSettings() {
        const payload = {
            isRunning: document.getElementById('isRunning').value === 'true',
            maxPositions: parseInt(document.getElementById('maxPositions').value),
            invValue: document.getElementById('invValue').value,
            minVol: parseFloat(document.getElementById('minVol').value),
            posTP: parseFloat(document.getElementById('posTP').value),
            posSL: parseFloat(document.getElementById('posSL').value),
            posdca: parseFloat(document.getElementById('posdca').value),
            maxDCA: parseInt(document.getElementById('maxDCA').value),
            heSoThuong: parseFloat(document.getElementById('heSoThuong').value),
            heSoDianguc: parseFloat(document.getElementById('heSoDianguc').value),
            diangucvol: parseFloat(document.getElementById('diangucvol').value),
            diangucdca: parseFloat(document.getElementById('diangucdca').value),
            dianguctp: parseFloat(document.getElementById('dianguctp').value),
            diangucsl: parseFloat(document.getElementById('diangucsl').value)
        };

        try {
            await fetch('/api/settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            alert("✅ Đã lưu cài đặt thành công!");
            fetchData();
        } catch(e) { alert("❌ Lỗi lưu cài đặt!"); }
    }

    async function closePosition(symbol, side) {
        if(!confirm(`Xác nhận đóng MARKET vị thế ${side} ${symbol}?`)) return;
        try {
            await fetch('/api/close_position', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ symbol, side })
            });
            fetchData();
        } catch(e) { alert("Lỗi hệ thống"); }
    }

    async function panicCloseAll() {
        if(!confirm("⚠️ NGUY HIỂM: Bạn có chắc chắn muốn CHỐT TOÀN BỘ các lệnh đang mở bằng giá MARKET ngay lập tức không?")) return;
        try {
            await fetch('/api/close_all', { method: 'POST' });
            alert("Đã gửi lệnh Panic Close!");
            fetchData();
        } catch(e) { alert("Lỗi hệ thống"); }
    }

    // Refresh dữ liệu mỗi 2 giây
    setInterval(fetchData, 2000);
    fetchData();
</script>
</body>
</html>
