<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUFFY v18.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #eee; font-family: monospace; font-size: 11px; }
        .card { background: #111; border: 1px solid #222; padding: 10px; border-radius: 4px; }
        .up { color: #00ff88; } .down { color: #ff4444; }
        input, select { background: #000; border: 1px solid #333; color: #fff; padding: 5px; border-radius: 3px; width: 100%; text-align: center; }
    </style>
</head>
<body class="p-2 space-y-2">
    <div class="card space-y-2">
        <div class="grid grid-cols-3 gap-2">
            <div><p class="text-[9px] text-zinc-500">VỐN</p><input id="invValue" type="number"></div>
            <div><p class="text-[9px] text-zinc-500">LOẠI</p><select id="invType"><option value="percent">%</option><option value="fixed">$</option></select></div>
            <div><p class="text-[9px] text-zinc-500">MAX POS</p><input id="maxPositions" type="number"></div>
        </div>
        <div class="grid grid-cols-3 gap-2">
            <div><p class="text-[9px] text-zinc-500">VOL%</p><input id="minVol" type="number"></div>
            <div><p class="text-[9px] text-green-500">TP%</p><input id="posTP" type="number"></div>
            <div><p class="text-[9px] text-red-500">SL%</p><input id="posSL" type="number"></div>
        </div>
        <div class="flex gap-2">
            <button onclick="save()" class="flex-1 bg-zinc-800 py-2 font-bold">LƯU</button>
            <button id="runBtn" onclick="toggle()" class="flex-[2] py-2 font-black border"></button>
        </div>
    </div>

    <div class="card">
        <div class="text-[9px] text-red-500 mb-1 font-bold">🔒 BLACKLIST (15M)</div>
        <div id="blacklist-display" class="flex flex-wrap gap-1"></div>
    </div>

    <div id="logs" class="card h-[80px] overflow-y-auto text-[10px]"></div>
    <div id="pos-list" class="space-y-2"></div>

    <script>
        async function sync() {
            try {
                const r = await fetch('/api/status'); const d = await r.json();
                document.getElementById('logs').innerHTML = d.status.botLogs.map(l => `<div>${l.msg}</div>`).join('');
                
                const now = Date.now();
                document.getElementById('blacklist-display').innerHTML = Object.entries(d.status.blackList)
                    .filter(([_, exp]) => exp > now)
                    .map(([sym]) => `<span class="bg-zinc-800 px-1 rounded text-zinc-400">${sym}</span>`).join('');

                document.getElementById('pos-list').innerHTML = d.activePositions.map(p => `
                    <div class="card border-l-4 ${p.side==='LONG'?'border-l-green-500':'border-l-red-500'} flex justify-between">
                        <div><b>${p.symbol}</b> <span class="text-zinc-500">${p.side}</span></div>
                        <div class="text-right font-bold ${parseFloat(p.pnl)>=0?'up':'down'}">${p.pnl}$</div>
                    </div>`).join('');

                const btn = document.getElementById('runBtn');
                btn.innerText = d.botSettings.isRunning ? "STOP" : "START";
                btn.className = d.botSettings.isRunning ? "flex-[2] py-2 rounded bg-red-900/20 border-red-500 text-red-500" : "flex-[2] py-2 rounded bg-green-900/20 border-green-500 text-green-500";
            } catch (e) {}
        }

        async function toggle() {
            const r = await fetch('/api/status'); const d = await r.json();
            await fetch('/api/settings', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ isRunning: !d.botSettings.isRunning }) });
            sync();
        }

        async function save() {
            const body = { 
                invValue: parseFloat(document.getElementById('invValue').value),
                invType: document.getElementById('invType').value,
                maxPositions: parseInt(document.getElementById('maxPositions').value),
                minVol: parseFloat(document.getElementById('minVol').value),
                posTP: parseFloat(document.getElementById('posTP').value),
                posSL: parseFloat(document.getElementById('posSL').value)
            };
            await fetch('/api/settings', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
            alert("Đã lưu cài đặt!");
        }

        setInterval(sync, 2000);
        window.onload = () => {
            fetch('/api/status').then(r => r.json()).then(d => {
                document.getElementById('invValue').value = d.botSettings.invValue;
                document.getElementById('invType').value = d.botSettings.invType;
                document.getElementById('maxPositions').value = d.botSettings.maxPositions;
                document.getElementById('minVol').value = d.botSettings.minVol;
                document.getElementById('posTP').value = d.botSettings.posTP;
                document.getElementById('posSL').value = d.botSettings.posSL;
                sync();
            });
        }
    </script>
</body>
</html>
