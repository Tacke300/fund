<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUFFY v18.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #eee; font-family: monospace; font-size: 11px; }
        .card { background: #111; border: 1px solid #222; padding: 10px; border-radius: 4px; }
        .up { color: #00ff88; } .down { color: #ff4444; }
        input { background: #000; border: 1px solid #333; color: #fff; padding: 4px; text-align: center; border-radius: 3px; width: 100%; outline: none; }
        .bl-tag { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); padding: 2px 6px; border-radius: 3px; color: #ef4444; }
    </style>
</head>
<body class="p-2 space-y-2">
    <div class="card space-y-2">
        <div class="grid grid-cols-3 gap-2">
            <div><p class="text-[9px] text-zinc-500 uppercase">Vốn $</p><input id="invValue" type="number"></div>
            <div><p class="text-[9px] text-zinc-500 uppercase">Max Pos</p><input id="maxPositions" type="number"></div>
            <div><p class="text-[9px] text-zinc-500 uppercase">Vol %</p><input id="minVol" type="number"></div>
        </div>
        <div class="grid grid-cols-2 gap-2">
            <div><p class="text-[9px] text-green-500 font-bold uppercase">TP %</p><input id="posTP" type="number"></div>
            <div><p class="text-[9px] text-red-500 font-bold uppercase">SL %</p><input id="posSL" type="number"></div>
        </div>
        <button id="runBtn" onclick="toggle()" class="w-full py-2 font-black border rounded"></button>
        <button onclick="save()" class="w-full py-1 text-[9px] bg-zinc-800 rounded">LƯU CẤU HÌNH</button>
    </div>

    <div class="card">
        <div class="text-[10px] text-red-500 mb-2 font-bold uppercase">🔒 Blacklist (Đếm ngược)</div>
        <div id="blacklist-display" class="flex flex-wrap gap-2"></div>
    </div>

    <div class="card">
        <div class="text-[10px] text-blue-500 mb-2 font-bold uppercase">🔥 Biến động (1m | 5m | 15m)</div>
        <div id="candidates-list" class="space-y-1"></div>
    </div>

    <div id="logs" class="card h-[70px] overflow-y-auto text-[9px] text-zinc-500"></div>
    <div id="pos-list" class="space-y-2"></div>

    <script>
        function formatTime(ms) {
            const s = Math.ceil(ms / 1000);
            return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
        }

        async function sync() {
            try {
                const r = await fetch('/api/status'); const d = await r.json();
                const now = Date.now();

                const blDiv = document.getElementById('blacklist-display');
                const bl = Object.entries(d.status.blackList).filter(([_, exp]) => exp > now);
                blDiv.innerHTML = bl.map(([sym, exp]) => `<div class="bl-tag">${sym.replace('USDT','')} <b>${formatTime(exp-now)}</b></div>`).join('') || '<span class="text-zinc-700">Trống</span>';

                const top = d.status.candidatesList.sort((a,b) => Math.abs(b.c1) - Math.abs(a.c1)).slice(0, 5);
                document.getElementById('candidates-list').innerHTML = top.map(c => `
                    <div class="flex justify-between border-b border-zinc-900 pb-1">
                        <span class="font-bold text-blue-400 w-12">${c.symbol.replace('USDT','')}</span>
                        <span class="${c.c1>=0?'up':'down'}">1m:${c.c1}%</span>
                        <span class="${c.c5>=0?'up':'down'}">5m:${c.c5}%</span>
                        <span class="${c.c15>=0?'up':'down'}">15m:${c.c15}%</span>
                    </div>`).join('');

                document.getElementById('pos-list').innerHTML = d.activePositions.map(p => `
                    <div class="card border-l-4 ${p.side==='LONG'?'border-l-green-500':'border-l-red-500'} flex justify-between items-center">
                        <div><b>${p.symbol}</b> <span class="text-zinc-500 text-[9px]">${p.side}</span></div>
                        <div class="text-right"><div class="font-bold up">${p.markPrice}</div><div class="${parseFloat(p.pnl)>=0?'up':'down'} font-bold">${p.pnl}$</div></div>
                    </div>`).join('');

                document.getElementById('logs').innerHTML = d.status.botLogs.map(l => `<div>[${l.time}] ${l.msg}</div>`).join('');
                const btn = document.getElementById('runBtn');
                btn.innerText = d.botSettings.isRunning ? "STOP BOT" : "START BOT";
                btn.className = d.botSettings.isRunning ? "w-full py-2 rounded bg-red-900/20 border-red-500 text-red-500 font-bold" : "w-full py-2 rounded bg-green-900/20 border-green-500 text-green-500 font-bold";
            } catch (e) {}
        }

        async function toggle() {
            const r = await fetch('/api/status'); const d = await r.json();
            await fetch('/api/settings', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ isRunning: !d.botSettings.isRunning }) });
            sync();
        }

        async function save() {
            const body = { 
                invValue: parseFloat(document.getElementById('invValue').value),
                maxPositions: parseInt(document.getElementById('maxPositions').value),
                minVol: parseFloat(document.getElementById('minVol').value),
                posTP: parseFloat(document.getElementById('posTP').value),
                posSL: parseFloat(document.getElementById('posSL').value)
            };
            await fetch('/api/settings', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
            alert("Đã lưu!");
        }

        setInterval(sync, 1000);
        window.onload = () => {
            fetch('/api/status').then(r => r.json()).then(d => {
                document.getElementById('invValue').value = d.botSettings.invValue;
                document.getElementById('maxPositions').value = d.botSettings.maxPositions;
                document.getElementById('minVol').value = d.botSettings.minVol;
                document.getElementById('posTP').value = d.botSettings.posTP;
                document.getElementById('posSL').value = d.botSettings.posSL;
                sync();
            });
        }
    </script>
</body>
</html>
