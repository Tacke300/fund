<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hạm Đội Luffy - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #09090b; color: #fafafa; font-family: sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .glass { background: #18181b; border: 1px solid #27272a; border-radius: 8px; }
        .input-dark { background: #09090b; border: 1px solid #3f3f46; color: white; padding: 5px; border-radius: 4px; font-size: 12px; width: 100%; }
        .up { color: #22c55e; } .down { color: #ef4444; }
    </style>
</head>
<body class="p-4 space-y-4">
    <div class="grid grid-cols-12 gap-4">
        <div class="col-span-9 grid grid-cols-4 gap-4">
            <div class="glass p-3"><p class="text-[10px] text-zinc-500 font-bold uppercase">PnL Tích Lũy</p><p id="totalPnl" class="text-xl font-black text-blue-400">0.00$</p></div>
            <div class="glass p-3"><p class="text-[10px] text-zinc-500 font-bold uppercase">Win / Loss</p><p class="text-xl font-black"><span id="win" class="up">0</span> / <span id="loss" class="down">0</span></p></div>
            <div class="glass p-3"><p class="text-[10px] text-zinc-500 font-bold uppercase italic">Số dư ví</p><p id="balance" class="text-xl font-black">0.00$</p></div>
            <button id="runBtn" onclick="toggleBot()" class="font-black uppercase text-xs rounded shadow-lg transition-all"></button>
        </div>
        <div class="col-span-3 glass p-2 flex items-center justify-center font-black text-blue-500 italic">Hạm đội Luffy v3.0</div>
    </div>

    <div class="grid grid-cols-12 gap-4 flex-grow overflow-hidden">
        <div class="col-span-3 glass p-4 flex flex-col gap-6">
            <div class="space-y-4">
                <h3 class="text-xs font-black text-blue-400 uppercase italic">Cấu hình thông số</h3>
                
                <div class="space-y-1">
                    <label class="text-[10px] text-zinc-500 font-bold">Ký quỹ lệnh (INV)</label>
                    <div class="grid grid-cols-2 gap-2">
                        <input id="invValue" type="number" class="input-dark">
                        <select id="invType" class="input-dark"><option value="percent">% Ví</option><option value="fixed">USDT</option></select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div><label class="text-[10px] text-green-500 font-bold">TP (%)</label><input id="posTP" type="number" class="input-dark"></div>
                    <div><label class="text-[10px] text-red-500 font-bold">SL (%)</label><input id="posSL" type="number" class="input-dark"></div>
                </div>

                <div><label class="text-[10px] text-zinc-500 font-bold">Max Positions</label><input id="maxPos" type="number" class="input-dark"></div>

                <div class="pt-4 border-t border-zinc-800">
                    <label class="text-[10px] text-red-500 font-black italic">SL BOT TỔNG (DỪNG HẠM ĐỘI)</label>
                    <div class="grid grid-cols-2 gap-2 mt-2">
                        <input id="botSLValue" type="number" class="input-dark border-red-900/40 text-red-400 font-bold">
                        <select id="botSLType" class="input-dark"><option value="fixed">USD ($)</option><option value="percent">% Ví</option></select>
                    </div>
                </div>

                <button onclick="saveSettings()" class="w-full py-2 bg-blue-600 hover:bg-blue-500 text-[10px] font-bold rounded shadow-md">LƯU CẤU HÌNH</button>
            </div>

            <div class="flex-grow glass bg-black/20 p-2 overflow-y-auto font-mono text-[9px] space-y-1">
                <div id="logs"></div>
            </div>
        </div>

        <div class="col-span-9 glass flex flex-col overflow-hidden">
            <div class="flex border-b border-zinc-800 bg-zinc-900/30">
                <button onclick="tab='pos'" class="p-3 text-[11px] font-black border-r border-zinc-800">VỊ THẾ ĐANG MỞ</button>
                <button onclick="tab='his'" class="p-3 text-[11px] font-black text-zinc-500">LỊCH SỬ TỔNG</button>
            </div>
            <div id="display" class="p-4 overflow-y-auto flex-grow"></div>
        </div>
    </div>

    <script>
        let tab = 'pos';
        async function sync() {
            const res = await fetch('/api/status');
            const d = await res.json();
            
            document.getElementById('totalPnl').innerText = d.tradeHistory.totalPnl.toFixed(2) + '$';
            document.getElementById('win').innerText = d.tradeHistory.win;
            document.getElementById('loss').innerText = d.tradeHistory.loss;
            document.getElementById('balance').innerText = d.status.currentBalance.toFixed(2) + '$';
            
            if(tab === 'pos') {
                document.getElementById('display').innerHTML = d.activePositions.map(p => `
                    <div class="glass p-4 mb-3 flex justify-between items-center border-r-4 ${p.pnlUsdt>=0?'border-green-500':'border-red-500'}">
                        <div><p class="font-black text-lg">${p.symbol}</p><p class="text-[10px] text-zinc-500 uppercase">${p.side} | MAX LEV (${p.lev}x)</p></div>
                        <div class="flex gap-4 text-[10px] font-mono">
                            <span>M1: <b class="${p.snapshot.m1>=0?'up':'down'}">${p.snapshot.m1}%</b></span>
                            <span>M5: <b>${p.snapshot.m5}%</b></span>
                            <span>M15: <b>${p.snapshot.m15}%</b></span>
                        </div>
                        <div class="text-right"><p class="text-xl font-black ${p.pnlUsdt>=0?'up':'down'}">${parseFloat(p.pnlUsdt).toFixed(2)}$</p></div>
                    </div>
                `).join('');
            } else {
                document.getElementById('display').innerHTML = `<table class="w-full text-[10px] text-left">
                    <thead class="text-zinc-500 uppercase"><tr><th>Time</th><th>Symbol</th><th>Entry/Exit</th><th>Snapshot</th><th>PnL</th></tr></thead>
                    <tbody>${d.tradeHistory.orders.map(o => `
                        <tr class="border-b border-zinc-800/50">
                            <td class="py-2 text-zinc-500">${o.closeTime}</td>
                            <td><b>${o.symbol}</b><br>${o.side} ${o.lev}x</td>
                            <td>${o.entry} ➔ ${o.exit}</td>
                            <td class="font-mono">${o.snapshot.m1}|${o.snapshot.m5}|${o.snapshot.m15}</td>
                            <td class="font-black ${o.pnl>=0?'up':'down'}">${o.pnl}$</td>
                        </tr>`).join('')}</tbody></table>`;
            }
            
            const btn = document.getElementById('runBtn');
            btn.innerText = d.botSettings.isRunning ? "DỪNG HẠM ĐỘI" : "RA KHƠI (START)";
            btn.className = d.botSettings.isRunning ? "w-full bg-red-600/20 text-red-500 border border-red-500 font-black" : "w-full bg-blue-600 text-white font-black";
            
            document.getElementById('logs').innerHTML = d.status.botLogs.map(l => `<div><span class="text-zinc-600">[${l.time}]</span> <span class="${l.type==='success'?'up':(l.type==='error'?'down':'')}">${l.msg}</span></div>`).join('');
        }

        async function saveSettings() {
            const body = {
                invValue: parseFloat(document.getElementById('invValue').value),
                invType: document.getElementById('invType').value,
                posTP: parseFloat(document.getElementById('posTP').value),
                posSL: parseFloat(document.getElementById('posSL').value),
                maxPositions: parseInt(document.getElementById('maxPos').value),
                botSLValue: parseFloat(document.getElementById('botSLValue').value),
                botSLType: document.getElementById('botSLType').value
            };
            await fetch('/api/settings', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
            alert("Đã lưu cấu hình!");
        }

        async function toggleBot() {
            const res = await fetch('/api/status');
            const d = await res.json();
            await fetch('/api/settings', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ isRunning: !d.botSettings.isRunning }) });
            sync();
        }

        setInterval(sync, 1500);
        window.onload = () => {
             fetch('/api/status').then(r => r.json()).then(d => {
                document.getElementById('invValue').value = d.botSettings.invValue;
                document.getElementById('invType').value = d.botSettings.invType;
                document.getElementById('posTP').value = d.botSettings.posTP;
                document.getElementById('posSL').value = d.botSettings.posSL;
                document.getElementById('maxPos').value = d.botSettings.maxPositions;
                document.getElementById('botSLValue').value = d.botSettings.botSLValue;
                document.getElementById('botSLType').value = d.botSettings.botSLType;
             });
        }
    </script>
</body>
</html>
