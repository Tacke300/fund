<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bot Control Panel</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .card { background: #2d2d2d; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
        input { background: #1a1a1a; color: white; border: 1px solid #444; padding: 8px; border-radius: 4px; }
        button { padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-blue { background: #3498db; color: white; }
        .btn-red { background: #e74c3c; color: white; }
        .btn-green { background: #2ecc71; color: white; }
        .btn-orange { background: #f39c12; color: white; }
        .btn-gray { background: #95a5a6; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #444; }
    </style>
</head>
<body>

    <!-- 1. CẤU HÌNH LÊN ĐẦU -->
    <div class="card">
        <h3>⚙️ Cấu Hình</h3>
        <div class="grid">
            <input type="text" id="invValue" placeholder="Vốn (1% hoặc số)">
            <input type="number" id="maxPositions" placeholder="Max Lệnh">
            <input type="number" id="dcaStep" placeholder="DCA Step %">
            <button class="btn-blue" onclick="saveSettings()">Lưu Cài Đặt</button>
        </div>
    </div>

    <!-- 2. TEST DƯỚI CẤU HÌNH -->
    <div class="card">
        <h3>🧪 Test & Điều Khiển</h3>
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <input type="text" id="symInput" placeholder="Symbol (Vd: BTCUSDT)" style="flex:1">
            <button class="btn-blue" onclick="doAction('open')">MỞ</button>
            <button class="btn-red" onclick="doAction('close')">ĐÓNG</button>
        </div>
        <div class="grid">
            <button class="btn-gray" onclick="doAction('clear_tpsl')">XÓA TP/SL</button>
            <button class="btn-green" onclick="doAction('set_tpsl')">CÀI TP/SL</button>
            <button class="btn-orange" onclick="doAction('dca')">RESET (XÓA + CÀI)</button>
        </div>
    </div>

    <!-- 3. VỊ THẾ -->
    <div class="card">
        <h3>📊 Vị Thế Đang Mở</h3>
        <table id="posTable">
            <thead>
                <tr>
                    <th>Symbol</th>
                    <th>Entry</th>
                    <th>PNL</th>
                    <th>Hành Động</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        async function doAction(action) {
            const symbol = document.getElementById('symInput').value.toUpperCase();
            if(!symbol && action !== 'save') return alert("Nhập symbol");
            await fetch('/api/test', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ action, symbol })
            });
        }

        async function saveSettings() {
            const body = {
                invValue: document.getElementById('invValue').value,
                maxPositions: parseInt(document.getElementById('maxPositions').value),
                dcaStep: parseFloat(document.getElementById('dcaStep').value)
            };
            await fetch('/api/settings', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            });
            alert("Đã lưu!");
        }

        setInterval(async () => {
            const res = await fetch('/api/status');
            const data = await res.json();
            const tbody = document.querySelector('#posTable tbody');
            tbody.innerHTML = data.activePositions.map(p => `
                <tr>
                    <td>${p.symbol}</td>
                    <td>${p.entryPrice}</td>
                    <td style="color:${p.pnl >=0 ? '#2ecc71':'#e74c3c'}">${p.pnl.toFixed(2)}</td>
                    <td><button class="btn-red" onclick="rowClose('${p.symbol}')">Đóng</button></td>
                </tr>
            `).join('');
        }, 2000);

        async function rowClose(symbol) {
            document.getElementById('symInput').value = symbol;
            doAction('close');
        }
    </script>
</body>
</html>
