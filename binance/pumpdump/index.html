<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hạm Đội Luffy v6.0 - TỔNG LỰC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #e4e4e7; font-family: 'JetBrains Mono', monospace; font-size: 11px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .glass { background: #111111; border: 1px solid #222; border-radius: 4px; }
        .input-dark { background: #000; border: 1px solid #333; color: #fff; padding: 4px; border-radius: 2px; outline: none; width: 100%; }
        .up { color: #10b981; } .down { color: #ef4444; }
        #logs-box { height: 220px; overflow-y: auto; background: #080808; border: 1px solid #222; margin-bottom: 8px; flex-shrink: 0; }
        .tab-btn { padding: 10px 20px; cursor: pointer; border-right: 1px solid #222; font-weight: bold; transition: 0.2s; }
        .tab-active { background: #1a1a1a; color: #3b82f6; border-bottom: 2px solid #3b82f6; }
        tr:hover { background: rgba(255,255,255,0.03); }
        th { font-size: 9px; color: #555; text-transform: uppercase; padding: 8px 4px; border-bottom: 1px solid #222; }
        td { padding: 8px 4px; border-bottom: 1px solid #111; }
    </style>
</head>
<body class="p-2 space-y-2">
    <div class="grid grid-cols-12 gap-2 flex-shrink-0">
        <div class="col-span-12 lg:col-span-10 glass p-3 grid grid-cols-8 gap-3 items-end">
            <div><label class="text-[9px] text-zinc-500 block uppercase font-bold">Vốn/Lệnh</label><input id="invValue" type="number" class="input-dark"></div>
            <div><label class="text-[9px] text-zinc-500 block uppercase">Loại ví</label><select id="invType" class="input-dark"><option value="percent">% Ví</option><option value="fixed">USDT</option></select></div>
            <div><label class="text-[9px] text-blue-500 block uppercase font-bold">Biến động (%)</label><input id="entryDiff" type="number" step="0.1" class="input-dark border-blue-900/50"></div>
            <div><label class="text-[9px] text-green-600 block uppercase font-bold">TP (%)</label><input id="posTP" type="number" class="input-dark"></div>
            <div><label class="text-[9px] text-red-600 block uppercase font-bold">SL (%)</label><input id="posSL" type="number" class="input-dark"></div>
            <div><label class="text-[9px] text-zinc-500 block uppercase">Max Pos</label><input id="maxPos" type="number" class="input-dark"></div>
            <div class="col-span-2 flex gap-1">
                <button onclick="save()" class="bg-blue-600 hover:bg-blue-500 w-1/2 h-[26px] rounded font-bold text-[9px]">LƯU</button>
                <button id="runBtn" onclick="toggleBot()" class="w-1/2 h-[26px] rounded font-bold text-[9px]"></button>
            </div>
        </div>
        <div class="col-span-12 lg:col-span-2 glass p-3 flex flex-col justify-center text-center">
            <p id="runtime" class="text-blue-500 text-[10px] mb-1 font-bold italic">RUNTIME: 00:00:00</p>
            <div class="flex gap-1">
                <input id="botSLValue" type="number" class="input-dark border-red-900/50 text-red-400 font-bold" placeholder="SL Bot">
                <select id="botSLType" class="input-dark w-12"><option value="fixed">$</option><option value="percent">%</option></select>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-12 gap-2 flex-shrink-0">
        <div class="col-span-12 glass p-2 flex gap-6 items-center overflow-x-auto">
            <div class="flex gap-4 border-r border-zinc-800 pr-4 shrink-0">
                <div><p class="text-[9px] text-zinc-500 uppercase">Total PnL</p><p id="totalPnl" class="text-base font-black text-blue-500">0.00$</p></div>
                <div><p class="text-[9px] text-zinc-500 uppercase">Win/Loss</p><p class="text-[11px] font-bold"><span class="up" id="pnlWin">+0.00$</span> / <span class="down" id="pnlLoss">-0.00$</span></p></div>
                <div><p class="text-[9px] text-zinc-500 uppercase">Count</p><p class="text-[11px] font-bold text-zinc-300"><span id="winC">0</span>W - <span id="lossC">0</span>L</p></div>
            </div>
            <div class="flex gap-2" id="top5"></div>
        </div>
    </div>

    <div id="logs-box" class="p-2 font-mono text-[9px]">
        <div class="text-zinc-600 border-b border-zinc-800 pb-1 mb-1 font-bold uppercase italic flex justify-between">
            <span>Hệ thống Logs hoạt động</span>
            <span id="log-count" class="text-[8px]">0 logs</span>
        </div>
        <div id="logs-list" class="space-y-0.5"></div>
    </div>

    <div class="flex-grow glass flex flex-col overflow-hidden">
        <div class="flex bg-zinc-900/50 border-b border-zinc-800 shrink-0">
            <div id="tab-pos" onclick="setTab('pos')" class="tab-btn tab-active uppercase">Vị thế đang chạy (Live)</div>
            <div id="tab-his" onclick="setTab('his')" class="tab-btn text-zinc-500 uppercase">Lịch sử lệnh (History)</div>
        </div>
        <div id="display-area" class="overflow-auto flex-grow p-2"></div>
    </div>

    <script>
        let currentTab = 'pos';
        async function sync() {
            try {
                const res = await fetch('/api/status'); const d = await res.json();
                document.getElementById('totalPnl').innerText = d.tradeHistory.totalPnl.toFixed(2) + '$';
                document.getElementById('pnlWin').innerText = '+' + d.tradeHistory.pnlWin.toFixed(2) + '$';
                document.getElementById('pnlLoss').innerText = d.tradeHistory.pnlLoss.toFixed(2) + '$';
                document.getElementById('winC').innerText = d.tradeHistory.win;
                document.getElementById('lossC').innerText = d.tradeHistory.loss;
                document.getElementById('runtime').innerText = 'RUNTIME: ' + new Date(Date.now() - d.tradeHistory.startTime).toISOString().substr(11, 8);
                document.getElementById('log-count').innerText = d.status.botLogs.length + ' logs';

                document.getElementById('top5').innerHTML = (d.status.candidatesList || []).slice(0, 8).map(c => `
                    <div class="bg-black p-1 px-2 border border-zinc-800 rounded text-[9px] whitespace-nowrap">
                        <b class="text-zinc-400">${c.symbol.replace('USDT','')}</b> 
                        <span class="${c.c1>=0?'up':'down'} font-bold">${c.c1}/${c.c5}/${c.m15}%</span>
                    </div>
                `).join('');

                const area = document.getElementById('display-area');
                if(currentTab === 'pos') {
                    area.innerHTML = `
                    <table class="w-full text-left border-collapse">
                        <thead><tr><th>Cặp Coin</th><th>Side/Lev</th><th>Ký quỹ</th><th>Entry ➔ Mark</th><th>Target TP/SL</th><th>Snap (1/5/15)</th><th>PnL Usdt</th></tr></thead>
                        <tbody>${d.activePositions.map(p => `
                            <tr>
                                <td class="font-black text-blue-400 text-sm">${p.symbol}</td>
                                <td><span class="${p.side==='LONG'?'up':'down'} font-bold">${p.side}</span> <br> <span class="text-zinc-500">${p.leverage}x</span></td>
                                <td class="font-bold text-zinc-300">${p.margin}$</td>
                                <td class="font-mono">${p.entryPrice} <br> ➔ <span class="text-zinc-100">${p.markPrice || '...'}</span></td>
                                <td><span class="up text-[10px]">TP: ${p.tpPrice}</span> <br> <span class="down text-[10px]">SL: ${p.slPrice}</span></td>
                                <td class="text-zinc-500 font-bold">${p.snapshot.m1}/${p.snapshot.m5}/${p.snapshot.m15}%</td>
                                <td class="font-black text-sm ${p.pnlUsdt>=0?'up':'down'}">${parseFloat(p.pnlUsdt || 0).toFixed(2)}$</td>
                            </tr>`).join('')}
                        </tbody></table>`;
                } else {
                    area.innerHTML = `
                    <table class="w-full text-left text-zinc-400">
                        <thead><tr><th>Thời gian</th><th>Symbol/Side</th><th>Lev/Margin</th><th>Entry ➔ Exit</th><th>Lý do</th><th>Snapshot</th><th>PnL ($)</th></tr></thead>
                        <tbody>${d.tradeHistory.orders.map(o => `
                            <tr>
                                <td class="text-zinc-600 text-[9px]">${o.openTime}<br>${o.closeTime}</td>
                                <td><b class="text-zinc-200">${o.symbol}</b><br><span class="${o.side==='LONG'?'up':'down'} text-[9px]">${o.side}</span></td>
                                <td>${o.lev}x / ${o.margin}$</td>
                                <td>${o.entry} ➔ ${o.exit}</td>
                                <td class="italic font-bold text-[9px] text-zinc-500">${o.reason || 'N/A'}</td>
                                <td class="text-[9px]">${o.snapshot.m1}/${o.snapshot.m5}/${o.snapshot.m15}%</td>
                                <td class="font-black ${o.pnl>=0?'up':'down'} text-sm">${o.pnl}$</td>
                            </tr>`).join('')}
                        </tbody></table>`;
                }

                document.getElementById('logs-list').innerHTML = d.status.botLogs.map(l => `
                    <div class="hover:bg-zinc-900/50"><span class="text-zinc-600">[${l.time}]</span> <span class="${l.type==='success'?'up':(l.type==='error'?'down':(l.type==='info'?'text-blue-400':''))}">${l.msg}</span></div>
                `).join('');
                
                const btn = document.getElementById('runBtn');
                btn.innerText = d.botSettings.isRunning ? "DỪNG BOT" : "BẮT ĐẦU";
                btn.className = d.botSettings.isRunning ? "bg-red-600 hover:bg-red-500 text-white w-1/2 h-[26px] rounded font-bold" : "bg-green-600 hover:bg-green-500 text-white w-1/2 h-[26px] rounded font-bold";

            } catch (e) {}
        }

        function setTab(t) { 
            currentTab = t; 
            document.getElementById('tab-pos').className = t==='pos'?'tab-btn tab-active uppercase':'tab-btn text-zinc-500 uppercase';
            document.getElementById('tab-his').className = t==='his'?'tab-btn tab-active uppercase':'tab-btn text-zinc-500 uppercase';
            sync(); 
        }

        async function save() {
            const body = { 
                invValue: parseFloat(document.getElementById('invValue').value), 
                invType: document.getElementById('invType').value,
                entryDiff: parseFloat(document.getElementById('entryDiff').value),
                posTP: parseFloat(document.getElementById('posTP').value), 
                posSL: parseFloat(document.getElementById('posSL').value),
                maxPositions: parseInt(document.getElementById('maxPos').value),
                botSLValue: parseFloat(document.getElementById('botSLValue').value), 
                botSLType: document.getElementById('botSLType').value
            };
            await fetch('/api/settings', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
            alert("Đã cập nhật Hạm đội!");
        }

        async function toggleBot() {
            const res = await fetch('/api/status'); const d = await res.json();
            await fetch('/api/settings', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ isRunning: !d.botSettings.isRunning }) });
            sync();
        }

        setInterval(sync, 1500);
        window.onload = () => {
             fetch('/api/status').then(r => r.json()).then(d => {
                document.getElementById('invValue').value = d.botSettings.invValue;
                document.getElementById('invType').value = d.botSettings.invType;
                document.getElementById('entryDiff').value = d.botSettings.entryDiff;
                document.getElementById('posTP').value = d.botSettings.posTP;
                document.getElementById('posSL').value = d.botSettings.posSL;
                document.getElementById('maxPos').value = d.botSettings.maxPositions;
                document.getElementById('botSLValue').value = d.botSettings.botSLValue;
                document.getElementById('botSLType').value = d.botSettings.botSLType;
             });
        }
    </script>
</body>
</html>
