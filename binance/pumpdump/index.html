<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUFFY v18.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #eee; font-family: monospace; font-size: 12px; }
        .card { background: #111; border: 1px solid #222; padding: 10px; border-radius: 4px; }
        .up { color: #00ff88; } .down { color: #ff4444; }
    </style>
</head>
<body class="p-2 space-y-2">
    <div class="card grid grid-cols-3 gap-2">
        <input id="invValue" type="number" class="bg-black border border-zinc-700 p-2 text-center" placeholder="Vốn">
        <select id="invType" class="bg-black border border-zinc-700 p-2"><option value="percent">%</option><option value="fixed">$</option></select>
        <input id="minVol" type="number" class="bg-black border border-zinc-700 p-2 text-center" placeholder="Vol%">
    </div>
    <button id="runBtn" onclick="toggle()" class="w-full py-3 rounded font-black border"></button>

    <div class="card">
        <div class="text-[10px] text-red-500 mb-2 font-bold uppercase">🔒 Blacklist 15m</div>
        <div id="blacklist-display" class="flex flex-wrap gap-1"></div>
    </div>

    <div class="card">
        <div class="text-[10px] text-blue-500 mb-2 font-bold uppercase">🔥 Market Live</div>
        <div id="candidates-list" class="grid grid-cols-2 gap-2"></div>
    </div>

    <div id="logs" class="card h-[100px] overflow-y-auto text-[10px]"></div>
    <div id="pos-list" class="space-y-2"></div>

    <script>
        async function sync() {
            try {
                const r = await fetch('/api/status'); const d = await r.json();
                
                // Logs
                document.getElementById('logs').innerHTML = d.status.botLogs.map(l => `<div>${l.msg}</div>`).join('');
                
                // Blacklist
                const now = Date.now();
                document.getElementById('blacklist-display').innerHTML = Object.entries(d.status.blackList)
                    .filter(([_, exp]) => exp > now)
                    .map(([sym]) => `<span class="bg-zinc-800 px-1 rounded text-[10px] text-zinc-400">${sym}</span>`).join('');

                // Candidates
                const top = d.status.candidatesList.sort((a,b) => Math.abs(b.c1) - Math.abs(a.c1)).slice(0, 6);
                document.getElementById('candidates-list').innerHTML = top.map(c => `
                    <div class="flex justify-between border-b border-zinc-900 pb-1">
                        <span class="text-zinc-400">${c.symbol.replace('USDT','')}</span>
                        <span class="${c.c1>=0?'up':'down'}">${c.c1}%</span>
                    </div>`).join('');

                // VỊ THẾ THỰC TẾ (Sẽ mất ngay khi lệnh đóng trên sàn)
                document.getElementById('pos-list').innerHTML = d.activePositions.map(p => `
                    <div class="card border-l-4 ${p.side==='LONG'?'border-l-green-500':'border-l-red-500'} flex justify-between items-center">
                        <div>
                            <div class="font-bold">${p.symbol} <span class="text-[10px] text-zinc-500">${p.side}</span></div>
                            <div class="text-[10px] text-zinc-400">Entry: ${p.entryPrice}</div>
                        </div>
                        <div class="text-right">
                            <div class="font-bold up">${p.markPrice}</div>
                            <div class="text-[10px] ${parseFloat(p.pnl)>=0?'up':'down'}">${p.pnl}$</div>
                        </div>
                    </div>`).join('');

                const btn = document.getElementById('runBtn');
                btn.innerText = d.botSettings.isRunning ? "STOP BOT" : "START BOT";
                btn.className = d.botSettings.isRunning ? "w-full py-3 rounded bg-red-900/20 border-red-500 text-red-500" : "w-full py-3 rounded bg-green-900/20 border-green-500 text-green-500";
            } catch (e) {}
        }

        async function toggle() {
            const r = await fetch('/api/status'); const d = await r.json();
            await fetch('/api/settings', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ isRunning: !d.botSettings.isRunning }) });
            sync();
        }

        setInterval(sync, 2000);
        sync();
    </script>
</body>
</html>
