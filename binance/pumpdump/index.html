<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUFFY BOT - CONTROL PANEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #eee; font-family: monospace; font-size: 12px; }
        .card { background: #111; border: 1px solid #222; padding: 10px; border-radius: 4px; }
        .up { color: #00ff88; } .down { color: #ff4444; }
        input { background: #000; border: 1px solid #333; color: #fff; padding: 5px; text-align: center; border-radius: 3px; width: 100%; outline: none; }
        input:focus { border-color: #555; }
        .bl-tag { background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; padding: 2px 5px; border-radius: 3px; color: #ef4444; font-size: 10px; display: flex; gap: 5px; }
        .bl-time { font-weight: bold; color: #fff; }
        .btn-test { font-size: 9px; padding: 6px 2px; border-radius: 2px; font-weight: bold; transition: all 0.2s; text-align: center; }
        .btn-test:active { transform: scale(0.95); opacity: 0.7; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body class="p-2 space-y-3">

    <!-- 1. TÀI KHOẢN & STATS -->
    <div class="card grid grid-cols-2 gap-4">
        <div class="space-y-1">
            <p class="text-[9px] text-zinc-500 uppercase">Tài khoản</p>
            <div class="flex justify-between"><span>Ví:</span> <b id="totalWallet">0.00</b></div>
            <div class="flex justify-between text-zinc-400"><span>Khả dụng:</span> <b id="availBalance">0.00</b></div>
            <div class="flex justify-between"><span>Unl PnL:</span> <b id="unrealizedPnL">0.00</b></div>
        </div>
        <div class="space-y-1 border-l border-zinc-800 pl-4">
            <p class="text-[9px] text-zinc-500 uppercase">Bot Stats</p>
            <div class="flex justify-between"><span>Đang mở:</span> <b id="openCount" class="text-yellow-500">0</b></div>
            <div class="flex justify-between"><span>Đã chốt:</span> <b id="closedCount">0</b></div>
            <div class="flex justify-between"><span>PnL chốt:</span> <b id="closedPnL">0.00</b></div>
        </div>
    </div>

    <!-- 2. CẤU HÌNH HỆ THỐNG -->
    <div class="card grid grid-cols-3 gap-2">
        <div><p class="text-[9px] text-zinc-500 uppercase">Vốn</p><input id="invValue"></div>
        <div><p class="text-[9px] text-zinc-500 uppercase">Max Pos</p><input id="maxPositions"></div>
        <div><p class="text-[9px] text-zinc-500 uppercase">Vol%</p><input id="minVol"></div>
        <div><p class="text-[9px] text-green-500 uppercase">Tp%</p><input id="posTP"></div>
        <div><p class="text-[9px] text-red-500 uppercase">Sl%</p><input id="posSL"></div>
        <div><p class="text-[9px] text-yellow-500 uppercase">Dca%</p><input id="dcaStep"></div>
        <div class="col-span-3 grid grid-cols-2 gap-2 mt-1">
            <button id="runBtn" onclick="toggle()" class="py-2 font-bold border rounded uppercase">--</button>
            <button onclick="save()" class="py-2 bg-zinc-800 text-white font-bold rounded border border-zinc-600 uppercase">Lưu Cấu Hình</button>
        </div>
    </div>

    <!-- 3. QUẢN TRỊ TEST NHANH (MỚI) -->
    <div class="card space-y-2 border-blue-900/30">
        <div class="flex justify-between items-center">
            <p class="text-[9px] text-blue-500 uppercase font-bold">Điều khiển thủ công</p>
            <span class="text-[8px] text-zinc-600 italic">Nhập symbol rồi chọn lệnh</span>
        </div>
        <div class="flex gap-2">
            <input id="testSymbol" placeholder="SYMBOL (VÍ DỤ: BTC)" class="flex-1 !text-left px-2 uppercase font-bold text-blue-400">
            <button onclick="manualAction('open')" class="bg-blue-600 hover:bg-blue-500 text-white px-3 py-1 rounded font-bold text-[10px]">MỞ LỆNH</button>
        </div>
        <div class="grid grid-cols-4 gap-1">
            <button onclick="manualAction('clear', 1)" class="btn-test bg-zinc-800 text-zinc-400">XÓA M1</button>
            <button onclick="manualAction('set_only')" class="btn-test bg-zinc-800 text-green-500">CÀI TP</button>
            <button onclick="manualAction('reset_cycle')" class="btn-test bg-orange-950 text-orange-400">RESET</button>
            <button onclick="manualAction('close')" class="btn-test bg-red-950 text-red-500">ĐÓNG</button>
        </div>
    </div>

    <!-- 4. BLACKLIST -->
    <div class="card flex flex-wrap gap-2 min-h-[25px]" id="blacklist-display"></div>

    <!-- 5. VỊ THẾ ĐANG MỞ -->
    <div id="pos-list" class="space-y-2"></div>

    <!-- 6. KÈO TIỀM NĂNG -->
    <div class="card">
        <table class="w-full text-left text-[11px]">
            <thead>
                <tr class="text-zinc-500 border-b border-zinc-800">
                    <th class="pb-1">SYMBOL</th><th align="right" class="pb-1">1M</th><th align="right" class="pb-1">5M</th><th align="right" class="pb-1">15M</th>
                </tr>
            </thead>
            <tbody id="candidate-list"></tbody>
        </table>
    </div>

    <!-- 7. LOGS -->
    <div id="logs" class="card h-[120px] overflow-y-auto text-[10px] text-zinc-400 space-y-1 font-mono"></div>

    <script>
        // --- HÀM GỌI API GỐC ---
        async function callTest(action, symbol, mode = null) {
            try {
                const res = await fetch('/api/test', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ action, symbol, mode })
                });
                return await res.json();
            } catch (e) { console.error("Action error:", e); }
        }

        // --- HÀM CHO PHẦN TEST NHANH ---
        async function manualAction(action, mode = null) {
            let symbol = document.getElementById('testSymbol').value.trim().toUpperCase();
            if (!symbol) {
                alert("Vui lòng nhập Symbol (Ví dụ: BTC)");
                return;
            }
            if (!symbol.endsWith('USDT')) symbol += 'USDT';
            
            await callTest(action, symbol, mode);
            document.getElementById('testSymbol').value = ""; // Clear input sau khi bấm
        }

        function fmtTime(s) {
            const m = Math.floor(s / 60);
            const sec = s % 60;
            return `${m}:${sec < 10 ? '0' : ''}${sec}`;
        }

        // --- ĐỒNG BỘ DỮ LIỆU ---
        async function sync() {
            try {
                const r = await fetch('/api/status'); 
                const d = await r.json();
                
                // Cập nhật Wallet
                if(d.wallet) {
                    document.getElementById('totalWallet').innerText = d.wallet.totalWalletBalance;
                    document.getElementById('availBalance').innerText = d.wallet.availableBalance;
                    const pnl = parseFloat(d.wallet.totalUnrealizedProfit);
                    document.getElementById('unrealizedPnL').innerText = pnl.toFixed(2);
                    document.getElementById('unrealizedPnL').className = pnl >= 0 ? 'up' : 'down';
                }
                
                // Cập nhật Bot Stats
                document.getElementById('openCount').innerText = d.activePositions.length;
                document.getElementById('closedCount').innerText = d.status.botClosedCount;
                document.getElementById('closedPnL').innerText = d.status.botPnLClosed.toFixed(2);
                document.getElementById('closedPnL').className = d.status.botPnLClosed >= 0 ? 'up' : 'down';

                // Render Blacklist
                const blEntries = Object.entries(d.status.blackList);
                document.getElementById('blacklist-display').innerHTML = blEntries.map(([s, sec]) => `
                    <span class="bl-tag">
                        ${s.replace('USDT','')} <span class="bl-time">${fmtTime(sec)}</span>
                    </span>`).join('');

                // Render Kèo tiềm năng
                document.getElementById('candidate-list').innerHTML = d.status.candidatesList.slice(0,10).map(c => `
                    <tr class="border-b border-zinc-900 hover:bg-zinc-900" onclick="callTest('open', '${c.symbol}')" style="cursor:pointer">
                        <td class="py-1 font-bold">${c.symbol.replace('USDT','')}</td>
                        <td align="right" class="${parseFloat(c.c1)>=0?'up':'down'}">${c.c1}%</td>
                        <td align="right" class="${parseFloat(c.c5)>=0?'up':'down'}">${c.c5}%</td>
                        <td align="right" class="${parseFloat(c.c15)>=0?'up':'down'}">${c.c15}%</td>
                    </tr>`).join('');

                // Render Vị thế đang mở
                document.getElementById('pos-list').innerHTML = d.activePositions.map(p => `
                    <div class="card border-l-2 ${p.pnl>=0?'border-green-500':'border-red-500'} bg-zinc-950 p-2 space-y-2">
                        <div class="flex justify-between items-center">
                            <div>
                                <div class="font-bold text-white uppercase">${p.symbol} <span class="text-[10px] text-zinc-600">x${p.leverage}</span></div>
                                <div class="text-[9px] text-zinc-500">Entry: ${p.entryPrice} | TP: ${p.tp}</div>
                            </div>
                            <div class="text-right">
                                <div class="${p.pnl>=0?'up':'down'} font-black text-sm">${p.pnl.toFixed(2)}$</div>
                                <div class="text-[9px] text-zinc-600">${p.priceDev.toFixed(2)}%</div>
                            </div>
                        </div>
                        <div class="grid grid-cols-5 gap-1">
                            <button onclick="callTest('clear', '${p.symbol}', 1)" class="btn-test bg-zinc-800 text-zinc-400">XÓA M1</button>
                            <button onclick="callTest('clear', '${p.symbol}', 2)" class="btn-test bg-zinc-800 text-blue-400">XÓA M2</button>
                            <button onclick="callTest('set_only', '${p.symbol}')" class="btn-test bg-zinc-800 text-green-500">CÀI TP</button>
                            <button onclick="callTest('reset_cycle', '${p.symbol}')" class="btn-test bg-orange-950 text-orange-400">RESET</button>
                            <button onclick="callTest('close', '${p.symbol}')" class="btn-test bg-red-950 text-red-500">ĐÓNG</button>
                        </div>
                    </div>`).join('');

                // Logs & Button Run
                document.getElementById('logs').innerHTML = d.status.botLogs.slice().reverse().map(l => `<div>[${l.time}] ${l.msg}</div>`).join('');
                const isRunning = d.botSettings.isRunning;
                document.getElementById('runBtn').innerText = isRunning ? "STOP BOT" : "START BOT";
                document.getElementById('runBtn').className = isRunning 
                    ? "py-2 rounded border-red-500 text-red-500 bg-red-950/20 font-bold uppercase" 
                    : "py-2 rounded border-green-500 text-green-500 bg-green-950/20 font-bold uppercase";
            } catch (e) {}
        }

        // --- ĐIỀU KHIỂN ---
        async function toggle() {
            const r = await fetch('/api/status'); const d = await r.json();
            await fetch('/api/settings', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ isRunning: !d.botSettings.isRunning }) 
            });
            sync();
        }

        async function save() {
            const body = { 
                invValue: document.getElementById('invValue').value,
                maxPositions: parseInt(document.getElementById('maxPositions').value),
                minVol: parseFloat(document.getElementById('minVol').value),
                posTP: parseFloat(document.getElementById('posTP').value),
                posSL: parseFloat(document.getElementById('posSL').value),
                dcaStep: parseFloat(document.getElementById('dcaStep').value)
            };
            await fetch('/api/settings', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
            alert("ĐÃ LƯU CẤU HÌNH");
        }

        // Khởi tạo
        setInterval(sync, 1000);
        window.onload = () => {
            fetch('/api/status').then(r => r.json()).then(d => {
                document.getElementById('invValue').value = d.botSettings.invValue;
                document.getElementById('maxPositions').value = d.botSettings.maxPositions;
                document.getElementById('minVol').value = d.botSettings.minVol;
                document.getElementById('posTP').value = d.botSettings.posTP;
                document.getElementById('posSL').value = d.botSettings.posSL;
                document.getElementById('dcaStep').value = d.botSettings.dcaStep;
            });
            sync();
        }
    </script>
</body>
</html>
