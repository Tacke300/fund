<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUFFY DASHBOARD v17.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'JetBrains Mono', monospace; font-size: 12px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .card { background: #111; border: 1px solid #222; border-radius: 8px; padding: 12px; }
        .input-dark { background: #000; border: 1px solid #333; color: #fff; padding: 8px; border-radius: 4px; width: 100%; outline: none; }
        .up { color: #10b981; } .down { color: #ef4444; }
        #logs { height: 120px; overflow-y: auto; background: #050505; border: 1px solid #222; padding: 8px; font-size: 10px; }
    </style>
</head>
<body class="p-2 space-y-2">
    <div class="card space-y-3">
        <div class="grid grid-cols-3 gap-2">
            <div><label class="text-[10px] text-zinc-500 uppercase">Vốn</label><input id="invValue" type="number" class="input-dark"></div>
            <div><label class="text-[10px] text-zinc-500 uppercase">Loại</label><select id="invType" class="input-dark"><option value="percent">%</option><option value="fixed">$</option></select></div>
            <div><label class="text-[10px] text-blue-500 uppercase font-bold">Vol%</label><input id="minVol" type="number" class="input-dark"></div>
            <div><label class="text-[10px] text-green-500 uppercase font-bold">TP%</label><input id="posTP" type="number" class="input-dark"></div>
            <div><label class="text-[10px] text-red-500 uppercase font-bold">SL%</label><input id="posSL" type="number" class="input-dark"></div>
            <div><label class="text-[10px] text-zinc-500 uppercase">Max Pos</label><input id="maxPos" type="number" class="input-dark"></div>
        </div>
        <div class="flex gap-2">
            <button onclick="save()" class="flex-1 bg-zinc-800 py-3 rounded font-bold">LƯU CÀI ĐẶT</button>
            <button id="runBtn" onclick="toggle()" class="flex-[2] py-3 rounded font-black text-center"></button>
        </div>
    </div>

    <div id="logs" class="card"></div>

    <div id="pos-list" class="flex-grow overflow-auto space-y-2"></div>

    <script>
        let running = false;
        async function sync() {
            try {
                const r = await fetch('/api/status');
                const d = await r.json();
                running = d.botSettings.isRunning;
                
                document.getElementById('logs').innerHTML = d.status.botLogs.map(l => `<div><span class="text-zinc-600">[${l.time}]</span> <span class="${l.type==='success'?'up':(l.type==='error'?'down':'text-blue-400')}">${l.msg}</span></div>`).join('');
                
                document.getElementById('pos-list').innerHTML = d.activePositions.map(p => `
                    <div class="card border-l-4 ${p.side==='LONG'?'border-l-green-500':'border-l-red-500'}">
                        <div class="flex justify-between font-bold">
                            <span class="text-blue-400">${p.symbol}</span>
                            <span class="${p.side==='LONG'?'up':'down'}">${p.side} (${p.margin}$)</span>
                        </div>
                        <div class="flex justify-between text-[11px] text-zinc-400 mt-1">
                            <span>Entry: ${p.entryPrice} ➔ ${p.markPrice}</span>
                        </div>
                        <div class="flex justify-between mt-1 font-bold">
                            <span class="up">TP: ${p.tpPrice}</span>
                            <span class="down">SL: ${p.slPrice}</span>
                        </div>
                    </div>`).join('');

                const btn = document.getElementById('runBtn');
                btn.innerText = running ? "STOP BOT" : "START BOT";
                btn.className = running ? "flex-[2] py-3 rounded font-black bg-red-900/30 border border-red-500 text-red-500" : "flex-[2] py-3 rounded font-black bg-green-900/30 border border-green-500 text-green-500";
            } catch (e) {}
        }

        async function toggle() {
            running = !running;
            await fetch('/api/settings', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ isRunning: running }) });
            sync();
        }

        async function save() {
            const body = { 
                invValue: parseFloat(document.getElementById('invValue').value),
                invType: document.getElementById('invType').value,
                minVol: parseFloat(document.getElementById('minVol').value),
                posTP: parseFloat(document.getElementById('posTP').value),
                posSL: parseFloat(document.getElementById('posSL').value),
                maxPositions: parseInt(document.getElementById('maxPos').value)
            };
            await fetch('/api/settings', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
            alert("Đã lưu cấu hình!");
        }

        setInterval(sync, 2000);
        window.onload = () => {
            fetch('/api/status').then(r => r.json()).then(d => {
                document.getElementById('invValue').value = d.botSettings.invValue;
                document.getElementById('invType').value = d.botSettings.invType;
                document.getElementById('minVol').value = d.botSettings.minVol;
                document.getElementById('posTP').value = d.botSettings.posTP;
                document.getElementById('posSL').value = d.botSettings.posSL;
                document.getElementById('maxPos').value = d.botSettings.maxPositions;
                sync();
            });
        }
    </script>
</body>
</html>
