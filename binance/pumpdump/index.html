<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Dashboard v4.8 - Luffy Fleet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #e4e4e7; font-family: 'JetBrains Mono', monospace; font-size: 11px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .glass { background: #111111; border: 1px solid #222; border-radius: 4px; }
        .input-dark { background: #000; border: 1px solid #333; color: #fff; padding: 4px; border-radius: 2px; outline: none; width: 100%; }
        .up { color: #10b981; } .down { color: #ef4444; }
        #logs-box { height: 180px; overflow-y: auto; background: #0a0a0a; border: 1px solid #222; margin-bottom: 8px; flex-shrink: 0; }
        .tab-btn { padding: 8px 16px; cursor: pointer; border-right: 1px solid #222; font-weight: bold; }
        .tab-active { background: #1a1a1a; color: #3b82f6; border-bottom: 2px solid #3b82f6; }
    </style>
</head>
<body class="p-2 space-y-2">
    <div class="grid grid-cols-12 gap-2 flex-shrink-0">
        <div class="col-span-12 lg:col-span-10 glass p-3 grid grid-cols-8 gap-2 items-end">
            <div><label class="text-[9px] text-zinc-500 block uppercase">Vốn Lệnh</label><input id="invValue" type="number" class="input-dark"></div>
            <div><label class="text-[9px] text-zinc-500 block uppercase">Loại</label><select id="invType" class="input-dark"><option value="percent">% Ví</option><option value="fixed">USDT</option></select></div>
            <div><label class="text-[9px] text-blue-500 block uppercase font-bold">Biến động (%)</label><input id="entryDiff" type="number" step="0.1" class="input-dark border-blue-900/50" placeholder="0.5"></div>
            <div><label class="text-[9px] text-green-600 block uppercase font-bold">TP (%)</label><input id="posTP" type="number" class="input-dark"></div>
            <div><label class="text-[9px] text-red-600 block uppercase font-bold">SL (%)</label><input id="posSL" type="number" class="input-dark"></div>
            <div><label class="text-[9px] text-zinc-500 block uppercase">Max Pos</label><input id="maxPos" type="number" class="input-dark"></div>
            <div class="col-span-2 flex gap-1">
                <button onclick="save()" class="bg-blue-600 w-1/2 h-[24px] rounded font-bold text-[9px] uppercase">Lưu</button>
                <button id="runBtn" onclick="toggleBot()" class="w-1/2 h-[24px] rounded font-bold text-[9px] uppercase"></button>
            </div>
        </div>
        <div class="col-span-12 lg:col-span-2 glass p-3 text-center">
            <p id="runtime" class="text-zinc-500 text-[10px] mb-1 font-bold">00:00:00:00</p>
            <div class="flex gap-1">
                <input id="botSLValue" type="number" class="input-dark border-red-900/50 text-red-400 font-bold" placeholder="SL Bot">
                <select id="botSLType" class="input-dark w-12"><option value="fixed">$</option><option value="percent">%</option></select>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-12 gap-2 flex-shrink-0">
        <div class="col-span-8 glass p-2 flex justify-around items-center">
            <div><p class="text-[9px] text-zinc-500 uppercase font-bold">Total PnL</p><p id="totalPnl" class="text-sm font-black text-blue-500">0$</p></div>
            <div><p class="text-[9px] text-zinc-500 uppercase font-bold">PnL Win/Loss</p><p class="text-[10px] font-bold"><span class="up" id="pnlWin">+0$</span> / <span class="down" id="pnlLoss">-0$</span></p></div>
            <div><p class="text-[9px] text-zinc-500 uppercase font-bold">Win/Loss Count</p><p class="text-[10px] font-bold"><span id="winC">0</span> / <span id="lossC">0</span></p></div>
        </div>
        <div class="col-span-4 glass p-2 overflow-hidden"><p class="text-[9px] text-zinc-500 font-bold mb-1 uppercase italic">Top 5 Biến động</p><div id="top5" class="flex gap-2"></div></div>
    </div>

    <div id="logs-box" class="p-2 font-mono text-[10px]">
        <div class="text-zinc-600 border-b border-zinc-800 pb-1 mb-1 font-bold italic uppercase">Hệ thống Logs chi tiết:</div>
        <div id="logs-list"></div>
    </div>

    <div class="flex-grow glass flex flex-col overflow-hidden">
        <div class="flex bg-zinc-900/50 border-b border-zinc-800">
            <div id="tab-pos" onclick="setTab('pos')" class="tab-btn tab-active uppercase">Vị thế đang chạy</div>
            <div id="tab-his" onclick="setTab('his')" class="tab-btn text-zinc-500 uppercase">Lịch sử giao dịch</div>
        </div>
        <div id="display-area" class="overflow-auto p-2"></div>
    </div>

    <script>
        let currentTab = 'pos';
        function formatTime(ms) {
            let s = Math.floor(ms / 1000);
            let d = Math.floor(s / 86400); s %= 86400;
            let h = Math.floor(s / 3600); s %= 3600;
            let m = Math.floor(s / 60); s %= 60;
            return `${d}d:${h}h:${m}m:${s}s`;
        }
        async function sync() {
            try {
                const res = await fetch('/api/status'); const d = await res.json();
                document.getElementById('totalPnl').innerText = d.tradeHistory.totalPnl.toFixed(2) + '$';
                document.getElementById('pnlWin').innerText = '+' + d.tradeHistory.pnlWin.toFixed(2) + '$';
                document.getElementById('pnlLoss').innerText = d.tradeHistory.pnlLoss.toFixed(2) + '$';
                document.getElementById('winC').innerText = d.tradeHistory.win;
                document.getElementById('lossC').innerText = d.tradeHistory.loss;
                document.getElementById('runtime').innerText = formatTime(Date.now() - d.tradeHistory.startTime);
                
                document.getElementById('top5').innerHTML = (d.status.candidatesList || []).slice(0, 5).map(c => `<div class="bg-black p-1 border border-zinc-800 rounded"><b>${c.symbol.replace('USDT','')}</b> <span class="${c.c1>=0?'up':'down'}">${c.c1}%</span></div>`).join('');

                const area = document.getElementById('display-area');
                if(currentTab === 'pos') {
                    area.innerHTML = `<table class="w-full text-left"><thead class="text-zinc-500 border-b border-zinc-800 uppercase text-[9px]"><tr><th>Coin</th><th>Lev/Margin</th><th>Entry/Mark</th><th>TP/SL</th><th>PnL ($)</th></tr></thead>
                    <tbody>${(d.activePositions || []).map(p => `<tr class="border-b border-zinc-900"><td class="py-2 font-black text-blue-400">${p.symbol} <small class="text-zinc-600">${p.side}</small></td><td>${p.leverage}x / ${p.margin}$</td><td>${p.entryPrice} ➔ ${parseFloat(p.markPrice).toFixed(5)}</td><td><span class="up">${p.tpPrice}</span> / <span class="down">${p.slPrice}</span></td><td class="font-black ${p.pnlUsdt>=0?'up':'down'}">${parseFloat(p.pnlUsdt).toFixed(2)}$</td></tr>`).join('')}</tbody></table>`;
                } else {
                    area.innerHTML = `<table class="w-full text-left text-zinc-400"><thead class="uppercase text-[9px] border-b border-zinc-800"><tr><th>Time</th><th>Symbol</th><th>Margin</th><th>Entry/Exit</th><th>PnL</th></tr></thead>
                    <tbody>${d.tradeHistory.orders.map(o => `<tr><td class="py-1 text-zinc-600">${o.closeTime}</td><td class="font-bold">${o.symbol}</td><td>${o.margin}$</td><td>${o.entry}➔${o.exit}</td><td class="${o.pnl>=0?'up':'down'} font-black">${o.pnl}$</td></tr>`).join('')}</tbody></table>`;
                }

                document.getElementById('logs-list').innerHTML = d.status.botLogs.map(l => `<div><span class="text-zinc-600">[${l.time}]</span> <span class="${l.type==='success'?'up':(l.type==='error'?'down':'')}">${l.msg}</span></div>`).join('');
                const btn = document.getElementById('runBtn');
                btn.innerText = d.botSettings.isRunning ? "STOP BOT" : "START BOT";
                btn.className = d.botSettings.isRunning ? "bg-red-600 text-white" : "bg-green-600 text-white";
            } catch(e) {}
        }
        function setTab(t) { 
            currentTab = t; 
            document.getElementById('tab-pos').className = t==='pos'?'tab-btn tab-active':'tab-btn text-zinc-500';
            document.getElementById('tab-his').className = t==='his'?'tab-btn tab-active':'tab-btn text-zinc-500';
            sync(); 
        }
        async function save() {
            const body = { 
                invValue: parseFloat(document.getElementById('invValue').value), 
                invType: document.getElementById('invType').value,
                entryDiff: parseFloat(document.getElementById('entryDiff').value),
                posTP: parseFloat(document.getElementById('posTP').value), 
                posSL: parseFloat(document.getElementById('posSL').value),
                maxPositions: parseInt(document.getElementById('maxPos').value),
                botSLValue: parseFloat(document.getElementById('botSLValue').value), 
                botSLType: document.getElementById('botSLType').value
            };
            await fetch('/api/settings', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
            alert("Đã lưu cấu hình!");
        }
        async function toggleBot() {
            const res = await fetch('/api/status'); const d = await res.json();
            await fetch('/api/settings', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ isRunning: !d.botSettings.isRunning }) });
        }
        setInterval(sync, 1500);
        window.onload = () => {
             fetch('/api/status').then(r => r.json()).then(d => {
                document.getElementById('invValue').value = d.botSettings.invValue;
                document.getElementById('invType').value = d.botSettings.invType;
                document.getElementById('entryDiff').value = d.botSettings.entryDiff;
                document.getElementById('posTP').value = d.botSettings.posTP;
                document.getElementById('posSL').value = d.botSettings.posSL;
                document.getElementById('maxPos').value = d.botSettings.maxPositions;
                document.getElementById('botSLValue').value = d.botSettings.botSLValue;
                document.getElementById('botSLType').value = d.botSettings.botSLType;
             });
        }
    </script>
</body>
</html>
