<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Luffy Fleet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #09090b; color: #e4e4e7; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        .glass { background: rgba(24, 24, 27, 0.8); border: 1px solid rgba(63, 63, 70, 0.5); border-radius: 12px; }
        .input-dark { background: #18181b; border: 1px solid #3f3f46; color: white; padding: 6px 10px; border-radius: 6px; font-size: 13px; outline: none; }
        .input-dark:focus { border-color: #3b82f6; }
        ::-webkit-scrollbar { width: 3px; } ::-webkit-scrollbar-thumb { background: #3f3f46; }
        .up { color: #22c55e; } .down { color: #ef4444; }
    </style>
</head>
<body class="p-3 flex flex-col gap-3">
    <div class="glass p-3 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <h1 class="text-lg font-black tracking-tighter text-white"><i class="fas fa-anchor mr-2 text-blue-500"></i>HẠM ĐỘI LUFFY</h1>
            <span id="botStatusText" class="text-[10px] px-2 py-0.5 rounded bg-zinc-800 border border-zinc-700 font-bold uppercase">DỪNG</span>
        </div>
        <div class="text-right">
            <p class="text-[10px] text-zinc-500 font-bold uppercase">Tài sản</p>
            <p id="balance" class="text-xl font-black text-blue-400 tracking-tight">$0.00</p>
        </div>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-7 gap-2">
        <div class="glass p-2">
            <label class="text-[9px] text-zinc-500 uppercase font-bold block mb-1">Vốn Lệnh</label>
            <div class="flex gap-1">
                <input id="invValue" type="number" class="input-dark w-full" value="1.5">
                <select id="invType" class="input-dark text-[10px]"><option value="fixed">$</option><option value="percent">%</option></select>
            </div>
        </div>
        <div class="glass p-2">
            <label class="text-[9px] text-zinc-500 uppercase font-bold block mb-1">Vol Min %</label>
            <input id="minVol" type="number" class="input-dark w-full" value="5.0">
        </div>
        <div class="glass p-2">
            <label class="text-[9px] text-zinc-500 uppercase font-bold block mb-1">Max Lệnh</label>
            <input id="maxPositions" type="number" class="input-dark w-full" value="3">
        </div>
        <div class="glass p-2">
            <label class="text-[9px] text-green-500 uppercase font-bold block mb-1">TP Vị Thế %</label>
            <input id="posTP" type="number" class="input-dark w-full text-green-400" value="1.0">
        </div>
        <div class="glass p-2">
            <label class="text-[9px] text-red-500 uppercase font-bold block mb-1">SL Vị Thế %</label>
            <input id="posSL" type="number" class="input-dark w-full text-red-400" value="3.0">
        </div>
        <div class="p-1 flex items-center"><button id="runBtn" onclick="handleToggle()" class="w-full py-3 rounded-lg font-bold text-xs bg-green-600 hover:bg-green-500 transition-all uppercase">BẮT ĐẦU</button></div>
        <div class="p-1 flex items-center"><button onclick="handleUpdate()" class="w-full py-3 rounded-lg font-bold text-xs bg-zinc-800 border border-zinc-700 hover:bg-zinc-700 transition-all uppercase text-zinc-400">Lưu</button></div>
    </div>

    <div class="flex-grow grid grid-cols-12 gap-3 overflow-hidden">
        <div class="col-span-12 md:col-span-4 glass flex flex-col overflow-hidden">
            <div class="p-2 border-b border-zinc-800 flex justify-between items-center bg-zinc-900/50">
                <span class="text-[10px] font-black uppercase text-zinc-400">Log Hệ Thống</span>
                <button onclick="document.getElementById('botLogs').innerHTML=''" class="text-[9px] text-zinc-600 hover:text-white">Xóa</button>
            </div>
            <div id="botLogs" class="p-2 overflow-y-auto font-mono text-[10px] space-y-1.5 flex-grow"></div>
        </div>

        <div class="col-span-12 md:col-span-8 glass flex flex-col overflow-hidden">
            <div class="p-2 border-b border-zinc-800 flex justify-between bg-zinc-900/50">
                <span class="text-[10px] font-black uppercase text-zinc-400">Vị thế hoạt động</span>
                <span id="posCount" class="text-[10px] text-blue-400 font-bold">0 LỆNH</span>
            </div>
            <div class="overflow-y-auto flex-grow">
                <table class="w-full text-left text-[12px]">
                    <thead class="bg-zinc-900 sticky top-0 text-zinc-500 text-[9px] uppercase">
                        <tr><th class="p-2">Coin</th><th class="p-2">Side</th><th class="p-2">Price</th><th class="p-2 text-right">PnL%</th></tr>
                    </thead>
                    <tbody id="positionTable" class="divide-y divide-zinc-800"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let isRunning = false;
        function updateUI(status_bool) {
            isRunning = status_bool;
            const btn = document.getElementById('runBtn');
            const txt = document.getElementById('botStatusText');
            btn.innerText = isRunning ? "DỪNG BOT" : "BẮT ĐẦU";
            btn.className = isRunning ? "w-full py-3 rounded-lg font-bold text-xs bg-red-600 hover:bg-red-500 uppercase" : "w-full py-3 rounded-lg font-bold text-xs bg-green-600 hover:bg-green-500 uppercase";
            txt.innerText = isRunning ? "ĐANG CHẠY" : "DỪNG";
            txt.className = isRunning ? "text-[10px] px-2 py-0.5 rounded bg-green-900/20 border border-green-500/50 text-green-500 font-bold uppercase" : "text-[10px] px-2 py-0.5 rounded bg-zinc-800 border border-zinc-700 text-zinc-500 font-bold uppercase";
        }

        async function sync() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                if(data.botSettings.isRunning !== isRunning) updateUI(data.botSettings.isRunning);
                document.getElementById('balance').innerText = `$${(data.status.currentBalance || 0).toFixed(2)}`;
                document.getElementById('posCount').innerText = `${data.activePositions.length} LỆNH`;
                
                document.getElementById('positionTable').innerHTML = data.activePositions.map(p => `
                    <tr class="hover:bg-zinc-800/30">
                        <td class="p-2 font-bold">${p.symbol}</td>
                        <td class="p-2"><span class="${p.side === 'LONG' ? 'up' : 'down'} text-[10px] font-bold">${p.side} ${p.leverage}x</span></td>
                        <td class="p-2 text-[10px] text-zinc-500">${p.entryPrice} → ${p.markPrice}</td>
                        <td class="p-2 text-right font-black ${parseFloat(p.pnlPercent) >= 0 ? 'up' : 'down'}">${p.pnlPercent}%</td>
                    </tr>
                `).join('');

                document.getElementById('botLogs').innerHTML = data.status.botLogs.map(l => `
                    <div class="leading-relaxed border-l-2 ${l.type === 'success' ? 'border-green-500 bg-green-500/5' : (l.type === 'error' ? 'border-red-500 bg-red-500/5' : 'border-blue-500 bg-blue-500/5')} px-2">
                        <span class="text-zinc-600 mr-1">${l.time}</span> <span class="text-zinc-200">${l.msg}</span>
                    </div>
                `).join('');
            } catch (e) {}
        }

        async function handleToggle() {
            isRunning = !isRunning; updateUI(isRunning);
            await fetch('/api/settings', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ isRunning }) });
        }

        async function handleUpdate() {
            const body = {
                invValue: parseFloat(document.getElementById('invValue').value),
                invType: document.getElementById('invType').value,
                minVol: parseFloat(document.getElementById('minVol').value),
                maxPositions: parseInt(document.getElementById('maxPositions').value),
                posTP: parseFloat(document.getElementById('posTP').value),
                posSL: parseFloat(document.getElementById('posSL').value)
            };
            await fetch('/api/settings', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
            alert("Đã lưu!");
        }

        setInterval(sync, 1000);
    </script>
</body>
</html>
