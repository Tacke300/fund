<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUFFY BOT TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0a; color: #00ff00; font-family: 'Courier New', Courier, monospace; }
        .panel { border: 1px solid #333; background: #111; border-radius: 4px; }
        .log-success { color: #00ff00; }
        .log-error { color: #ff3333; }
        .log-warning { color: #ffcc00; }
        .log-info { color: #00ccff; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body class="p-4">
    <div class="grid grid-cols-12 gap-4">
        <div class="col-span-12 md:col-span-4 space-y-4">
            <div class="panel p-4">
                <h2 class="text-xl font-bold mb-4 border-b border-gray-700 pb-2">WALLET</h2>
                <div id="walletInfo" class="grid grid-cols-2 gap-2 text-sm">
                    <span>Available:</span> <span id="availBal" class="text-white text-right">0.00$</span>
                    <span>Total PnL:</span> <span id="totalPnL" class="text-white text-right">0.00$</span>
                </div>
            </div>

            <div class="panel p-4">
                <h2 class="text-xl font-bold mb-4 border-b border-gray-700 pb-2">BLACKLIST (LOCK 15P)</h2>
                <div id="blackListContainer" class="space-y-2 text-sm">
                    </div>
            </div>
        </div>

        <div class="col-span-12 md:col-span-8 panel p-4">
            <h2 class="text-xl font-bold mb-4 border-b border-gray-700 pb-2">ACTIVE POSITIONS</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead>
                        <tr class="text-gray-500 border-b border-gray-800">
                            <th class="p-2">SYMBOL</th>
                            <th class="p-2">SIDE</th>
                            <th class="p-2">ENTRY</th>
                            <th class="p-2">MARK</th>
                            <th class="p-2">DCA</th>
                            <th class="p-2">PNL (%)</th>
                        </tr>
                    </thead>
                    <tbody id="posTableBody"></tbody>
                </table>
            </div>
        </div>

        <div class="col-span-12 panel p-4 mt-4">
            <h2 class="text-xl font-bold mb-2 border-b border-gray-700 pb-2 text-blue-400">DETAILED TRANSACTION LOGS</h2>
            <div id="logContainer" class="h-64 overflow-y-auto text-xs space-y-1"></div>
        </div>
    </div>

    <script>
        let localBlackList = {};

        async function updateStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();

                // 1. Cập nhật Wallet
                document.getElementById('availBal').innerText = data.wallet.availableBalance + '$';
                document.getElementById('totalPnL').innerText = data.status.botPnLClosed.toFixed(2) + '$';

                // 2. Cập nhật Blacklist từ Server
                localBlackList = data.status.blackList || {};
                renderBlackList();

                // 3. Cập nhật Vị thế
                const posBody = document.getElementById('posTableBody');
                posBody.innerHTML = data.activePositions.map(p => `
                    <tr class="border-b border-gray-900 hover:bg-gray-800">
                        <td class="p-2 font-bold">${p.symbol}</td>
                        <td class="p-2 ${p.side === 'SHORT' ? 'text-red-500' : 'text-green-500'}">${p.side}</td>
                        <td class="p-2">${p.entryPrice.toFixed(4)}</td>
                        <td class="p-2 text-gray-400">${p.markPrice || '0.00'}</td>
                        <td class="p-2 text-yellow-500">${p.dcaCount}/${data.botSettings.maxDCA}</td>
                        <td class="p-2 ${p.pnl >= 0 ? 'text-green-400' : 'text-red-400'}">
                            ${p.pnl.toFixed(2)}$ (${((p.pnl / (p.margin * p.leverage)) * 100).toFixed(2)}%)
                        </td>
                    </tr>
                `).join('');

                // 4. Cập nhật Logs
                const logBox = document.getElementById('logContainer');
                logBox.innerHTML = data.status.botLogs.map(l => 
                    `<div class="log-${l.type}">[${l.time}] ${l.msg}</div>`
                ).join('');

            } catch (e) {
                console.error("Fetch error:", e);
            }
        }

        function renderBlackList() {
            const container = document.getElementById('blackListContainer');
            const keys = Object.keys(localBlackList);
            
            if (keys.length === 0) {
                container.innerHTML = '<div class="text-gray-600 italic">No symbols locked</div>';
                return;
            }

            container.innerHTML = keys.map(sym => {
                const sec = localBlackList[sym];
                const min = Math.floor(sec / 60);
                const s = sec % 60;
                return `
                    <div class="flex justify-between items-center bg-gray-900 p-2 border-l-2 border-red-500">
                        <span class="font-bold">${sym}</span>
                        <span class="text-red-400 font-mono">${min}:${s < 10 ? '0' : ''}${s}</span>
                    </div>
                `;
            }).join('');
        }

        // Vòng lặp đếm ngược giây tại máy khách (Client-side countdown)
        setInterval(() => {
            let changed = false;
            for (let sym in localBlackList) {
                if (localBlackList[sym] > 0) {
                    localBlackList[sym]--;
                    changed = true;
                } else {
                    delete localBlackList[sym];
                    changed = true;
                }
            }
            if (changed) renderBlackList();
        }, 1000);

        // Cập nhật dữ liệu từ Bot mỗi 2 giây
        setInterval(updateStatus, 2000);
        updateStatus();
    </script>
</body>
</html>
