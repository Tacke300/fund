<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MONCEY D. LUFFY BOT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #eee; font-family: monospace; font-size: 12px; }
        .card { background: #111; border: 1px solid #222; padding: 10px; border-radius: 4px; }
        .up { color: #00ff88; } .down { color: #ff4444; }
        input { background: #000; border: 1px solid #333; color: #fff; padding: 6px; text-align: left; padding-left: 8px; border-radius: 3px; width: 100%; outline: none; font-size: 11px; }
        input:focus { border-color: #ef4444; }
        .bl-tag { background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; padding: 2px 5px; border-radius: 3px; color: #ef4444; font-size: 10px; display: flex; gap: 5px; align-items: center; }
        .bl-time { font-weight: bold; color: #fff; background: #3b0712; padding: 0 3px; border-radius: 2px; }
        
        /* Chữ nghệ thuật đầu trang */
        .logo-container { text-align: center; background: linear-gradient(180deg, #1c1917 0%, #000 100%); border: 1px solid #292524; padding: 15px 10px; border-radius: 6px; position: relative; overflow: hidden; }
        .logo-container::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, #ef4444, transparent); animation: laser 3s linear infinite; }
        @keyframes laser { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
    </style>
</head>
<body class="p-2 space-y-3 max-w-2xl mx-auto">

    <!-- LOGO ĐẦU TRANG SIÊU ĐẸP -->
    <div class="logo-container my-1 select-none">
        <h1 class="text-2xl font-black tracking-widest text-red-500 font-serif drop-shadow-[0_2px_10px_rgba(239,68,68,0.4)]">
            🏴‍☠️ MONCEY D. LUFFY
        </h1>
        <p class="text-[10px] tracking-[0.4em] uppercase text-zinc-500 font-bold mt-1">
            Automated Futures Trading System
        </p>
        <!-- THÀNH PHẦN MỚI THÊM: DÒNG HIỂN THỊ IPV4 XANH LÁ -->
        <p id="bot-ip" class="text-[11px] text-green-500 font-bold mt-2 tracking-wide">
            IP: Đang kiểm tra...
        </p>
    </div>

    <!-- 2. CẤU HÌNH API -->
    <div class="card space-y-2">
        <div class="grid grid-cols-2 gap-2">
            <div>
                <p class="text-[9px] text-zinc-500 uppercase mb-1">Binance API Key</p>
                <input id="apiKey" type="password" placeholder="Nhập API Key...">
            </div>
            <div>
                <p class="text-[9px] text-zinc-500 uppercase mb-1">Binance Secret Key</p>
                <input id="secretKey" type="password" placeholder="Nhập Secret Key...">
            </div>
        </div>
        <div class="grid grid-cols-2 gap-2 pt-1">
            <button onclick="saveAndStart()" class="py-2 bg-red-600 hover:bg-red-700 text-white font-black rounded border border-red-500 uppercase text-xs transition-all tracking-wider shadow-lg shadow-red-950/50">Lưu & Start</button>
            <button id="runBtn" onclick="toggle()" class="py-2 font-bold border rounded uppercase text-xs transition-all tracking-wider"></button>
        </div>
    </div>

    <!-- 1. TÀI KHOẢN -->
    <div class="card grid grid-cols-2 gap-4">
        <div class="space-y-1">
            <p class="text-[9px] text-zinc-500 uppercase">Tài khoản</p>
            <div class="flex justify-between"><span>Ví:</span> <b id="totalWallet">0.00</b></div>
            <div class="flex justify-between text-zinc-400"><span>Khả dụng:</span> <b id="availBalance">0.00</b></div>
            <div class="flex justify-between"><span>Unl PnL:</span> <b id="unrealizedPnL">0.00</b></div>
        </div>
        <div class="space-y-1 border-l border-zinc-800 pl-4">
            <p class="text-[9px] text-zinc-500 uppercase">Bot Stats</p>
            <div class="flex justify-between"><span>Đang mở:</span> <b id="openCount" class="text-yellow-500">0</b></div>
            <div class="flex justify-between"><span>Đã chốt:</span> <b id="closedCount">0</b></div>
            <div class="flex justify-between"><span>PnL chốt:</span> <b id="closedPnL">0.00</b></div>
        </div>
    </div>

    <!-- 4. BLACKLIST ĐẾM NGƯỢC -->
    <div class="card flex flex-wrap gap-2 min-h-[35px] items-center" id="blacklist-display">
        <span class="text-zinc-600 text-[10px] uppercase">Không có token bị blacklist</span>
    </div>

    <!-- 5. VỊ THẾ ĐANG MỞ -->
    <div id="pos-list" class="space-y-2"></div>

    <!-- 6. KÈO TIỀM NĂNG -->
    <div class="card">
        <table class="w-full text-left text-[11px]">
            <tr class="text-zinc-500 border-b border-zinc-800">
                <th>SYMBOL</th><th align="right">1M</th><th align="right">5M</th><th align="right">15M</th>
            </tr>
            <tbody id="candidate-list"></tbody>
        </table>
    </div>

    <!-- 7. LOGS -->
    <div id="logs" class="card h-[130px] overflow-y-auto text-[10px] text-zinc-400 space-y-1 font-mono"></div>

    <script>
        // Hàm tự động fetch lấy IPv4 của mạng hiện tại và gán vào giao diện
        async function fetchIPv4() {
            try {
                const response = await fetch('https://api4.ipify.org?format=json');
                const data = await response.json();
                if(data.ip) {
                    document.getElementById('bot-ip').innerText = `IP: ${data.ip}`;
                }
            } catch (e) {
                document.getElementById('bot-ip').innerText = `IP: Không thể lấy dữ liệu`;
            }
        }

        // Sửa hàm hiển thị đếm ngược định dạng mm:ss chuẩn xác từ số giây nguyên bản
        function fmtTime(totalSeconds) { 
            if (totalSeconds <= 0) return "0:00";
            const m = Math.floor(totalSeconds / 60); 
            const s = totalSeconds % 60;
            return `${m}:${s.toString().padStart(2, '0')}`; 
        }

        async function sync() {
            try {
                const r = await fetch('/api/status'); const d = await r.json();
                
                document.getElementById('totalWallet').innerText = d.wallet.totalWalletBalance;
                document.getElementById('availBalance').innerText = d.wallet.availableBalance;
                document.getElementById('unrealizedPnL').innerText = d.wallet.totalUnrealizedProfit;
                document.getElementById('unrealizedPnL').className = parseFloat(d.wallet.totalUnrealizedProfit) >= 0 ? 'up' : 'down';
                
                document.getElementById('openCount').innerText = d.activePositions.length;
                document.getElementById('closedCount').innerText = d.status.botClosedCount;
                document.getElementById('closedPnL').innerText = d.status.botPnLClosed.toFixed(2);

                // Đồng bộ và render đếm ngược thời gian Blacklist thực tế
                const entries = Object.entries(d.status.blackList);
                if (entries.length === 0) {
                    document.getElementById('blacklist-display').innerHTML = '<span class="text-zinc-600 text-[10px] uppercase">Không có token bị blacklist</span>';
                } else {
                    document.getElementById('blacklist-display').innerHTML = entries.map(([s, secondsLeft]) => `
                        <span class="bl-tag">🏴‍☠️ ${s.replace('USDT','')}</span>`
                    ).join('');
                }

                document.getElementById('candidate-list').innerHTML = d.status.candidatesList.slice(0,10).map(c => `
                    <tr class="border-b border-zinc-900">
                        <td class="py-1 font-bold text-zinc-300">${c.symbol.replace('USDT','')}</td>
                        <td align="right" class="${parseFloat(c.c1)>=0?'up':'down'}">${c.c1}%</td>
                        <td align="right" class="${parseFloat(c.c5)>=0?'up':'down'}">${c.c5}%</td>
                        <td align="right" class="${parseFloat(c.c15)>=0?'up':'down'}">${c.c15}%</td>
                    </tr>`).join('');

                document.getElementById('pos-list').innerHTML = d.activePositions.map(p => `
                    <div class="card border-l-2 border-red-500 bg-zinc-950 p-2">
                        <div class="flex justify-between items-center">
                            <div>
                                <div class="font-bold text-white uppercase">${p.symbol} <span class="text-[10px] text-zinc-600">x${p.leverage}</span></div>
                                <div class="text-[9px] text-zinc-500">Entry: ${p.entryPrice} | TP: ${p.tp}</div>
                            </div>
                            <div class="text-right">
                                <div class="${p.pnl>=0?'up':'down'} font-black text-sm">${p.pnl.toFixed(2)}$</div>
                                <div class="text-[9px] text-zinc-600">${p.priceDev.toFixed(2)}% | DCA: ${p.dcaCount}</div>
                            </div>
                        </div>
                    </div>`).join('');

                document.getElementById('logs').innerHTML = d.status.botLogs.map(l => `<div>[${l.time}] ${l.msg}</div>`).join('');
                
                // Cập nhật giao diện nút Stop
                document.getElementById('runBtn').innerText = d.botSettings.isRunning ? "STOP BOT" : "BOT ĐANG TẮT";
                document.getElementById('runBtn').className = d.botSettings.isRunning ? "py-2 rounded border-red-500 text-red-500 bg-red-950/20 cursor-pointer" : "py-2 rounded border-zinc-700 text-zinc-500 bg-zinc-900 cursor-not-allowed";
            } catch (e) {}
        }

        async function toggle() {
            const r = await fetch('/api/status'); const d = await r.json();
            if (d.botSettings.isRunning) {
                await fetch('/api/settings', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ isRunning: false }) });
            }
        }

        async function saveAndStart() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const secretKey = document.getElementById('secretKey').value.trim();

            if (!apiKey || !secretKey) {
                alert("Vui lòng điền đủ API Key và Secret Key!");
                return;
            }

            const body = { apiKey, secretKey, isRunning: true };

            try {
                const res = await fetch('/api/settings', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
                const data = await res.json();
                if(data.success) {
                    alert("HỆ THỐNG ĐÃ LƯU KEY VÀ KÍCH HOẠT LUFFY BOT CHẠY!");
                }
            } catch(e) {
                alert("Lỗi kết nối server!");
            }
        }

        setInterval(sync, 1000);
        window.onload = () => {
            fetchIPv4(); // Gọi chạy lấy IP ngay khi tải trang
            fetch('/api/status').then(r => r.json()).then(d => {
                if (d.botSettings.apiKey) document.getElementById('apiKey').value = d.botSettings.apiKey;
                if (d.botSettings.secretKey) document.getElementById('secretKey').value = d.botSettings.secretKey;
            }).catch(() => {});
        }
    </script>
</body>
</html>
