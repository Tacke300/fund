<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>MONCEY D. LUFFY BOT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background: #000; color: #eee; font-family: monospace; font-size: 12px; } .card { background: #111; border: 1px solid #222; padding: 10px; border-radius: 4px; } .up { color: #00ff88; } .down { color: #ff4444; } input { background: #000; border: 1px solid #333; color: #fff; padding: 6px; width: 100%; border-radius: 3px; }</style>
</head>
<body class="p-2 space-y-3 max-w-2xl mx-auto">
    <div class="card text-center"><h1 class="text-red-500 font-bold text-xl">🏴‍☠️ MONCEY D. LUFFY</h1><p id="bot-ip" class="text-green-500">IP: Đang kết nối...</p></div>
    <div id="config-area" class="card grid grid-cols-2 gap-2">
        <input id="capital" placeholder="Vốn ($ hoặc %)">
        <input id="volVolatility" placeholder="Vol biến động">
        <input id="maxPos" placeholder="Max Pos">
        <input id="maxDca" placeholder="Max DCA">
        <input id="tp" placeholder="TP %">
        <input id="sl" placeholder="SL %">
        <button onclick="startBot()" class="col-span-2 bg-green-600 p-2 rounded">START BOT</button>
    </div>
    <div id="stop-area" class="hidden"><button onclick="stopBot()" class="w-full bg-red-600 p-4 rounded font-bold">STOP BOT</button></div>
    <button onclick="panic()" class="w-full bg-amber-900 p-2 rounded text-amber-500 font-bold border border-amber-700">⚠️ PANIC CLOSE ALL</button>
    
    <div class="card grid grid-cols-2">
        <div>Ví: <b id="totalWallet">0</b> | Khả dụng: <b id="availBalance">0</b></div>
        <div class="text-right">PnL chốt: <b id="closedPnL">0</b></div>
    </div>
    
    <div id="pos-list" class="space-y-2"></div>
    <div class="card"><table class="w-full text-left" id="candidate-list"></table></div>
    <div id="logs" class="card h-[100px] overflow-y-auto"></div>

    <script>
        async function sync() {
            const r = await fetch('/api/status'); const d = await r.json();
            document.getElementById('totalWallet').innerText = d.wallet.totalWalletBalance;
            document.getElementById('availBalance').innerText = d.wallet.availableBalance;
            document.getElementById('closedPnL').innerText = d.status.botPnLClosed.toFixed(2);
            document.getElementById('pos-list').innerHTML = d.activePositions.map(p => `
                <div class="card border-l-2 ${p.side==='LONG'?'border-green-500':'border-red-500'}">
                    ${p.symbol} | ${p.side} | PnL: <b class="${p.pnl>=0?'up':'down'}">${p.pnl.toFixed(2)}$</b>
                </div>`).join('');
            document.getElementById('logs').innerHTML = d.status.botLogs.map(l => `<div>[${l.time}] ${l.msg}</div>`).join('');
            
            const isRun = d.botSettings.isRunning;
            document.getElementById('config-area').classList.toggle('hidden', isRun);
            document.getElementById('stop-area').classList.toggle('hidden', !isRun);
        }
        async function startBot() {
            const config = { 
                invValue: document.getElementById('capital').value,
                volVolatility: parseFloat(document.getElementById('volVolatility').value),
                maxPositions: parseInt(document.getElementById('maxPos').value),
                maxDCA: parseInt(document.getElementById('maxDca').value),
                posTP: parseFloat(document.getElementById('tp').value),
                posSL: parseFloat(document.getElementById('sl').value),
                isRunning: true 
            };
            await fetch('/api/settings', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(config) });
        }
        async function stopBot() { await fetch('/api/settings', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ isRunning: false }) }); }
        async function panic() { if(confirm("Đóng sạch sàn?")) await fetch('/api/panic-close-all', { method:'POST' }); }
        setInterval(sync, 1000);
    </script>
</body>
</html>
