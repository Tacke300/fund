<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>HEDGE BOT 1820 CONTROL</title>
    <style>
        body { font-family: Arial; background: #121212; color: #fff; padding: 20px; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        input { padding: 8px; width: 80px; }
        button { padding: 8px 15px; cursor: pointer; background: #007bff; color: white; border: none; }
        .log { height: 200px; overflow-y: scroll; background: #000; padding: 10px; font-size: 12px; }
    </style>
</head>
<body>
    <h1>HEDGE BOT CONTROL (PORT 1820)</h1>
    
    <div class="card">
        <h3>Cấu hình Bot</h3>
        Vốn ($): <input type="number" id="inv" value="1">
        Max Vị thế: <input type="number" id="maxPos" value="3">
        % Lưới: <input type="number" id="gridStep" value="1.0">
        Hệ số DCA: <input type="number" id="heSo" value="1">
        TP (%): <input type="number" id="tp" value="1.0">
        <button onclick="updateSettings()">LƯU CẤU HÌNH</button>
    </div>

    <div class="card">
        <h3>Trạng thái & Log</h3>
        <div id="logs" class="log"></div>
    </div>

    <script>
        function updateSettings() {
            const data = {
                invValue: document.getElementById('inv').value,
                maxPositions: document.getElementById('maxPos').value,
                gridStepPercent: document.getElementById('gridStep').value,
                heSoDCA: document.getElementById('heSo').value,
                tpPercent: document.getElementById('tp').value
            };
            fetch('http://localhost:1820/api/settings', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            }).then(res => alert('Đã cập nhật cấu hình!'));
        }

        function refreshStatus() {
            fetch('http://localhost:1820/api/status')
                .then(res => res.json())
                .then(data => {
                    const logDiv = document.getElementById('logs');
                    logDiv.innerHTML = data.status.botLogs.map(l => `[${l.time}] ${l.msg}`).join('<br>');
                });
        }
        setInterval(refreshStatus, 2000);
    </script>
</body>
</html>
