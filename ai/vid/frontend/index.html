<!DOCTYPE html>
<html class="dark">
<head>
    <meta charset="UTF-8">
    <title>AI Video Automation Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white flex h-screen overflow-hidden">

    <div class="w-80 p-4 border-r border-slate-800 flex flex-col justify-between bg-slate-900">
        <div>
            <h2 class="text-xl font-bold mb-4 text-blue-500">Cấu Hình Video</h2>
            
            <label class="block text-xs text-slate-400 mb-1">Giọng đọc AI</label>
            <select id="voice" class="w-full bg-slate-800 p-2 mb-3 border border-slate-700 rounded"></select>
            
            <label class="block text-xs text-slate-400 mb-1">Thể loại / Phong cách</label>
            <select id="videoType" class="w-full bg-slate-800 p-2 mb-3 border border-slate-700 rounded"></select>
            
            <label class="block text-xs text-slate-400 mb-1">Độ phân giải đầu ra</label>
            <select id="res" class="w-full bg-slate-800 p-2 mb-3 border border-slate-700 rounded">
                <option value="320">320p (480x320)</option>
                <option value="720" selected>720p (1280x720)</option>
                <option value="1080">1080p (1920x1080)</option>
                <option value="2k">2K (2560x1440)</option>
                <option value="4k">4K (3840x2160)</option>
            </select>

            <label class="block text-xs text-slate-400 mb-1">Chèn Watermark</label>
            <input id="watermark" type="text" value="Tacke300 Bot" class="w-full bg-slate-800 p-2 mb-4 border border-slate-700 rounded">
        </div>
        
        <button onclick="startRender()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded shadow transition">
            RENDER VIDEO
        </button>
    </div>

    <div class="flex-1 p-6 flex flex-col gap-4">
        <div class="flex-1 flex flex-col">
            <h3 class="text-sm font-semibold text-slate-400 mb-2">Kịch bản render hiện tại</h3>
            <textarea id="scriptText" class="w-full flex-1 bg-slate-900 p-3 border border-slate-800 rounded resize-none text-sm text-slate-300">
Tiêu đề: Chú Mèo Và Chiếc Đồng Hồ

Một buổi chiều mưa, Minh phát hiện một chiếc đồng hồ cũ nằm dưới gốc cây trước nhà. Chiếc đồng hồ đã ngừng chạy từ rất lâu, nhưng khi Minh chạm vào, kim giây bất ngờ chuyển động.
            </textarea>
        </div>

        <div class="h-64 flex gap-4">
            <div class="w-1/2 flex flex-col">
                <h3 class="text-sm font-semibold text-slate-400 mb-1">Trực quan hóa Logs (300ms)</h3>
                <pre id="console" class="flex-1 bg-black text-green-500 font-mono text-xs overflow-y-auto p-3 border border-slate-800 rounded"></pre>
            </div>
            <div class="w-1/2 flex flex-col">
                <h3 class="text-sm font-semibold text-slate-400 mb-1">Video xem trước</h3>
                <video id="preview" controls class="flex-1 w-full bg-black rounded border border-slate-800"></video>
            </div>
        </div>
    </div>

    <script>
        // Khởi tạo nhanh danh sách mảng dữ liệu cấu hình đầu vào
        const voices = Array.from({length: 5}, (_,i) => `Giọng đọc Premium #${i+1}`);
        const types = ["Animal Shorts", "Anime Art", "Cyberpunk Edit", "Realistic Cinematic", "Pencil Sketch"];
        
        document.getElementById('voice').innerHTML = voices.map(v => `<option value="${v}">${v}</option>`).join('');
        document.getElementById('videoType').innerHTML = types.map(t => `<option value="${t}">${t}</option>`).join('');

        async function startRender() {
            const btn = document.querySelector('button');
            btn.disabled = true;
            btn.innerText = "ĐANG XỬ LÝ...";

            try {
                const response = await fetch('/api/render', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        script: document.getElementById('scriptText').value,
                        voice: document.getElementById('voice').value,
                        style: document.getElementById('videoType').value,
                        resOption: document.getElementById('res').value,
                        watermark: document.getElementById('watermark').value
                    })
                });

                const result = await response.json();
                if (result.status === 'Success') {
                    document.getElementById('preview').src = result.videoUrl;
                    document.getElementById('preview').play();
                } else {
                    alert("Render thất bại: " + result.error);
                }
            } catch (err) {
                alert("Mất kết nối tới máy chủ render!");
            } finally {
                btn.disabled = false;
                btn.innerText = "RENDER VIDEO";
            }
        }

        // Tần suất quét Logs tốc độ cao 300ms real-time
        setInterval(async () => {
            try {
                const logs = await fetch('/api/logs').then(r => r.text());
                const el = document.getElementById('console');
                el.innerText = logs;
                el.scrollTop = el.scrollHeight; // Tự cuộn log xuống cuối dòng
            } catch (e) {}
        }, 300);
    </script>
</body>
</html>
