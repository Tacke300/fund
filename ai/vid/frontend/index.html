<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <title>AI Studio Realtime</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white font-sans h-screen flex">
    <div class="w-64 bg-slate-900 p-6">
        <h1 class="text-xl font-bold text-indigo-500 mb-8">AI STUDIO PRO</h1>
        <div id="stats" class="space-y-2 text-sm text-slate-400">
            <p>CPU: <span id="cpu">0</span>%</p>
            <p>RAM: <span id="ram">0</span>%</p>
        </div>
    </div>

    <div class="flex-1 p-8">
        <textarea id="script" class="w-full h-32 bg-slate-900 border border-slate-700 p-4 rounded"></textarea>
        <button onclick="run()" class="mt-4 bg-indigo-600 px-6 py-2 rounded">Chạy bot xử lý</button>
        
        <h3 class="mt-8 mb-2 text-indigo-400">Log chi tiết:</h3>
        <div id="logs" class="w-full h-64 bg-black p-4 font-mono text-green-500 text-xs overflow-y-auto border border-slate-800"></div>
    </div>

    <script>
        async function run() {
            const script = document.getElementById('script').value;
            await fetch('/api/analyze', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({script}) });
            alert("Đã gửi kịch bản cho Bot!");
        }

        async function updateUI() {
            const [sys, log] = await Promise.all([
                fetch('/api/system').then(r => r.json()),
                fetch('/api/logs').then(r => r.text())
            ]);
            document.getElementById('cpu').innerText = sys.cpu.toFixed(1);
            document.getElementById('ram').innerText = sys.ram.toFixed(1);
            document.getElementById('logs').innerText = log;
        }
        setInterval(updateUI, 2000);
    </script>
</body>
</html>
