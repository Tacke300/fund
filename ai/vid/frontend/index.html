<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tool Render Phim AI Tự Động 100%</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-6 font-sans">
<div class="max-w-6xl mx-auto bg-slate-800 p-6 rounded-lg shadow-xl border border-slate-700">
<h1 class="text-2xl font-bold text-yellow-500 mb-6 text-center">HỆ THỐNG RENDER PHIM TỰ ĐỘNG PHÂN TÍCH NHÂN VẬT</h1>

<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <form id="renderForm" class="space-y-6">
        <div class="bg-slate-700 p-4 rounded border border-slate-600">
            <h2 class="text-lg font-bold text-pink-400 mb-4">Cấu Hình Xuất Phim</h2>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs text-slate-300 mb-1">Độ phân giải</label>
                    <select id="resolution" class="w-full bg-slate-800 p-2 text-sm border border-slate-600 rounded text-white">
                        <option value="360">360p (640x360)</option>
                        <option value="720">720p HD (1280x720)</option>
                        <option value="1080" selected>1080p FHD (1920x1080)</option>
                        <option value="2k">2K QHD (2560x1440)</option>
                        <option value="4k">4K UHD (3840x2160)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs text-slate-300 mb-1">Khung hình (FPS)</label>
                    <input type="number" id="fps" value="30" class="w-full bg-slate-800 p-2 text-sm border border-slate-600 rounded text-white">
                </div>
                <div>
                    <label class="block text-xs text-slate-300 mb-1">Audio Bitrate</label>
                    <select id="audioBitrate" class="w-full bg-slate-800 p-2 text-sm border border-slate-600 rounded text-white">
                        <option value="128k">128 kbps</option>
                        <option value="192k">192 kbps</option>
                        <option value="320k" selected>320 kbps</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs text-slate-300 mb-1">Chọn Giọng</label>
                    <select id="voiceMode" class="w-full bg-slate-800 p-2 text-sm border border-slate-600 rounded text-white">
                        <option value="male_north">Nam - Miền Bắc</option>
                        <option value="female_north">Nữ - Miền Bắc</option>
                        <option value="male_south">Nam - Miền Nam</option>
                        <option value="female_south">Nữ - Miền Nam</option>
                        <option value="clone">Fake Voice (File tải lên)</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="bg-slate-700 p-4 rounded border border-slate-600">
            <h2 class="text-lg font-bold text-blue-400 mb-4">Kịch Bản (Hệ thống sẽ tự phân tích và tạo nhân vật)</h2>
            <div class="mb-4">
                <label class="block text-xs text-slate-300 mb-1">File Audio (Chỉ dùng cho Fake Voice)</label>
                <input type="file" id="uploadedAudio" accept="audio/*" class="text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded file:bg-slate-600 file:text-white border-0">
            </div>
            <div>
                <textarea id="script" rows="8" placeholder="Nhập kịch bản vào đây. Ví dụ: Một cô gái trẻ mặc váy đỏ đang đi dạo trong rừng, nét mặt buồn bã..." class="w-full bg-slate-800 p-2 text-sm border border-slate-600 rounded text-white" required></textarea>
            </div>
        </div>

        <button type="submit" class="w-full bg-yellow-600 hover:bg-yellow-500 text-white font-bold py-3 px-4 rounded shadow-lg transition-all">
            PHÂN TÍCH & RENDER PHIM
        </button>
    </form>

    <div class="bg-slate-700 p-4 rounded border border-slate-600 flex flex-col">
        <h2 class="text-lg font-bold text-gray-300 mb-4">Trình Phát & Báo Lỗi</h2>
        
        <div id="statusBox" class="mb-4 p-4 bg-slate-900 border border-slate-600 rounded overflow-y-auto max-h-48">
            <p id="statusText" class="text-sm text-slate-400 font-mono whitespace-pre-wrap">Hệ thống sẵn sàng nhận kịch bản...</p>
        </div>

        <div class="bg-black w-full aspect-video rounded flex items-center justify-center border border-slate-600 relative overflow-hidden mb-4">
            <video id="previewPlayer" controls class="w-full h-full hidden"></video>
            <span id="placeholderText" class="text-slate-500 text-sm absolute">Chưa có video</span>
        </div>

        <a id="downloadBtn" href="#" download class="hidden w-full bg-green-600 hover:bg-green-500 text-white font-bold py-2 px-4 rounded text-center mb-4">
            ⬇️ TẢI VIDEO XUỐNG
        </a>
    </div>
</div>
</div>

<script>
document.getElementById('renderForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const statusBox = document.getElementById('statusBox');
    const statusText = document.getElementById('statusText');
    const previewPlayer = document.getElementById('previewPlayer');
    const placeholderText = document.getElementById('placeholderText');
    const downloadBtn = document.getElementById('downloadBtn');

    statusBox.classList.replace('border-slate-600', 'border-green-500');
    statusBox.classList.replace('border-red-500', 'border-green-500');
    statusText.className = "text-sm text-green-400 font-mono whitespace-pre-wrap";
    statusText.innerText = "[HỆ THỐNG] Đang phân tích kịch bản, tự tạo nhân vật & render...\n";
    
    previewPlayer.classList.add('hidden');
    placeholderText.classList.remove('hidden');
    downloadBtn.classList.add('hidden');

    const formData = new FormData();
    formData.append('resolution', document.getElementById('resolution').value);
    formData.append('fps', document.getElementById('fps').value);
    formData.append('audioBitrate', document.getElementById('audioBitrate').value);
    formData.append('voiceMode', document.getElementById('voiceMode').value);
    formData.append('script', document.getElementById('script').value);
    
    const audioFile = document.getElementById('uploadedAudio').files[0];
    if (audioFile) formData.append('audioFile', audioFile);

    try {
        const response = await fetch('/api/render', { method: 'POST', body: formData });
        const data = await response.json().catch(() => ({ error: "Server không trả về JSON hợp lệ." }));

        if (response.ok) {
            statusText.innerText += `\n[THÀNH CÔNG] Phim đã xuất xong!`;
            if(data.videoUrl) {
                previewPlayer.src = data.videoUrl;
                previewPlayer.classList.remove('hidden');
                placeholderText.classList.add('hidden');
                downloadBtn.href = data.videoUrl;
                downloadBtn.classList.remove('hidden');
            }
        } else {
            throw new Error(data.error || "Lỗi server không xác định");
        }
    } catch (err) {
        statusBox.classList.replace('border-green-500', 'border-red-500');
        statusText.className = "text-sm text-red-400 font-mono whitespace-pre-wrap";
        statusText.innerText = `[LỖI NGHIÊM TRỌNG]:\n${err.message}`;
    }
});
</script>
</body>
</html>
