<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Generator - Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 p-6">
    <div class="max-w-2xl mx-auto bg-slate-800 p-6 rounded-xl shadow-2xl border border-slate-700">
        <h1 class="text-xl font-bold mb-6 text-yellow-400 border-b border-slate-700 pb-2">Bảng Điều Khiển Video AI</h1>
        
        <div class="mb-4">
            <label class="block text-sm font-semibold mb-2">Kịch bản (Script)</label>
            <textarea id="script" class="w-full h-32 bg-slate-900 border border-slate-700 rounded p-3 text-sm focus:ring-2 focus:ring-yellow-500 outline-none" placeholder="Nhập kịch bản vào đây..."></textarea>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-4">
            <div>
                <label class="block text-xs text-slate-400 font-bold mb-1">Chọn Giọng Đọc</label>
                <select id="voiceType" class="w-full bg-slate-900 p-2 text-sm border border-slate-700 rounded text-white">
                    <option value="vi-VN-male">Giọng Nam (Miền Nam)</option>
                    <option value="vi-VN-female" selected>Giọng Nữ (Miền Nam)</option>
                    <option value="vi-VN-north-female">Giọng Nữ (Miền Bắc)</option>
                </select>
            </div>
            <div>
                <label class="block text-xs text-slate-400 font-bold mb-1">Tốc độ đọc</label>
                <select id="voiceSpeed" class="w-full bg-slate-900 p-2 text-sm border border-slate-700 rounded text-white">
                    <option value="1.0">Bình thường (1.0x)</option>
                    <option value="1.2">Nhanh (1.2x)</option>
                </select>
            </div>
        </div>

        <div class="mb-6">
            <label class="block text-xs text-slate-400 font-bold mb-1">Ảnh nền (Background)</label>
            <input type="file" id="imageUpload" class="w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:bg-yellow-600 file:text-white hover:file:bg-yellow-500">
        </div>

        <button onclick="startRender()" class="w-full bg-yellow-600 hover:bg-yellow-500 text-white font-bold py-3 rounded-lg transition-all shadow-lg">
            XUẤT VIDEO NGAY
        </button>
    </div>

    <script>
        async function startRender() {
            const formData = new FormData();
            formData.append('script', document.getElementById('script').value);
            formData.append('voiceType', document.getElementById('voiceType').value);
            formData.append('voiceSpeed', document.getElementById('voiceSpeed').value);
            
            const imageFile = document.getElementById('imageUpload').files[0];
            if (imageFile) formData.append('image', imageFile);

            try {
                const response = await fetch('/api/render', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                alert('Bắt đầu render! Kiểm tra log server để theo dõi tiến trình.');
            } catch (err) {
                console.error('Lỗi kết nối:', err);
                alert('Có lỗi xảy ra khi gửi yêu cầu.');
            }
        }
    </script>
</body>
</html>
