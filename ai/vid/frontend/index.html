<!DOCTYPE html>
<html class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Video Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white h-screen flex flex-col overflow-hidden antialiased p-2 sm:p-4">

    <div class="flex-1 grid grid-cols-1 md:grid-cols-2 gap-3 min-h-0 w-full max-w-7xl mx-auto">
        
        <div class="bg-slate-900 border border-slate-800 rounded-xl p-3 flex flex-col justify-between min-h-0">
            <div class="flex flex-col flex-1 min-h-0">
                <h2 class="text-sm font-bold text-blue-500 mb-2 flex items-center gap-1.5">
                    <span>⚙️</span> CẤU HÌNH PANEL & WATERMARK
                </h2>
                
                <div class="grid grid-cols-2 gap-2 mb-2 bg-slate-950 p-2 rounded-lg border border-slate-800/60">
                    <div>
                        <label class="block text-[10px] text-slate-400 mb-0.5">Độ phân giải</label>
                        <select id="res" class="w-full bg-slate-800 p-1.5 text-xs border border-slate-700 rounded text-white">
                            <option value="720" selected>720p (HD)</option>
                            <option value="1080">1080p (FHD)</option>
                            <option value="320">320p (Low)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] text-slate-400 mb-0.5">Nội dung chữ Reup</label>
                        <input id="watermark" type="text" value="Tacke300 Bot" class="w-full bg-slate-800 p-1.5 text-xs border border-slate-700 rounded text-white">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2 mb-2 bg-slate-950 p-2 rounded-lg border border-slate-800/60">
                    <div>
                        <label class="block text-[10px] text-yellow-500 mb-0.5">Kiểu chạy Watermark</label>
                        <select id="wmStyle" class="w-full bg-slate-800 p-1.5 text-xs border border-slate-700 rounded text-white">
                            <option value="all" selected>Bật cả 2 (Chéo + Ngang dưới)</option>
                            <option value="zigzag">Chỉ chạy chéo Zigzag</option>
                            <option value="bottom">Chỉ chạy ngang cạnh dưới</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] text-yellow-500 mb-0.5">Độ mờ chữ (Opacity)</label>
                        <select id="wmOpacity" class="w-full bg-slate-800 p-1.5 text-xs border border-slate-700 rounded text-white">
                            <option value="0.10">Siêu mờ (10%)</option>
                            <option value="0.15" selected>Mờ vừa phải (15%)</option>
                            <option value="0.30">Nhìn rõ (30%)</option>
                        </select>
                    </div>
                </div>

                <div class="flex-1 flex flex-col min-h-0 mt-1">
                    <span class="text-[11px] text-slate-400 font-medium mb-1">📝 Văn bản kịch bản:</span>
                    <textarea id="scriptText" class="w-full flex-1 bg-slate-950 border border-slate-800 rounded-lg p-2 text-xs text-slate-200 focus:outline-none focus:border-slate-700 resize-none font-sans leading-relaxed">
Một buổi chiều mưa, Minh phát hiện một chiếc đồng hồ cũ nằm dưới gốc cây trước nhà. Chiếc đồng hồ đã ngừng chạy từ rất lâu, nhưng khi Minh chạm vào, kim giây bất ngờ chuyển động.
                    </textarea>
                </div>
            </div>
            
            <button onclick="startRender()" id="btnRender" class="w-full mt-2 bg-blue-600 hover:bg-blue-700 active:scale-[0.98] text-white text-xs font-bold py-2.5 rounded-lg transition-all tracking-wide shadow-lg flex-shrink-0">
                ⚡ KHỞI CHẠY RENDER VIDEO
            </button>
        </div>

        <div class="flex flex-col gap-3 min-h-0">
            <div class="bg-slate-900 border border-slate-800 rounded-xl p-3 flex flex-col h-1/2 min-h-0">
                <span class="text-xs text-slate-400 font-medium mb-1.5 flex items-center gap-1">🎬 Khung Preview Sản Phẩm:</span>
                <div class="flex-1 bg-black rounded-lg overflow-hidden flex items-center justify-center relative border border-slate-950">
                    <video id="preview" controls playsinline class="w-full h-full object-contain"></video>
                </div>
            </div>

            <div class="bg-slate-900 border border-slate-800 rounded-xl p-3 flex flex-col h-1/2 min-h-0">
                <span class="text-xs text-slate-400 font-medium mb-1.5 flex items-center gap-1">📊 Log Engine (300ms):</span>
                <pre id="console" class="flex-1 bg-black text-emerald-400 font-mono text-[10px] p-2 border border-slate-950 rounded-lg overflow-y-auto whitespace-pre-wrap"></pre>
            </div>
        </div>
    </div>

    <script>
        async function startRender() {
            const btn = document.getElementById('btnRender');
            btn.disabled = true;
            btn.className = "w-full mt-2 bg-slate-800 text-slate-500 text-xs font-bold py-2.5 rounded-lg cursor-not-allowed";
            btn.innerText = "⏳ ĐANG RENDER ENGINE...";

            try {
                const response = await fetch('/api/render', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        script: document.getElementById('scriptText').value,
                        resOption: document.getElementById('res').value,
                        watermark: document.getElementById('watermark').value,
                        wmStyle: document.getElementById('wmStyle').value,       // Gửi kiểu chạy lên server
                        wmOpacity: document.getElementById('wmOpacity').value     // Gửi độ mờ lên server
                    })
                });

                const result = await response.json();
                if (result.status === 'Success') {
                    const videoEl = document.getElementById('preview');
                    videoEl.src = result.videoUrl;
                    videoEl.load();
                    videoEl.play().catch(() => console.log("Chờ tương tác"));
                } else {
                    alert("Lỗi: " + result.error);
                }
            } catch (err) {
                alert("Mất kết nối server!");
            } finally {
                btn.disabled = false;
                btn.className = "w-full mt-2 bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold py-2.5 rounded-lg tracking-wide shadow-lg";
                btn.innerText = "⚡ KHỞI CHẠY RENDER VIDEO";
            }
        }

        setInterval(async () => {
            try {
                const logs = await fetch('/api/logs').then(r => r.text());
                const el = document.getElementById('console');
                el.innerText = logs;
                el.scrollTop = el.scrollHeight;
            } catch (e) {}
        }, 300);
    </script>
</body>
</html>
