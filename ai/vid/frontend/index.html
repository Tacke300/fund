<!DOCTYPE html>
<html class="dark">
<head><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-slate-950 text-white p-8">
    <div class="grid grid-cols-2 gap-8">
        <div class="bg-slate-900 p-6 rounded">
            <h2 class="text-xl font-bold mb-4">Input</h2>
            <textarea id="script" class="w-full h-32 bg-black p-4 text-sm"></textarea>
            <div class="grid grid-cols-2 gap-2 mt-4">
                <button onclick="analyze()" class="bg-green-700 py-2">PHÂN TÍCH</button>
                <button onclick="render()" class="bg-blue-700 py-2">RENDER</button>
            </div>
            <div id="status" class="mt-4 text-yellow-400"></div>
        </div>
        <div id="scenes" class="space-y-2"></div>
    </div>

    <script>
        async function analyze() {
            const script = document.getElementById('script').value;
            const res = await fetch('/api/analyze', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({script}) });
            const data = await res.json();
            document.getElementById('scenes').innerHTML = data.scenes.map((s,i) => `<div class="bg-slate-800 p-2">Cảnh ${i+1}: ${s}</div>`).join('');
        }

        async function render() {
            document.getElementById('status').innerText = "Đang render... vui lòng chờ (check Terminal)";
            await fetch('/api/render', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({
                script: document.getElementById('script').value,
                watermark: "© 2026 AI Bot"
            })});
            document.getElementById('status').innerText = "Xong!";
        }
    </script>
</body>
</html>
