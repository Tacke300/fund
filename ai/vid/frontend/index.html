<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>AI Video Generator - Full Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 p-8">
    <div class="max-w-4xl mx-auto bg-slate-900 p-6 rounded-lg border border-slate-700 shadow-xl">
        <h2 class="text-2xl font-bold mb-6 text-yellow-500 border-b border-slate-700 pb-4">Bảng Điều Khiển Render</h2>
        
        <form id="renderForm" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold mb-2">Kịch bản (Script)</label>
                    <textarea name="script" id="script" class="w-full h-64 bg-slate-800 border border-slate-700 p-3 rounded text-sm focus:border-yellow-500 outline-none"></textarea>
                </div>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-bold mb-2">Kích thước & FPS</label>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="number" name="targetWidth" placeholder="Width" class="bg-slate-800 p-2 rounded border border-slate-700">
                            <input type="number" name="targetHeight" placeholder="Height" class="bg-slate-800 p-2 rounded border border-slate-700">
                        </div>
                        <input type="number" name="fps" placeholder="FPS (vd: 30)" class="w-full mt-2 bg-slate-800 p-2 rounded border border-slate-700">
                    </div>

                    <div>
                        <label class="block text-sm font-bold mb-2">Watermark & Opacity</label>
                        <input type="text" name="watermark" placeholder="Watermark Text" class="w-full bg-slate-800 p-2 mb-2 rounded border border-slate-700">
                        <input type="number" step="0.1" name="wmOpacity" placeholder="Opacity (0.1 - 1.0)" class="w-full bg-slate-800 p-2 rounded border border-slate-700">
                    </div>

                    <div>
                        <label class="block text-sm font-bold mb-2">Cấu hình giọng đọc</label>
                        <select name="voiceMode" class="w-full bg-slate-800 p-2 mb-2 rounded border border-slate-700">
                            <option value="standard">Giọng chuẩn AI</option>
                            <option value="clone">Giọng Clone (Tải lên)</option>
                        </select>
                        <input type="file" name="voiceFile" class="text-xs w-full">
                    </div>
                </div>
            </div>

            <button type="submit" class="w-full bg-yellow-600 hover:bg-yellow-500 py-4 font-bold text-lg rounded shadow-lg transition-all">
                BẮT ĐẦU RENDER VIDEO
            </button>
        </form>
    </div>

    <script>
        document.getElementById('renderForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            
            try {
                const res = await fetch('/api/render', { method: 'POST', body: formData });
                const result = await res.json();
                alert('Lệnh đã gửi: ' + JSON.stringify(result));
            } catch (err) {
                console.error(err);
                alert('Có lỗi xảy ra khi gửi yêu cầu.');
            }
        };
    </script>
</body>
</html>
