<!DOCTYPE html>
<html class="dark">
<body class="bg-slate-950 text-white flex">
    <div class="w-80 p-4 border-r border-slate-800">
        <select id="voice" class="w-full bg-slate-800 p-2 mb-2"></select>
        <select id="videoType" class="w-full bg-slate-800 p-2 mb-2"></select>
        <select id="res" class="w-full bg-slate-800 p-2 mb-2"></select>
        <button onclick="startRender()" class="w-full bg-blue-600 p-2">RENDER VIDEO</button>
    </div>

    <div class="flex-1 p-8">
        <video id="preview" controls class="w-full max-w-2xl bg-black"></video>
        <pre id="console" class="h-40 bg-black text-green-500 overflow-y-auto mt-4 p-4"></pre>
    </div>

    <script>
        // Khởi tạo 20 giọng, 20 loại, 10 độ phân giải
        const voices = Array.from({length: 20}, (_,i) => `Voice ${i+1}`);
        const types = ["Animal", "Chibi", "Realistic", "Anime", "Cartoon", "Sketch", "3D", "Cyberpunk", "Cinematic", "Noir", "Vintage", "PopArt", "OilPaint", "Watercolor", "PixelArt", "Minimalist", "Abstract", "Surreal", "Impressionist", "Collage"];
        const resolutions = ["320x240", "640x360", "854x480", "1280x720", "1920x1080", "2560x1440", "3840x2160", "4096x2160", "1080x1920", "1080x1080"];

        // Fill selects
        document.getElementById('voice').innerHTML = voices.map(v => `<option>${v}</option>`);
        document.getElementById('videoType').innerHTML = types.map(t => `<option>${t}</option>`);
        document.getElementById('res').innerHTML = resolutions.map(r => `<option>${r}</option>`);

        async function startRender() {
            const res = await fetch('/api/render', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    style: document.getElementById('videoType').value,
                    resolution: document.getElementById('res').value,
                    watermark: { text: "MY_BRAND" }
                })
            });
            alert("Đã bắt đầu render! Xem log bên dưới.");
        }

        // Poll Logs
        setInterval(async () => {
            const logs = await fetch('/api/logs').then(r => r.text());
            document.getElementById('console').innerText = logs;
        }, 1000);
    </script>
</body>
</html>
