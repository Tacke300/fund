<!DOCTYPE html>
<html class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Video Control Panel - Fix Full</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white h-screen flex flex-col overflow-hidden antialiased p-2 sm:p-4">

    <div class="flex-1 grid grid-cols-1 md:grid-cols-2 gap-3 min-h-0 w-full max-w-7xl mx-auto">
        
        <div class="bg-slate-900 border border-slate-800 rounded-xl p-3 flex flex-col justify-between min-h-0 overflow-y-auto custom-scrollbar">
            <div class="flex flex-col gap-3">
                
                <div class="bg-slate-950 p-3 rounded-lg border border-slate-800">
                    <h3 class="text-xs font-bold text-emerald-400 mb-2 flex items-center gap-1">🎬 CẤU HÌNH ĐỊNH DẠNG KHUNG HÌNH & CHẤT LƯỢNG</h3>
                    <div class="grid grid-cols-2 gap-2 mb-2">
                        <div>
                            <label class="block text-[10px] text-yellow-500 font-bold mb-0.5">Tỉ lệ & Kích thước khung hình</label>
                            <select id="aspectRatio" class="w-full bg-slate-800 p-1.5 text-xs border border-slate-700 rounded text-white focus:outline-none">
                                <option value="16:9-720" selected>Ngang 16:9 (HD 1280x720)</option>
                                <option value="16:9-1080">Ngang 16:9 (FullHD 1920x1080)</option>
                                <option value="9:16-720">Dọc 9:16 - Shorts/TikTok (720x1280)</option>
                                <option value="9:16-1080">Dọc 9:16 - Shorts/TikTok (1080x1920)</option>
                                <option value="1:1-1080">Vuông 1:1 (1080x1080)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] text-slate-400 mb-0.5">Tốc độ khung hình (FPS)</label>
                            <select id="fps" class="w-full bg-slate-800 p-1.5 text-xs border border-slate-700 rounded text-white">
                                <option value="30" selected>30 FPS (Chuẩn)</option>
                                <option value="60">60 FPS (Mượt mà)</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-[10px] text-yellow-500 font-bold mb-0.5">Chất lượng âm thanh (Audio)</label>
                            <select id="audioBitrate" class="w-full bg-slate-800 p-1.5 text-xs border border-slate-700 rounded text-white">
                                <option value="320k" selected>320 kbps (Super High Quality)</option>
                                <option value="192k">192 kbps (Cao)</option>
                                <option value="128k">128 kbps (Thường)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] text-yellow-500 font-bold mb-0.5">Danh sách giọng đọc AI</label>
                            <select id="voiceSelect" class="w-full bg-slate-800 p-1.5 text-xs border border-slate-700 rounded text-white">
                                <option value="vi-VN-Standard-A" selected>Premium #1 - Nam Bắc (Trầm ấm)</option>
                                <option value="vi-VN-Standard-B">Premium #2 - Nữ Bắc (Truyền cảm)</option>
                                <option value="vi-VN-Neural-C">Premium #3 - Nam Nam (Mạnh mẽ)</option>
                                <option value="vi-VN-Neural-D">Premium #4 - Nữ Nam (Ngọt ngào)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="bg-slate-950 p-3 rounded-lg border border-slate-800">
                    <h3 class="text-xs font-bold text-blue-400 mb-2 flex items-center gap-1">🛡️ CẤU HÌNH WATERMARK REUP MỜ</h3>
                    <div class="grid grid-cols-3 gap-2">
                        <div class="col-span-1">
                            <label class="block text-[10px] text-slate-400 mb-0.5">Nội dung chữ</label>
                            <input id="watermark" type="text" value="Tacke300 Bot" class="w-full bg-slate-800 p-1.5 text-xs border border-slate-700 rounded text-white focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] text-slate-400 mb-0.5">Hiệu ứng chữ</label>
                            <select id="wmStyle" class="w-full bg-slate-800 p-1.5 text-xs border border-slate-700 rounded text-white">
                                <option value="all" selected>Chạy Zigzag + Ngang đáy</option>
                                <option value="zigzag">Chỉ chạy chéo toàn màn hình</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] text-slate-400 mb-0.5">Độ mờ (Opacity)</label>
                            <select id="wmOpacity" class="w-full bg-slate-800 p-1.5 text-xs border border-slate-700 rounded text-white">
                                <option value="0.10">Siêu ẩn (10%)</option>
                                <option value="0.15" selected>Mờ nhẹ (15%)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="flex-1 flex flex-col min-h-[160px]">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[11px] text-slate-400 font-medium">📝 Nội dung kịch bản:</span>
                        <button onclick="analyzeScript()" class="bg-purple-600 hover:bg-purple-700 text-white text-[10px] font-bold px-2 py-1 rounded transition-all">
                            🔍 PHÂN TÍCH NGẮT NGHỈ
                        </button>
                    </div>
                    <textarea id="scriptText" class="w-full flex-1 bg-slate-950 border border-slate-800 rounded-lg p-2 text-xs text-slate-200 focus:outline-none focus:border-slate-700 resize-none font-sans leading-relaxed">
Một buổi chiều mưa, Minh phát hiện một chiếc đồng hồ cũ nằm dưới gốc cây trước nhà. Chiếc đồng hồ đã ngừng chạy từ rất lâu, nhưng khi Minh chạm vào, kim giây bất ngờ chuyển động.
                    </textarea>
                </div>
            </div>
            
            <button onclick="startRender()" id="btnRender" class="w-full mt-2 bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold py-2.5 rounded-lg transition-all tracking-wide shadow-lg">
                ⚡ KHỞI CHẠY RENDER VIDEO KHUNG LỚN
            </button>
        </div>

        <div class="flex flex-col gap-3 min-h-0">
            <div class="bg-slate-900 border border-slate-800 rounded-xl p-3 flex flex-col h-1/2 min-h-0">
                <span class="text-xs text-slate-400 font-medium mb-1.5 flex items-center gap-1">🎬 Khung Preview Sản Phẩm:</span>
                <div class="flex-1 bg-black rounded-lg overflow-hidden flex items-center justify-center relative border border-slate-950">
                    <video id="preview" controls playsinline class="w-full h-full object-contain"></video>
                </div>
            </div>

            <div class="bg-slate-900 border border-slate-800 rounded-xl p-3 flex flex-col h-1/2 min-h-0">
                <span class="text-xs text-slate-400 font-medium mb-1.5 flex items-center gap-1">📊 Tiến trình Engine Real-time (300ms):</span>
                <pre id="console" class="flex-1 bg-black text-emerald-400 font-mono text-[10px] p-2 border border-slate-950 rounded-lg overflow-y-auto whitespace-pre-wrap"></pre>
            </div>
        </div>
    </div>

    <script>
        async function analyzeScript() {
            const text = document.getElementById('scriptText').value;
            const logEl = document.getElementById('console');
            logEl.innerText += `\n[System] Đang gửi phân tích cú pháp ngắt nghỉ...\n`;
            
            try {
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ script: text })
                }).then(r => r.json());

                if (res.status === 'Success') {
                    logEl.innerText += `[Xong] Phân tích hoàn tất: Thể loại [${res.data.metadata.detectedGenre}], [${res.data.metadata.totalScenes}] Phân đoạn.\n`;
                }
            } catch (err) {
                logEl.innerText += `[Lỗi] Mất kết nối API.\n`;
            }
            logEl.scrollTop = logEl.scrollHeight;
        }

        async function startRender() {
            const btn = document.getElementById('btnRender');
            btn.disabled = true;
            btn.innerText = "⏳ ENGINE ĐANG RENDER KHUNG HÌNH LỚN...";

            try {
                const response = await fetch('/api/render', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        script: document.getElementById('scriptText').value,
                        aspectRatio: document.getElementById('aspectRatio').value,
                        fps: document.getElementById('fps').value,
                        audioBitrate: document.getElementById('audioBitrate').value,
                        voice: document.getElementById('voiceSelect').value, // Đồng bộ giọng đọc gửi lên backend
                        watermark: document.getElementById('watermark').value,
                        wmStyle: document.getElementById('wmStyle').value,
                        wmOpacity: document.getElementById('wmOpacity').value
                    })
                });

                const result = await response.json();
                if (result.status === 'Success') {
                    const videoEl = document.getElementById('preview');
                    videoEl.src = result.videoUrl;
                    videoEl.load();
                    videoEl.play().catch(() => {});
                } else {
                    alert("Lỗi: " + result.error);
                }
            } catch (err) {
                alert("Lỗi kết nối server!");
            } finally {
                btn.disabled = false;
                btn.innerText = "⚡ KHỞI CHẠY RENDER VIDEO KHUNG LỚN";
            }
        }

        setInterval(async () => {
            try {
                const logs = await fetch('/api/logs').then(r => r.text());
                const el = document.getElementById('console');
                el.innerText = logs;
                el.scrollTop = el.scrollHeight;
            } catch (e) {}
        }, 300);
    </script>
</body>
</html>
