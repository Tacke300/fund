<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #0a0a0a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 95vh; padding: 20px; }
        #chat { flex: 1; overflow-y: auto; border: 1px solid #333; padding: 15px; margin-bottom: 10px; border-radius: 8px; background: #0f0f0f; }
        .msg { margin: 15px 0; padding: 12px; border-radius: 8px; background: #161616; border: 1px solid #222; }
        .controls { display: flex; gap: 10px; flex-wrap: wrap; }
        button { background: #00f2ff; border: none; padding: 10px; cursor: pointer; font-weight: bold; border-radius: 4px; }
        pre { background: #000; padding: 10px; border-left: 3px solid #00f2ff; overflow-x: auto; color: #00ff00; }
        .status { color: #ffff00; font-style: italic; }
    </style>
</head>
<body>
    <div id="chat"></div>
    <div class="controls">
        <input type="text" id="appName" placeholder="Tên bot (vd: pump_bot)" style="padding: 10px; background:#111; color:#fff; border: 1px solid #333;">
        <textarea id="input" style="flex:1; background:#111; color:#fff; padding: 10px;" placeholder="Yêu cầu tạo bot..."></textarea>
        <button onclick="createBot()">TẠO BOT (AI Workflow)</button>
    </div>

    <script>
        async function createBot() {
            const appName = document.getElementById('appName').value;
            const request = document.getElementById('input').value;
            const chat = document.getElementById('chat');

            if (!appName || !request) return alert("Nhập tên và yêu cầu!");

            chat.innerHTML += `<div class="msg status">Hệ thống đang chạy Coder/Reviewer/Tester cho: ${appName}...</div>`;

            try {
                const res = await fetch('/api/create-bot', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ appName, request })
                });
                
                const data = await res.json();
                
                if (data.status === "Success") {
                    chat.innerHTML += `<div class="msg"><b>Hệ thống:</b> Đã tạo bot thành công tại ${data.path}. <br> Version: ${data.version}</div>`;
                } else {
                    chat.innerHTML += `<div class="msg" style="color:red"><b>Lỗi:</b> ${data.error}</div>`;
                }
            } catch (e) {
                chat.innerHTML += `<div class="msg" style="color:red">Server error: ${e.message}</div>`;
            }
        }
    </script>
</body>
</html>
