    <style>
        body { background: #0a0a0a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 95vh; padding: 20px; }
        #chat { flex: 1; overflow-y: auto; border: 1px solid #333; padding: 15px; margin-bottom: 10px; border-radius: 8px; }

        button { background: #00f2ff; border: none; padding: 10px; cursor: pointer; font-weight: bold; }
        pre { background: #000; padding: 10px; border-left: 3px solid #00f2ff; overflow-x: auto; }

<body>
    <div id="chat"></div>
    <div class="controls">
        <textarea id="input" style="flex:1; background:#111; color:#fff;"></textarea>
        <input type="file" id="fileIn">
        <button onclick="send()">GỬI</button>
    </div>

    <script>
        async function send() {
            const input = document.getElementById('input');
            const file = document.getElementById('fileIn').files[0];
            const fileContent = file ? await file.text() : "";
            
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: input.value, fileContent })
            });
            const data = await res.json();
            
            document.getElementById('chat').innerHTML += `
                <div class="msg"><b>You:</b> ${input.value} <button onclick="copy('${input.value}')">Copy</button></div>
                <div class="msg"><b>Bot:</b> ${data.reply.replace(/```/g, '<pre>')} 
                    <div style="margin-top:10px">
                        <button onclick="copy('${data.reply.replace(/'/g, "\\'")}')">Copy Chat</button>
                        ${data.isCode ? `<button onclick="copyCode('${data.reply.replace(/'/g, "\\'")}')">Copy Code</button>
                        <button onclick="download('${data.reply.replace(/'/g, "\\'")}')">Tải File</button>` : ''}
                    </div>
                </div>`;
            input.value = "";
        }

### Các tính năng bạn đã có:
* **Tự động nhận diện:** Không cần nút bấm, bot tự biết khi nào là code, khi nào là chat.
* **Nhớ lịch sử:** Bot hiểu được các câu chat trước đó (Contextual awareness).
* **Quản lý file:** Upload file cho bot đọc, Tải file code về máy (.js), Copy nhanh từng đoạn.
* **Giao diện:** Dark mode, sạch sẽ, chuyên nghiệp.

Đây là nền tảng vững chắc nhất. Bạn chỉ cần chạy `node server.js` là dùng được ngay. Nếu muốn thêm nút **Xóa lịch sử** (`chatHistory = []`) hoặc **Tải thêm lịch sử**, chỉ cần thêm một endpoint `/api/clear` vào `server.js` là xong. Bạn còn cần thêm tính năng gì cho các con bot của mình không?
