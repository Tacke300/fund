<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { border: 2px solid #0f0; padding: 40px; width: 400px; box-shadow: 0 0 15px #0f0; }
        input { width: 100%; background: #000; border: 1px solid #0f0; color: #0f0; padding: 10px; margin: 20px 0; }
        button { width: 100%; padding: 10px; background: #0f0; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2>CORE SYSTEM</h2>
        <input id="work" placeholder="Workflow name...">
        <button onclick="run()">EXECUTE</button>
        <div id="logs"></div>
    </div>
    <script>
        async function run() {
            const workName = document.getElementById('work').value;
            document.getElementById('logs').innerText = "Processing...";
            const res = await fetch('http://localhost:7777/api/run', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ workName })
            });
            const data = await res.json();
            document.getElementById('logs').innerText = data.message;
        }
    </script>
</body>
</html>
