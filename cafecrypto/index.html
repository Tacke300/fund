<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luffy Cafe Crypto - Dashboard</title>
    <style>
        :root {
            --bg-color: #0b0e11;
            --card-bg: #181a20;
            --primary: #f0b90b; 
            --primary-hover: #c99a09;
            --text-main: #eaecef;
            --text-muted: #848e9c;
            --border-color: #2b3139;
            --success: #0ecb81;
            --error: #f6465d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        .container { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 20px; margin-bottom: 60px; }

        /* Header Logo area */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border-color); }
        .logo { color: var(--primary); font-size: 22px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .btn-logout { background: none; border: 1px solid var(--border-color); color: var(--text-muted); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .btn-logout:hover { color: var(--error); border-color: var(--error); }

        /* Div 1: Thông tin User & Tài sản & Bot hoạt động */
        .info-card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; }
        .user-welcome { font-size: 18px; font-weight: 600; margin-bottom: 15px; color: var(--primary); }
        
        .balance-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; background: rgba(255,255,255,0.02); padding: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.03); }
        .balance-item .label { font-size: 13px; color: var(--text-muted); margin-bottom: 5px; }
        .balance-item .value { font-size: 20px; font-weight: 700; color: #fff; }

        .section-title { font-size: 15px; font-weight: 600; color: var(--primary); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; border-left: 3px solid var(--primary); padding-left: 8px; }
        
        /* Danh sách Bot đang chạy */
        .bot-status-list { display: flex; flex-direction: column; gap: 10px; }
        .bot-status-item { background: rgba(14, 203, 129, 0.05); border: 1px solid rgba(14, 203, 129, 0.2); border-radius: 8px; padding: 12px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; font-size: 13.5px; }
        .bot-status-item .bot-name { grid-column: span 2; font-weight: bold; color: var(--success); font-size: 14.5px; display: flex; justify-content: space-between; }
        .bot-status-item .bot-name .badge { background: var(--success); color: #000; font-size: 10px; padding: 2px 6px; border-radius: 4px; }
        .pnl-positive { color: var(--success); font-weight: bold; }
        .pnl-negative { color: var(--error); font-weight: bold; }

        /* Div 2: Khu vực các nút bấm hành động */
        .actions-card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-action { padding: 14px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-main); font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.2s ease; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-action:hover { background: rgba(255,255,255,0.1); border-color: var(--text-muted); }
        .btn-api-config { grid-column: span 2; background-color: var(--primary); color: #000; border: none; }
        .btn-api-config:hover { background-color: var(--primary-hover); color: #000; }
        .btn-tip { background: rgba(240, 185, 11, 0.1); border-color: rgba(240, 185, 11, 0.3); color: var(--primary); }
        .btn-tip:hover { background: rgba(240, 185, 11, 0.2); }

        /* POPUP MODAL CÀI ĐẶT API */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.25s ease; z-index: 999; padding: 15px; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-box { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; width: 100%; max-width: 440px; padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); position: relative; transform: scale(0.9); transition: transform 0.25s ease; }
        .modal-overlay.active .modal-box { transform: scale(1); }
        
        .modal-header { font-size: 16px; font-weight: 700; color: var(--primary); margin-bottom: 18px; text-transform: uppercase; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 6px; color: var(--text-main); font-size: 13px; }
        .input-group input { width: 100%; padding: 11px 14px; background-color: var(--bg-color); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-main); font-size: 14px; outline: none; }
        .input-group input:focus { border-color: var(--primary); }
        
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .btn-modal { flex: 1; padding: 11px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; border: none; }
        .btn-modal-save { background-color: var(--primary); color: #000; }
        .btn-modal-save:hover { background-color: var(--primary-hover); }
        .btn-modal-close { background-color: #2b3139; color: var(--text-main); }
        .btn-modal-close:hover { background-color: #363d47; }

        /* Footer */
        .footer { text-align: center; color: var(--text-muted); font-size: 12px; margin-top: auto; padding: 20px 0; width: 100%; border-top: 1px solid rgba(255,255,255,0.05); }

        /* Responsive di động mượt mà */
        @media (max-width: 500px) {
            body { padding: 12px; }
            .balance-grid { grid-template-columns: 1fr; gap: 10px; }
            .actions-card { grid-template-columns: 1fr; }
            .btn-api-config { grid-column: span 1; }
            .bot-status-item { grid-template-columns: 1fr; gap: 4px; }
            .bot-status-item .bot-name { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">🏴‍☠️ Moncey D Luffy</div>
        <button class="btn-logout" onclick="logout()">Đăng xuất</button>
    </div>

    <div class="info-card">
        <div class="user-welcome">Xin chào, <span id="display-username">User</span> 👋</div>
        
        <div class="balance-grid">
            <div class="balance-item">
                <div class="label">Số dư ví (USDT)</div>
                <div class="value" id="wallet-balance">0.00</div>
            </div>
            <div class="balance-item">
                <div class="label">Số dư khả dụng (USDT)</div>
                <div class="value" id="available-balance">0.00</div>
            </div>
        </div>

        <div class="section-title">Các Bot đang hoạt động</div>
        <div class="bot-status-list" id="active-bots-container">
            <div style="color: var(--text-muted); font-size: 13px; text-align: center; padding: 10px;">Đang quét trạng thái hệ thống Bot...</div>
        </div>
    </div>

    <div class="actions-card">
        <button class="btn-action btn-api-config" onclick="openApiModal()">⚙️ Cài đặt API Binance</button>
        <button class="btn-action" onclick="triggerBotAction(1)">🤖 Chạy Bot 1</button>
        <button class="btn-action" onclick="triggerBotAction(2)">🤖 Chạy Bot 2</button>
        <button class="btn-action" onclick="triggerBotAction(3)">🤖 Chạy Bot 3</button>
        <button class="btn-action btn-tip" onclick="openTipAdmin()">💰 Tip cho Admin</button>
    </div>
</div>

<div class="modal-overlay" id="apiModalOverlay" onclick="closeApiModalOutside(event)">
    <div class="modal-box">
        <div class="modal-header">Cấu hình API Binance</div>
        <form id="apiModalForm" onsubmit="saveApiConfig(event)">
            <div class="input-group">
                <label>Binance API Key</label>
                <input type="text" id="pop-api-key" placeholder="Nhập Binance API Key mới...">
            </div>
            <div class="input-group">
                <label>Binance Secret Key</label>
                <input type="password" id="pop-secret-key" placeholder="Nhập Binance Secret Key mới...">
            </div>
            <div class="modal-buttons">
                <button type="button" class="btn-modal btn-modal-close" onclick="closeApiModal()">Đóng</button>
                <button type="submit" class="btn-modal btn-modal-save">Lưu cấu hình</button>
            </div>
        </form>
    </div>
</div>

<div class="footer">
    Copyright by Moncey D Luffy 2026
</div>

<script>
    let currentUsername = "";

    // Tự kiểm tra trạng thái login ngay từ đầu vào
    window.onload = function() {
        currentUsername = localStorage.getItem('crypto_user') || sessionStorage.getItem('crypto_user');
        if (!currentUsername) {
            // Nếu chưa đăng nhập đá ra lại file login.html ngay lập tức
            window.location.replace('login.html');
            return;
        }
        
        document.getElementById('display-username').innerText = currentUsername;
        
        // Load data thực tế lên giao diện
        loadMockBalanceData();
        loadActiveBotsData();
    };

    // Hàm load số dư giả lập/thực tế từ hệ thống
    function loadMockBalanceData() {
        // Tạo số dư chạy ngẫu nhiên giống thật hoặc gọi API /api/wallet-balance tùy thích
        const wallet = (Math.random() * 5000 + 2000).toFixed(2);
        const available = (wallet * 0.75).toFixed(2); // Giả lập khả dụng bằng 75% ví
        
        document.getElementById('wallet-balance').innerText = wallet + " USDT";
        document.getElementById('available-balance').innerText = available + " USDT";
    }

    // Hàm render danh sách bot đang chạy (Chỉ hiển thị các bot có trạng thái đang chạy)
    function loadActiveBotsData() {
        // Giả lập cục dữ liệu trả về của 4 bot hệ thống
        const systemBots = [
            { id: 1, name: "Bot 1 - Funding Rate Arbitrage", active: true, position: "Long BTC 0.50", closed: "300 USDT", pnl: 45.20 },
            { id: 2, name: "Bot 2 - DCA Scalping Martin", active: true, position: "Short ETH 4.20", closed: "1,250 USDT", pnl: -12.40 },
            { id: 3, name: "Bot 3 - Pump/Dump Detector", active: false, position: "None", closed: "0 USDT", pnl: 0 },
            { id: 4, name: "Bot 4 - High Leverage Trend", active: true, position: "Long SOL 50.0", closed: "890 USDT", pnl: 112.85 }
        ];

        const container = document.getElementById('active-bots-container');
        container.innerHTML = ""; // Clear loader

        // Lọc chỉ lấy những Bot đang hoạt động (active: true) theo đúng yêu cầu của ông
        const activeBots = systemBots.filter(bot => bot.active);

        if(activeBots.length === 0) {
            container.innerHTML = `<div style="color: var(--text-muted); font-size: 13px; text-align: center; padding: 10px;">Hiện tại không có Bot nào đang chạy.</div>`;
            return;
        }

        activeBots.forEach(bot => {
            const pnlClass = bot.pnl >= 0 ? "pnl-positive" : "pnl-negative";
            const pnlSign = bot.pnl >= 0 ? "+" : "";
            
            const botHtml = `
                <div class="bot-status-item">
                    <div class="bot-name">${bot.name} <span class="badge">Running</span></div>
                    <div><strong>Vị thế đang mở:</strong> ${bot.position}</div>
                    <div><strong>Đã chốt:</strong> ${bot.closed}</div>
                    <div style="grid-column: span 2;"><strong>PnL chốt:</strong> <span class="${pnlClass}">${pnlSign}${bot.pnl} USDT</span></div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', botHtml);
        });
    }

    // Xử lý đóng mở Popup API
    function openApiModal() {
        document.getElementById('apiModalOverlay').classList.add('active');
    }

    function closeApiModal() {
        document.getElementById('apiModalOverlay').classList.remove('active');
    }

    // Chạm bất kỳ chỗ nào bên ngoài khu vực biểu mẫu popup đều tự đóng
    function closeApiModalOutside(event) {
        if (event.target.id === "apiModalOverlay") {
            closeApiModal();
        }
    }

    // Lưu API Key từ Popup
    function saveApiConfig(e) {
        e.preventDefault();
        const key = document.getElementById('pop-api-key').value.trim();
        const secret = document.getElementById('pop-secret-key').value.trim();
        
        if(!key || !secret) {
            alert("Vui lòng điền đầy đủ Key và Secret!");
            return;
        }

        // Logic xử lý cập nhật gửi lên server của ông viết ở đây...
        alert("Đã lưu cấu hình API Binance thành công!");
        closeApiModal();
        document.getElementById('apiModalForm').reset();
    }

    // Hành động kích hoạt cho các nút Bot 1, 2, 3
    function triggerBotAction(botId) {
        alert(`Đã gửi lệnh thực thi điều khiển Hệ thống Bot số ${botId}!`);
    }

    // Nút tip Admin
    function openTipAdmin() {
        alert("Cảm ơn ông đã ủng hộ! Địa chỉ ví USDT (Network BSC/TRC20): THeMurometsLuffyCafeCryptoAddress...");
    }

    // Đăng xuất
    function logout() {
        localStorage.clear();
        sessionStorage.clear();
        window.location.replace('login.html');
    }
</script>
</body>
</html>
